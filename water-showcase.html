<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>three.js Water — Night Pool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: "SF Mono", "Fira Code", monospace; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #info {
      position: fixed; bottom: 12px; left: 12px; z-index: 20;
      background: rgba(0,0,0,0.6); color: #b0d890;
      padding: 8px 12px; border-radius: 6px; font-size: 11px; line-height: 1.6;
    }
    #info span { color: #e0f0c0; font-weight: 600; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
      "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
      "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.tsl.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="info">
  <span>three.js Water</span> — The Night Pool by syntheticplants (CC BY 4.0)<br>
  Orbit: <span>left-drag</span> &nbsp; Zoom: <span>scroll</span>
</div>

<script type="module">
import * as THREE from 'three/webgpu';
import { pass, mrt, output, emissive, renderOutput } from 'three/tsl';
import { bloom } from 'three/addons/tsl/display/BloomNode.js';
import { fxaa } from 'three/addons/tsl/display/FXAANode.js';
import { Inspector } from 'three/addons/inspector/Inspector.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { UltraHDRLoader } from 'three/addons/loaders/UltraHDRLoader.js';
import { WaterMesh } from 'three/addons/objects/Water2Mesh.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Asset URLs from threejs.org/examples
const ASSETS = {
  pool: 'https://threejs.org/examples/models/gltf/pool.glb',
  normal0: 'https://threejs.org/examples/textures/water/Water_1_M_Normal.jpg',
  normal1: 'https://threejs.org/examples/textures/water/Water_2_M_Normal.jpg',
  hdr: 'https://threejs.org/examples/textures/equirectangular/moonless_golf_2k.hdr.jpg',
};

let scene, camera, renderer, water, renderPipeline, controls;

const params = {
  color: '#99e0ff',
  scale: 2,
  flowX: 1,
  flowY: 1
};

init();

async function init() {
  scene = new THREE.Scene();

  const loader = new UltraHDRLoader();
  loader.load(ASSETS.hdr, function (texture) {
    texture.mapping = THREE.EquirectangularReflectionMapping;
    texture.needsUpdate = true;
    scene.background = texture;
    scene.environment = texture;
  }, undefined, function () {
    scene.background = new THREE.Color(0x0a1520);
  });

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(-20, 6, -30);

  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/libs/draco/gltf/');

  const gltfLoader = new GLTFLoader();
  gltfLoader.setDRACOLoader(dracoLoader);

  const textureLoader = new THREE.TextureLoader();

  const [gltf, normalMap0, normalMap1] = await Promise.all([
    gltfLoader.loadAsync(ASSETS.pool),
    textureLoader.loadAsync(ASSETS.normal0),
    textureLoader.loadAsync(ASSETS.normal1)
  ]);

  gltf.scene.position.z = 2;
  gltf.scene.scale.setScalar(0.1);
  scene.add(gltf.scene);

  normalMap0.wrapS = normalMap0.wrapT = THREE.RepeatWrapping;
  normalMap1.wrapS = normalMap1.wrapT = THREE.RepeatWrapping;

  const waterGeometry = new THREE.PlaneGeometry(30, 40);

  water = new WaterMesh(waterGeometry, {
    color: params.color,
    scale: params.scale,
    flowDirection: new THREE.Vector2(params.flowX, params.flowY),
    normalMap0: normalMap0,
    normalMap1: normalMap1
  });

  water.position.set(0, 0.2, -2);
  water.rotation.x = Math.PI * -0.5;
  water.renderOrder = Infinity;
  scene.add(water);

  const floorGeometry = new THREE.PlaneGeometry(1, 1);
  floorGeometry.rotateX(-Math.PI * 0.5);
  const floorMaterial = new THREE.MeshStandardMaterial({
    color: 0x444444,
    roughness: 1,
    metalness: 0,
    side: THREE.DoubleSide
  });

  {
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.position.set(20, 0, 0);
    floor.scale.set(15, 1, 80);
    scene.add(floor);
  }
  {
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.position.set(-20, 0, 0);
    floor.scale.set(15, 1, 80);
    scene.add(floor);
  }
  {
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.position.set(0, 0, 30);
    floor.scale.set(30, 1, 20);
    scene.add(floor);
  }
  {
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.position.set(0, 0, -30);
    floor.scale.set(30, 1, 20);
    scene.add(floor);
  }

  renderer = new THREE.WebGPURenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.5;
  renderer.inspector = new Inspector();
  document.body.appendChild(renderer.domElement);

  await renderer.init();
  renderer.setAnimationLoop(animate);

  renderPipeline = new THREE.RenderPipeline(renderer);
  renderPipeline.outputColorTransform = false;

  const scenePass = pass(scene, camera);
  scenePass.setMRT(mrt({
    output,
    emissive
  }));

  const beautyPass = scenePass.getTextureNode();
  const emissivePass = scenePass.getTextureNode('emissive');

  const bloomPass = bloom(emissivePass, 2);

  const outputPass = renderOutput(beautyPass.add(bloomPass));

  const fxaaPass = fxaa(outputPass);
  renderPipeline.outputNode = fxaaPass;

  const gui = renderer.inspector.createParameters('Water');
  const waterNode = water.material.colorNode;

  gui.addColor(params, 'color').onChange(function (value) {
    waterNode.color.value.set(value);
  });
  gui.add(params, 'scale', 1, 10).onChange(function (value) {
    waterNode.scale.value = value;
  });
  gui.add(params, 'flowX', -1, 1, 0.01).onChange(function (value) {
    waterNode.flowDirection.value.x = value;
    waterNode.flowDirection.value.normalize();
  });
  gui.add(params, 'flowY', -1, 1, 0.01).onChange(function (value) {
    waterNode.flowDirection.value.y = value;
    waterNode.flowDirection.value.normalize();
  });

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(0, 0, -5);
  controls.update();

  window.addEventListener('resize', onWindowResize);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  controls.update();
  renderPipeline.render();
}
</script>
</body>
</html>
