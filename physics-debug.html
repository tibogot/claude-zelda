<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics debug — Character on flat plane</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #1a1a1a; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #info {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        font: 12px/1.5 "SF Mono", "Fira Code", monospace;
        color: #b0d890;
        background: rgba(0, 0, 0, 0.6);
        padding: 8px 12px;
        border-radius: 6px;
        pointer-events: none;
        user-select: none;
      }
      #info span { color: #e0f0c0; font-weight: 600; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.tsl.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/",
          "tweakpane": "https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="info">
      Physics debug &mdash; <span id="backend">loading…</span> &bull;
      Flat plane at Y=0 &bull; WASD + click &bull; Shift run &bull; Ctrl crouch &bull; F roll
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import RAPIER from "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/+esm";
      import {
        createPlayerController,
        createPhysicsDebug,
      } from "./physics.js";
      import { createPlayer } from "./player.js";
      import { PARAMS } from "./params.js";
      import { PI } from "./constants.js";

      const FLAT_GROUND_SIZE = 80;
      const FLAT_GROUND_HALF = FLAT_GROUND_SIZE * 0.5;

      async function init() {
        const Tweakpane = await import(
          "https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js"
        );

        const renderer = new THREE.WebGPURenderer({ antialias: true });
        await renderer.init();
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = PARAMS.exposure;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        document.getElementById("backend").textContent =
          renderer.backend?.constructor?.name?.includes("WebGPU") ? "WebGPU ✓" : "WebGL";

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10);

        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.target.set(0, 1.25, 0);
        orbitControls.maxPolarAngle = PI * 0.48;
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.enabled = false;

        const dirLight = new THREE.DirectionalLight(0xfff5e0, 2);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 80;
        dirLight.shadow.camera.left = -FLAT_GROUND_HALF;
        dirLight.shadow.camera.right = FLAT_GROUND_HALF;
        dirLight.shadow.camera.top = FLAT_GROUND_HALF;
        dirLight.shadow.camera.bottom = -FLAT_GROUND_HALF;
        scene.add(dirLight);
        const hemiLight = new THREE.HemisphereLight(0xc8e0ff, 0x444433, 0.6);
        scene.add(hemiLight);

        // Flat ground plane (visual) at Y = 0
        const groundGeo = new THREE.PlaneGeometry(FLAT_GROUND_SIZE, FLAT_GROUND_SIZE);
        groundGeo.rotateX(-Math.PI / 2);
        const groundMat = new THREE.MeshStandardMaterial({
          color: 0x3a5a3a,
          roughness: 0.9,
          metalness: 0,
        });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        // Physics: flat ground at Y = 0 (cuboid top at 0)
        await RAPIER.init({});
        const physicsWorld = new RAPIER.World({ x: 0, y: -9.81, z: 0 });
        const groundBodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(0, -0.5, 0);
        const groundBody = physicsWorld.createRigidBody(groundBodyDesc);
        const groundColliderDesc = RAPIER.ColliderDesc.cuboid(
          FLAT_GROUND_HALF,
          0.5,
          FLAT_GROUND_HALF,
        );
        physicsWorld.createCollider(groundColliderDesc, groundBody);

        const { physicsDebugGroup, buildRapierDebugMeshes } = createPhysicsDebug(
          RAPIER,
          scene,
          physicsWorld,
        );

        const sampleHeightFlat = () => 0;

        const charPos = new THREE.Vector3(0, 0, 0);
        const capR = PARAMS.capsuleRadius;
        const capHalfH = Math.max(0.1, (PARAMS.characterHeight - 2 * capR) / 2);
        charPos.y = 0 + capHalfH + capR;

        const { playerBody, playerCollider, characterController } = createPlayerController(
          RAPIER,
          physicsWorld,
          charPos,
          PARAMS,
        );

        const player = createPlayer({
          scene,
          renderer,
          camera,
          PARAMS,
          charPos,
          playerBody,
          playerCollider,
          characterController,
          physicsWorld,
          sampleHeight: sampleHeightFlat,
          capR,
          capHalfH,
          TERRAIN_SIZE: FLAT_GROUND_SIZE,
        });

        await renderer.compileAsync(scene, camera);

        const debug = { showCapsule: true, modelFeetOffsetY: 0 };
        const pane = new Tweakpane.Pane({ title: "Physics debug", expanded: true });
        const fChar = pane.addFolder({ title: "Character", expanded: true });
        fChar.addBinding(debug, "showCapsule", { label: "Show capsule" });
        fChar.addBinding(debug, "modelFeetOffsetY", {
          min: -0.5,
          max: 0.5,
          step: 0.01,
          label: "Model feet offset (Y)",
        });
        const fPhys = pane.addFolder({ title: "Physics", expanded: false });
        fPhys.addBinding(PARAMS, "rapierDebug", { label: "Rapier debug" });

        const timer = new THREE.Timer();
        let lastTime = 0;
        renderer.setAnimationLoop(() => {
          PARAMS.characterOffsetY = debug.modelFeetOffsetY;
          timer.update();
          const dt = Math.min(timer.getElapsed() - lastTime, 0.05);
          lastTime = timer.getElapsed();
          player.update(dt);

          player.capsule.visible =
            debug.showCapsule || player.characterGroup.children.length === 0;

          physicsDebugGroup.visible = !!PARAMS.rapierDebug;
          if (PARAMS.rapierDebug) buildRapierDebugMeshes();

          if (PARAMS.cameraMode === "thirdPerson") {
            const camDist = PARAMS.camDist;
            const cx =
              charPos.x -
              Math.sin(player.state.camYaw) * Math.cos(player.state.camPitch) * camDist;
            const cy =
              charPos.y + Math.sin(player.state.camPitch) * camDist + PARAMS.camHeight;
            const cz =
              charPos.z -
              Math.cos(player.state.camYaw) * Math.cos(player.state.camPitch) * camDist;
            camera.position.set(cx, cy, cz);
            camera.lookAt(charPos.x, charPos.y + 0.5, charPos.z);
            orbitControls.enabled = false;
          } else {
            orbitControls.target.set(charPos.x, charPos.y + 0.5, charPos.z);
            orbitControls.enabled = true;
            orbitControls.update();
          }

          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = innerWidth / innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(innerWidth, innerHeight);
        });
      }

      init().catch((e) => {
        console.error(e);
        document.getElementById("backend").textContent = "Error: " + e.message;
      });
    </script>
  </body>
</html>
