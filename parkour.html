<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parkour Scene</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #info {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        font:
          12px/1.5 "SF Mono",
          "Fira Code",
          monospace;
        color: #b0d890;
        background: rgba(0, 0, 0, 0.55);
        padding: 8px 12px;
        border-radius: 6px;
        pointer-events: none;
        user-select: none;
        backdrop-filter: blur(4px);
      }
      #info span {
        color: #e0f0c0;
        font-weight: 600;
      }
      .tp-dfwv {
        z-index: 20 !important;
        max-height: 90vh !important;
        overflow-y: auto !important;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.tsl.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/",
          "stats-gl": "https://cdn.jsdelivr.net/npm/stats-gl/dist/main.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="info">
      Parkour &mdash; <span id="backend">loading…</span> &bull;
      <span id="stats">—</span> &bull; WASD + click to look &bull; Shift run
      &bull; Ctrl crouch &bull; F roll &bull; right-click / E attack &bull; Space jump &bull; Space mid-air glide
      &bull; Pool (-60, 80) &bull; Church (-40, -35) god rays
    </div>
    <div id="platform-debug" style="display:none; position:fixed; top:60px; left:16px; z-index:100; font:12px monospace; color:#0f0; background:rgba(0,0,0,0.8); padding:8px; border-radius:4px; max-width:320px;"></div>

    <script type="module">
      const Tweakpane =
        await import("https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js");

      import * as THREE from "three";
      import {
        pass,
        color,
        fog,
        float,
        mrt,
        output,
        emissive,
        renderOutput,
        positionWorld,
        positionView,
        triNoise3D,
        uniform,
        mul,
        div,
        sub,
        add,
        clamp,
        mix,
        vec4,
        step,
        abs,
        smoothstep,
        uv,
        Loop,
        Fn,
        int,
        convertToTexture,
        nodeObject,
        normalView,
        directionToColor,
        colorToDirection,
        sample,
        screenUV,
      } from "three/tsl";
      import { bloom } from "three/addons/tsl/display/BloomNode.js";
      import { fxaa } from "three/addons/tsl/display/FXAANode.js";
      import { lensflare } from "three/addons/tsl/display/LensflareNode.js";
      import { gaussianBlur } from "three/addons/tsl/display/GaussianBlurNode.js";
      import { boxBlur } from "three/addons/tsl/display/boxBlur.js";
      import { ao } from "three/addons/tsl/display/GTAONode.js";
      import { denoise } from "three/addons/tsl/display/DenoiseNode.js";
      import Stats from "stats-gl";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";
      import { WaterMesh } from "three/addons/objects/Water2Mesh.js";
      import { SkyMesh } from "three/addons/objects/SkyMesh.js";
      import { CSMShadowNode } from "three/addons/csm/CSMShadowNode.js";
      import RAPIER from "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/+esm";
      import {
        createPhysicsWorld,
        createPlayerController,
        createPhysicsDebug,
      } from "./physics.js";
      import { createPlayer } from "./player.js";
      import { createNpc } from "./npc.js";
      import { createEnemy } from "./enemy.js";
      import { createFloatingLeaves } from "./floating-leaves.js";
      import { createFlowingLines } from "./flowing-lines.js";
      import { PARAMS } from "./params.js";
      import { PI } from "./constants.js";
      import { createTileMaterial } from "./tileMaterial.js";

      const PARKOUR_SIZE = 800;

      // Floor surface height — parkour ground sits on top of createPhysicsWorld's default ground
      const FLOOR_Y = 1;

      const parkourParams = {
        tile: {
          textureScale: 1500,
          gradientIntensity: 0.5,
          gradientBias: 0.1,
          tileColor: "#d4d4d4",
          gridColor: "#707070",
          gridLineColor: "#404040",
          roughness: 1,
          metalness: 0,
        },
        ground: {
          planeSize: 800,
        },
        csm: {
          cascades: 3,
          maxFar: 150,
          lightMargin: 100,
          mapSize: 2048,
          updateEveryFrame: true,
        },
        light: {
          sunAzimuth: 135,
          sunElevation: 43,
          dirColor: "#fff5e0",
          dirIntensity: 2.2,
          hemiSkyColor: "#c8e0ff",
          hemiGroundColor: "#88aa55",
          hemiIntensity: 1,
          envIntensity: 0.45,
          exposure: 0.5,
        },
        sky: {
          turbidity: 2,
          rayleigh: 1.5,
          mie: 0.005,
          mieG: 0.8,
        },
        debug: {
          rapierDebug: false,
          platformDebug: false,
        },
        npc: {
          enabled: false,
          speed: 2,
          walkRadius: 100,
          directionChangeInterval: 3,
          turnSpeed: 5,
          scale: 1,
          floorOffset: 0,
          idleWhenNearPlayer: true,
          nearPlayerDistance: 4,
        },
        foliage: {
          floatingLeaves: false,
          count: 40,
          areaSize: 25,
          spawnHeight: 12,
          leafSize: 0.5,
          scale: 2,
          opacity: 0.9,
          windInfluence: 0.2,
          gravity: 0.0003,
          terminalVelocity: 0.004,
          rotationSpeed: 0.0003,
          airResistance: 0.995,
          maxAge: 2000,
          terrainFloorOffset: 2,
          windStr: 0.08,
          windSpeed: 0.4,
        },
        bridge1: { enabled: false },
        bridge2: { enabled: false },
        flowingLines: {
          enabled: false,
          lineCount: 8,
          lineLength: 12,
          lineWidth: 0.15,
          segments: 20,
          heightOffset: 0.3,
          verticalWave: 0.08,
          animationSpeed: 1,
          pathRadius: 25,
          pathFrequency: 0.8,
          lineColor: "#a8d8ea",
          lineOpacity: 0.7,
        },
        enemies: {
          enabled: true,
          speed: 2,
          walkRadius: 80,
          directionChangeInterval: 3,
          turnSpeed: 5,
          scale: 1,
          floorOffset: 0,
          maxHp: 100,
          idleWhenNearPlayer: true,
          nearPlayerDistance: 4,
        },
      };
      const hazeParams = {
        enabled: false,
        thickness: 35,
        opacity: 0.9,
        falloff: 2.2,
        hazeColor: "#f5f5f0",
        noiseScaleA: 0.004,
        noiseScaleB: 0.008,
        noiseAmountA: 0.22,
        noiseAmountB: 0.18,
        noiseDetail: 0.12,
        noiseSpeed: 1,
      };

      // Post-processing params (enable/disable + per-effect settings)
      const postParams = {
        enabled: false,
        bloom: { enabled: false, strength: 0.4, radius: 0.4, threshold: 0.6 },
        lensflare: {
          enabled: false,
          bloomThreshold: 0.72,
          threshold: 0.6,
          ghostAttenuation: 25,
          ghostSpacing: 0.25,
        },
        godRays: {
          enabled: true,
          strength: 0.15,
          decay: 0.96,
          density: 0.8,
          samples: 32,
        },
        dof: {
          enabled: false,
          focusDistance: 25,
          blurStart: 5,
          blurEnd: 60,
          blurSize: 1,
          blurSpread: 3,
        },
        gtao: {
          enabled: false,
          intensity: 1.2,
          radius: 1.2,
          samples: 14,
          resolutionScale: 0.5,
          scale: 1,
          distanceFallOff: 1,
          distanceExponent: 1,
          thickness: 1,
          denoiseEnabled: true,
          denoiseRadius: 5,
          denoiseLumaPhi: 5,
          denoiseDepthPhi: 5,
          denoiseNormalPhi: 5,
        },
      };

      function srgbToLinear(hex) {
        const c = new THREE.Color(hex);
        c.convertSRGBToLinear();
        return c;
      }

      function sunDirectionFromAngles(azimuthDeg, elevationDeg) {
        const az = (azimuthDeg * Math.PI) / 180;
        const el = (elevationDeg * Math.PI) / 180;
        const cosEl = Math.cos(el);
        return new THREE.Vector3(
          cosEl * Math.cos(az),
          Math.sin(el),
          cosEl * Math.sin(az),
        ).normalize();
      }

      // Flat terrain: sampleHeight returns floor height for player ground checks
      const sampleHeight = () => FLOOR_Y;

      async function init() {
        const renderer = new THREE.WebGPURenderer({ antialias: true });
        await renderer.init();
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = parkourParams.light.exposure;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        document.getElementById("backend").textContent =
          renderer.backend?.constructor?.name?.includes("WebGPU")
            ? "WebGPU ✓"
            : "WebGL fallback";

        const stats = new Stats({ trackGPU: false });
        stats.init(renderer);
        document.body.appendChild(stats.dom);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(
          60,
          innerWidth / innerHeight,
          0.5,
          1000,
        );
        camera.position.set(0, 4, 12);

        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.target.set(0, 2, 0);
        orbitControls.maxPolarAngle = PI * 0.48;
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.enabled = false;
        orbitControls.update();

        // ── LIGHTING ──
        const _sunDir = sunDirectionFromAngles(
          parkourParams.light.sunAzimuth,
          parkourParams.light.sunElevation,
        );
        const dirLight = new THREE.DirectionalLight(
          parkourParams.light.dirColor,
          parkourParams.light.dirIntensity,
        );
        dirLight.position.copy(_sunDir.clone().multiplyScalar(50));
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = parkourParams.csm.mapSize;
        dirLight.shadow.mapSize.height = parkourParams.csm.mapSize;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 200;
        dirLight.shadow.camera.left = -80;
        dirLight.shadow.camera.right = 80;
        dirLight.shadow.camera.top = 80;
        dirLight.shadow.camera.bottom = -80;
        dirLight.shadow.bias = PARAMS.shadowBias;
        dirLight.shadow.normalBias = PARAMS.shadowNormalBias;

        const csm = new CSMShadowNode(dirLight, {
          cascades: parkourParams.csm.cascades,
          maxFar: parkourParams.csm.maxFar,
          mode: "practical",
          lightMargin: parkourParams.csm.lightMargin,
        });
        dirLight.shadow.shadowNode = csm;
        scene.add(dirLight);

        // Fixed shadow target — sun points at scene center so fixed objects (building) have stable shadows
        const shadowTarget = new THREE.Object3D();
        shadowTarget.position.set(0, FLOOR_Y, 0);
        scene.add(shadowTarget);
        dirLight.target = shadowTarget;

        const hemiLight = new THREE.HemisphereLight(
          parkourParams.light.hemiSkyColor,
          parkourParams.light.hemiGroundColor,
          parkourParams.light.hemiIntensity,
        );
        scene.add(hemiLight);

        // ── FLAT PLANE TERRAIN ──
        const floorGeo = new THREE.PlaneGeometry(PARKOUR_SIZE, PARKOUR_SIZE);
        floorGeo.rotateX(-PI / 2);
        const floorMat = createTileMaterial({
          textureScale: parkourParams.tile.textureScale,
          gradientIntensity: parkourParams.tile.gradientIntensity,
          gradientBias: parkourParams.tile.gradientBias,
          tileColor: parkourParams.tile.tileColor,
          gridColor: parkourParams.tile.gridColor,
          gridLineColor: parkourParams.tile.gridLineColor,
          roughness: parkourParams.tile.roughness,
          metalness: parkourParams.tile.metalness,
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = FLOOR_Y;
        floor.receiveShadow = true;
        scene.add(floor);

        // ── TOWER (tile material, casts & receives shadows) ──
        const towerMat = createTileMaterial({
          textureScale: parkourParams.tile.textureScale,
          gradientIntensity: parkourParams.tile.gradientIntensity,
          gradientBias: parkourParams.tile.gradientBias,
          tileColor: parkourParams.tile.tileColor,
          gridColor: parkourParams.tile.gridColor,
          gridLineColor: parkourParams.tile.gridLineColor,
          roughness: parkourParams.tile.roughness,
          metalness: parkourParams.tile.metalness,
        });
        const TOWER_X = 40;
        const TOWER_Z = 40;
        const TOWER_BASE = 24;
        const TOWER_HEIGHT = 80;
        const towerGroup = new THREE.Group();
        towerGroup.position.set(TOWER_X, FLOOR_Y, TOWER_Z);

        const towerBase = new THREE.Mesh(
          new THREE.BoxGeometry(TOWER_BASE * 2, TOWER_BASE, TOWER_BASE * 2),
          towerMat,
        );
        towerBase.position.y = TOWER_BASE / 2;
        towerBase.castShadow = true;
        towerBase.receiveShadow = true;
        towerGroup.add(towerBase);

        const towerBody = new THREE.Mesh(
          new THREE.BoxGeometry(
            TOWER_BASE * 1.6,
            TOWER_HEIGHT,
            TOWER_BASE * 1.6,
          ),
          towerMat,
        );
        towerBody.position.y = TOWER_BASE + TOWER_HEIGHT / 2;
        towerBody.castShadow = true;
        towerBody.receiveShadow = true;
        towerGroup.add(towerBody);

        const towerTop = new THREE.Mesh(
          new THREE.BoxGeometry(
            TOWER_BASE * 1.8,
            TOWER_BASE * 0.8,
            TOWER_BASE * 1.8,
          ),
          towerMat,
        );
        towerTop.position.y = TOWER_BASE + TOWER_HEIGHT + TOWER_BASE * 0.4;
        towerTop.castShadow = true;
        towerTop.receiveShadow = true;
        towerGroup.add(towerTop);

        scene.add(towerGroup);

        // ── PORTAL ──────────────────────────────────────────────────────────────
        // Glowing door at the south face of the tower base.
        // Walking through it teleports the player to the top of the tower.
        const PORTAL_X  = TOWER_X;
        const PORTAL_Z  = TOWER_Z - TOWER_BASE;   // south face of base = Z 16
        const PORTAL_W  = 3.0;
        const PORTAL_H  = 4.2;
        const PORTAL_HW = PORTAL_W / 2;
        const PORTAL_HH = PORTAL_H / 2;
        // Destination: on top of the tower cap + capsule clearance
        // (capHalfH/capR not yet defined here — compute from PARAMS directly)
        const _pCapR   = PARAMS.capsuleRadius ?? 0.35;
        const _pCapHH  = Math.max(0.1, (PARAMS.characterHeight - 2 * _pCapR) / 2);
        const PORTAL_DEST_Y = FLOOR_Y + TOWER_BASE + TOWER_HEIGHT + TOWER_BASE * 0.8
                              + _pCapHH + _pCapR + 1.0;

        const portalFrameMat = new THREE.MeshStandardMaterial({
          color: 0x1a1030,
          roughness: 0.4,
          metalness: 0.7,
          emissive: 0x5500cc,
          emissiveIntensity: 0.4,
        });
        const portalSurfaceMat = new THREE.MeshStandardMaterial({
          emissive: 0x00eeff,
          emissiveIntensity: 1.5,
          transparent: true,
          opacity: 0.8,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide,
        });

        const portalGroup = new THREE.Group();
        portalGroup.position.set(PORTAL_X, FLOOR_Y, PORTAL_Z);

        const _pPostL = new THREE.Mesh(
          new THREE.BoxGeometry(0.45, PORTAL_H + 0.5, 0.45), portalFrameMat);
        _pPostL.position.set(-PORTAL_HW - 0.22, PORTAL_HH + 0.25, 0);
        _pPostL.castShadow = true;
        portalGroup.add(_pPostL);

        const _pPostR = new THREE.Mesh(
          new THREE.BoxGeometry(0.45, PORTAL_H + 0.5, 0.45), portalFrameMat);
        _pPostR.position.set(PORTAL_HW + 0.22, PORTAL_HH + 0.25, 0);
        _pPostR.castShadow = true;
        portalGroup.add(_pPostR);

        const _pLintel = new THREE.Mesh(
          new THREE.BoxGeometry(PORTAL_W + 0.9, 0.45, 0.45), portalFrameMat);
        _pLintel.position.set(0, PORTAL_H + 0.45, 0);
        _pLintel.castShadow = true;
        portalGroup.add(_pLintel);

        // Inner glowing energy surface
        const _pSurface = new THREE.Mesh(
          new THREE.PlaneGeometry(PORTAL_W, PORTAL_H), portalSurfaceMat);
        _pSurface.position.set(0, PORTAL_HH, 0.08);
        portalGroup.add(_pSurface);

        scene.add(portalGroup);
        let portalCooldown = 0;

        // ── PORTAL 2 (return) ────────────────────────────────────────────────────
        // On top of the tower cap, north side. Teleports back to ground level.
        const PORTAL2_BASE_Y = FLOOR_Y + TOWER_BASE + TOWER_HEIGHT + TOWER_BASE * 0.8;
        const PORTAL2_X  = TOWER_X;
        const PORTAL2_Z  = TOWER_Z + TOWER_BASE * 0.55;  // near north edge of cap
        const PORTAL2_W  = PORTAL_W;
        const PORTAL2_H  = PORTAL_H;
        const PORTAL2_HW = PORTAL2_W / 2;
        const PORTAL2_HH = PORTAL2_H / 2;
        // Return destination: ground level, in front of the first portal
        const PORTAL2_DEST_X = PORTAL_X;
        const PORTAL2_DEST_Z = PORTAL_Z - 6;
        const PORTAL2_DEST_Y = FLOOR_Y + _pCapHH + _pCapR + 1.0;

        const portal2FrameMat = new THREE.MeshStandardMaterial({
          color: 0x301000,
          roughness: 0.4,
          metalness: 0.7,
          emissive: 0xcc3300,
          emissiveIntensity: 0.4,
        });
        const portal2SurfaceMat = new THREE.MeshStandardMaterial({
          emissive: 0xff7700,
          emissiveIntensity: 1.5,
          transparent: true,
          opacity: 0.8,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide,
        });

        const portal2Group = new THREE.Group();
        portal2Group.position.set(PORTAL2_X, PORTAL2_BASE_Y, PORTAL2_Z);

        const _p2PostL = new THREE.Mesh(
          new THREE.BoxGeometry(0.45, PORTAL2_H + 0.5, 0.45), portal2FrameMat);
        _p2PostL.position.set(-PORTAL2_HW - 0.22, PORTAL2_HH + 0.25, 0);
        _p2PostL.castShadow = true;
        portal2Group.add(_p2PostL);

        const _p2PostR = new THREE.Mesh(
          new THREE.BoxGeometry(0.45, PORTAL2_H + 0.5, 0.45), portal2FrameMat);
        _p2PostR.position.set(PORTAL2_HW + 0.22, PORTAL2_HH + 0.25, 0);
        _p2PostR.castShadow = true;
        portal2Group.add(_p2PostR);

        const _p2Lintel = new THREE.Mesh(
          new THREE.BoxGeometry(PORTAL2_W + 0.9, 0.45, 0.45), portal2FrameMat);
        _p2Lintel.position.set(0, PORTAL2_H + 0.45, 0);
        _p2Lintel.castShadow = true;
        portal2Group.add(_p2Lintel);

        const _p2Surface = new THREE.Mesh(
          new THREE.PlaneGeometry(PORTAL2_W, PORTAL2_H), portal2SurfaceMat);
        _p2Surface.position.set(0, PORTAL2_HH, 0.08);
        portal2Group.add(_p2Surface);

        scene.add(portal2Group);
        let portal2Cooldown = 0;

        // ── PARKOUR PLATFORMS (GLB + per-object tile material) ──
        const parkourGroup = new THREE.Group();
        parkourGroup.position.y = FLOOR_Y;
        const gltfLoader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath(
          "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/libs/draco/gltf/",
        );
        gltfLoader.setDRACOLoader(dracoLoader);
        const PARKOUR_MODELS = [
          {
            url: "models/parkour/slope1.glb",
            pos: [8, 0, 0],
            textureScale: 1200,
            gradientBias: -0.4,
            uvOffset: [127.3, 41.7, 89.2],
          },
          {
            url: "models/parkour/parkour1.glb",
            pos: [16, 0, 0],
            textureScale: 1500,
            gradientBias: -0.15,
            uvOffset: [203.1, 67.9, 151.4],
          },
          {
            url: "models/parkour/holewall.glb",
            pos: [24, 0, 0],
            textureScale: 1800,
            gradientBias: 0.55,
            uvOffset: [311.5, 93.2, 227.8],
          },
          {
            url: "models/parkour/cylinder.glb",
            pos: [32, 0, 0],
            textureScale: 1000,
            gradientBias: 0.3,
            uvOffset: [419.7, 178.3, 293.6],
          },
        ];
        for (const {
          url,
          pos,
          textureScale,
          gradientBias,
          uvOffset,
        } of PARKOUR_MODELS) {
          const gltf = await gltfLoader.loadAsync(url);
          const mat = createTileMaterial({
            textureScale: textureScale ?? parkourParams.tile.textureScale,
            gradientIntensity: parkourParams.tile.gradientIntensity,
            gradientBias: gradientBias ?? parkourParams.tile.gradientBias,
            tileColor: "#d4d4d4",
            gridColor: "#707070",
            gridLineColor: "#404040",
            roughness: parkourParams.tile.roughness,
            metalness: parkourParams.tile.metalness,
            objectSpace: true,
            uvOffset: uvOffset ?? [0, 0, 0],
          });
          gltf.scene.traverse((child) => {
            if (child.isMesh) {
              child.material = mat;
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });
          gltf.scene.position.set(pos[0], pos[1], pos[2]);
          parkourGroup.add(gltf.scene);
        }
        scene.add(parkourGroup);

        // ── SWIMMING POOL (from water-showcase: pool.glb + WaterMesh) ──
        const POOL_X = -60;
        const POOL_Z = 80;
        const POOL_SCALE = 0.05;
        const POOL_WATER_W = 18;
        const POOL_WATER_H = 24;
        const POOL_WATER_Y_OFFSET = 0.15;
        const POOL_BASE_Y = FLOOR_Y + 4.0; // Raised so pool bowl has visible depth

        const poolAssets = {
          pool: "https://threejs.org/examples/models/gltf/pool.glb",
          normal0: "https://threejs.org/examples/textures/water/Water_1_M_Normal.jpg",
          normal1: "https://threejs.org/examples/textures/water/Water_2_M_Normal.jpg",
        };

        const textureLoader = new THREE.TextureLoader();

        const [poolGltf, poolNormal0, poolNormal1] = await Promise.all([
          gltfLoader.loadAsync(poolAssets.pool),
          textureLoader.loadAsync(poolAssets.normal0),
          textureLoader.loadAsync(poolAssets.normal1),
        ]);

        poolNormal0.wrapS = poolNormal0.wrapT = THREE.RepeatWrapping;
        poolNormal1.wrapS = poolNormal1.wrapT = THREE.RepeatWrapping;

        const poolGroup = new THREE.Group();
        poolGroup.position.set(POOL_X, POOL_BASE_Y, POOL_Z);
        poolGroup.scale.setScalar(POOL_SCALE);
        poolGltf.scene.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        poolGroup.add(poolGltf.scene);
        scene.add(poolGroup);

        const poolWaterGeo = new THREE.PlaneGeometry(POOL_WATER_W, POOL_WATER_H);
        const poolWater = new WaterMesh(poolWaterGeo, {
          color: "#99e0ff",
          scale: 2,
          flowDirection: new THREE.Vector2(1, 1),
          normalMap0: poolNormal0,
          normalMap1: poolNormal1,
        });
        poolWater.position.set(POOL_X, POOL_BASE_Y + POOL_WATER_Y_OFFSET, POOL_Z);
        poolWater.rotation.x = -PI / 2;
        poolWater.renderOrder = 1000;
        scene.add(poolWater);

        // Stairs to reach the raised pool deck (south side)
        const STAIR_N = 8;
        const STAIR_RISE = (POOL_BASE_Y - FLOOR_Y) / STAIR_N;
        const STAIR_RUN = 0.6;
        const STAIR_W = 10;
        const POOL_SOUTH = POOL_Z - POOL_WATER_H / 2 - 1;
        const stairMat = new THREE.MeshStandardMaterial({
          color: 0xc4b8a8,
          roughness: 0.75,
          metalness: 0.05,
        });
        for (let i = 0; i < STAIR_N; i++) {
          const stepH = (i + 1) * STAIR_RISE;
          const stepMesh = new THREE.Mesh(
            new THREE.BoxGeometry(STAIR_W, stepH, STAIR_RUN),
            stairMat,
          );
          stepMesh.position.set(
            POOL_X,
            FLOOR_Y + stepH / 2,
            POOL_SOUTH - (STAIR_N - i - 0.5) * STAIR_RUN,
          );
          stepMesh.castShadow = true;
          stepMesh.receiveShadow = true;
          stepMesh.renderOrder = 500;
          scene.add(stepMesh);
        }

        // ── CHURCH (solid cube like tower, only door hole — windows later) ──
        const CHURCH_X = -40;
        const CHURCH_Z = -35;
        const CHURCH_S = 20;
        const CHURCH_H = 14;
        const doorW = 2.5;
        const doorH = 4;
        const churchMat = createTileMaterial({
          textureScale: parkourParams.tile.textureScale,
          gradientIntensity: parkourParams.tile.gradientIntensity,
          gradientBias: parkourParams.tile.gradientBias,
          tileColor: parkourParams.tile.tileColor,
          gridColor: parkourParams.tile.gridColor,
          gridLineColor: parkourParams.tile.gridLineColor,
          roughness: parkourParams.tile.roughness,
          metalness: parkourParams.tile.metalness,
        });
        const churchGroup = new THREE.Group();
        churchGroup.position.set(CHURCH_X, FLOOR_Y, CHURCH_Z);

        const HS = CHURCH_S / 2;

        // Floor
        const churchFloor = new THREE.Mesh(
          new THREE.PlaneGeometry(CHURCH_S, CHURCH_S),
          churchMat,
        );
        churchFloor.rotation.x = -PI / 2;
        churchFloor.position.y = 0.01;
        churchFloor.receiveShadow = true;
        churchGroup.add(churchFloor);

        // Back wall (full)
        const churchBack = new THREE.Mesh(
          new THREE.BoxGeometry(CHURCH_S, CHURCH_H, 0.5),
          churchMat,
        );
        churchBack.position.set(0, CHURCH_H / 2, -HS + 0.25);
        churchBack.castShadow = true;
        churchBack.receiveShadow = true;
        churchGroup.add(churchBack);

        // Left wall (full)
        const churchLeft = new THREE.Mesh(
          new THREE.BoxGeometry(0.5, CHURCH_H, CHURCH_S),
          churchMat,
        );
        churchLeft.position.set(-HS + 0.25, CHURCH_H / 2, 0);
        churchLeft.castShadow = true;
        churchLeft.receiveShadow = true;
        churchGroup.add(churchLeft);

        // Right wall (full)
        const churchRight = new THREE.Mesh(
          new THREE.BoxGeometry(0.5, CHURCH_H, CHURCH_S),
          churchMat,
        );
        churchRight.position.set(HS - 0.25, CHURCH_H / 2, 0);
        churchRight.castShadow = true;
        churchRight.receiveShadow = true;
        churchGroup.add(churchRight);

        // Front wall — door cutout (3 segments: left, right, above)
        const doorSide = (CHURCH_S - doorW) / 2;
        const churchFrontL = new THREE.Mesh(
          new THREE.BoxGeometry(doorSide, doorH, 0.5),
          churchMat,
        );
        churchFrontL.position.set(-HS + doorSide / 2, doorH / 2, HS - 0.25);
        churchFrontL.castShadow = true;
        churchFrontL.receiveShadow = true;
        churchGroup.add(churchFrontL);

        const churchFrontR = new THREE.Mesh(
          new THREE.BoxGeometry(doorSide, doorH, 0.5),
          churchMat,
        );
        churchFrontR.position.set(HS - doorSide / 2, doorH / 2, HS - 0.25);
        churchFrontR.castShadow = true;
        churchFrontR.receiveShadow = true;
        churchGroup.add(churchFrontR);

        const churchFrontT = new THREE.Mesh(
          new THREE.BoxGeometry(CHURCH_S, CHURCH_H - doorH, 0.5),
          churchMat,
        );
        churchFrontT.position.set(0, doorH + (CHURCH_H - doorH) / 2, HS - 0.25);
        churchFrontT.castShadow = true;
        churchFrontT.receiveShadow = true;
        churchGroup.add(churchFrontT);

        // Roof (full)
        const churchRoof = new THREE.Mesh(
          new THREE.BoxGeometry(CHURCH_S + 1, 0.5, CHURCH_S + 1),
          churchMat,
        );
        churchRoof.position.y = CHURCH_H + 0.25;
        churchRoof.castShadow = true;
        churchRoof.receiveShadow = true;
        churchGroup.add(churchRoof);

        // Interior surfaces — dark material (ignores lights = real enclosed darkness)
        const interiorInset = 0.35;
        const interiorMat = new THREE.MeshBasicMaterial({
          color: 0x0a0a0a,
        });
        const addInteriorPlane = (w, h, x, y, z, rotX, rotY) => {
          const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(w, h),
            interiorMat,
          );
          plane.rotation.x = rotX ?? 0;
          plane.rotation.y = rotY ?? 0;
          plane.position.set(x, y, z);
          churchGroup.add(plane);
        };
        const innerS = CHURCH_S - interiorInset * 2;
        addInteriorPlane(innerS, innerS, 0, 0.02, 0, -PI / 2, 0);
        addInteriorPlane(innerS, innerS, 0, CHURCH_H - 0.02, 0, PI / 2, 0);
        addInteriorPlane(innerS, CHURCH_H - 0.1, 0, CHURCH_H / 2, -HS + interiorInset, 0, 0);
        addInteriorPlane(innerS, CHURCH_H, -HS + interiorInset, CHURCH_H / 2, 0, 0, PI / 2);
        addInteriorPlane(innerS, CHURCH_H, HS - interiorInset, CHURCH_H / 2, 0, 0, -PI / 2);
        addInteriorPlane(doorSide - 0.1, doorH - 0.1, -HS + doorSide / 2, doorH / 2, HS - interiorInset, 0, PI);
        addInteriorPlane(doorSide - 0.1, doorH - 0.1, HS - doorSide / 2, doorH / 2, HS - interiorInset, 0, PI);
        addInteriorPlane(innerS, CHURCH_H - doorH - 0.1, 0, doorH + (CHURCH_H - doorH) / 2, HS - interiorInset, 0, PI);

        scene.add(churchGroup);

        // ── SKY ──
        const sky = new SkyMesh();
        sky.scale.setScalar(10000);
        scene.add(sky);
        sky.turbidity.value = parkourParams.sky.turbidity;
        sky.rayleigh.value = parkourParams.sky.rayleigh;
        sky.mieCoefficient.value = parkourParams.sky.mie;
        sky.mieDirectionalG.value = parkourParams.sky.mieG;
        sky.sunPosition.value.copy(
          sunDirectionFromAngles(
            parkourParams.light.sunAzimuth,
            parkourParams.light.sunElevation,
          ),
        );

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const skyEnvScene = new THREE.Scene();
        skyEnvScene.add(sky.clone());
        scene.environment = pmremGenerator.fromScene(skyEnvScene, 0.04).texture;
        scene.environmentIntensity = parkourParams.light.envIntensity;

        // ── VOLUMETRIC HAZE (ground mist, Ghost of Tsushima style) ──
        const uHazeThickness = uniform(hazeParams.thickness);
        const uHazeOpacity = uniform(hazeParams.opacity);
        const uHazeFalloff = uniform(hazeParams.falloff);
        const uHazeColor = uniform(new THREE.Color(hazeParams.hazeColor));
        const uNoiseScaleA = uniform(hazeParams.noiseScaleA);
        const uNoiseScaleB = uniform(hazeParams.noiseScaleB);
        const uNoiseAmountA = uniform(hazeParams.noiseAmountA);
        const uNoiseAmountB = uniform(hazeParams.noiseAmountB);
        const uNoiseDetail = uniform(hazeParams.noiseDetail);
        const uNoiseSpeed = uniform(hazeParams.noiseSpeed);
        const hazeTimer = uniform(0).onFrameUpdate((frame) => frame.time);

        function applyVolumetricHaze() {
          if (!hazeParams.enabled) {
            scene.fogNode = null;
            return;
          }
          const fogNoiseDistance = positionView.z
            .negate()
            .smoothstep(0, camera.far - 200);
          const distance = fogNoiseDistance.mul(uHazeThickness).max(8);
          const heightAboveFloor = positionWorld.y.sub(float(FLOOR_Y));
          const groundFogArea = float(distance)
            .sub(heightAboveFloor)
            .div(distance)
            .pow(uHazeFalloff)
            .saturate()
            .mul(uHazeOpacity);
          const fogNoiseA = triNoise3D(
            positionWorld.mul(uNoiseScaleA),
            uNoiseAmountA,
            hazeTimer,
          );
          const fogNoiseB = triNoise3D(
            positionWorld.mul(uNoiseScaleB),
            uNoiseAmountB,
            hazeTimer.mul(uNoiseSpeed),
          );
          const fogNoiseC = triNoise3D(
            positionWorld.mul(0.015),
            uNoiseDetail,
            hazeTimer.mul(0.5),
          );
          const fogNoise = fogNoiseA
            .add(fogNoiseB)
            .add(fogNoiseC)
            .mul(color(uHazeColor));
          const groundColor = color(
            new THREE.Color(parkourParams.light.hemiGroundColor),
          );
          scene.fogNode = fog(
            fogNoiseDistance.oneMinus().mix(groundColor, fogNoise),
            groundFogArea,
          );
        }
        applyVolumetricHaze();

        // ── FLOATING LEAVES ──
        const windParams = {
          uTime: { value: 0 },
          uWindStr: { value: parkourParams.foliage.windStr },
          uWindSpeed: { value: parkourParams.foliage.windSpeed },
        };
        const leaves = createFloatingLeaves({
          scene,
          enabled: parkourParams.foliage.floatingLeaves,
          count: parkourParams.foliage.count,
          maxCount: 500,
          areaSize: parkourParams.foliage.areaSize,
          spawnHeight: parkourParams.foliage.spawnHeight,
          leafSize: parkourParams.foliage.leafSize,
          scale: parkourParams.foliage.scale,
          opacity: parkourParams.foliage.opacity,
          windInfluence: parkourParams.foliage.windInfluence,
          gravity: parkourParams.foliage.gravity,
          terminalVelocity: parkourParams.foliage.terminalVelocity,
          rotationSpeed: parkourParams.foliage.rotationSpeed,
          airResistance: parkourParams.foliage.airResistance,
          maxAge: parkourParams.foliage.maxAge,
          terrainFloorOffset: parkourParams.foliage.terrainFloorOffset,
          getTerrainHeight: () => FLOOR_Y,
          windParams,
        });

        // ── FLOWING LINES ──
        const flowing = createFlowingLines({
          scene,
          getTerrainHeight: (x, z) => FLOOR_Y,
          enabled: parkourParams.flowingLines.enabled,
          lineCount: parkourParams.flowingLines.lineCount,
          lineLength: parkourParams.flowingLines.lineLength,
          lineWidth: parkourParams.flowingLines.lineWidth,
          segments: parkourParams.flowingLines.segments,
          heightOffset: parkourParams.flowingLines.heightOffset,
          verticalWave: parkourParams.flowingLines.verticalWave,
          animationSpeed: parkourParams.flowingLines.animationSpeed,
          pathRadius: parkourParams.flowingLines.pathRadius,
          pathFrequency: parkourParams.flowingLines.pathFrequency,
          lineColor: parkourParams.flowingLines.lineColor,
          lineOpacity: parkourParams.flowingLines.lineOpacity,
        });

        // ── PHYSICS ──
        await RAPIER.init({});
        const { physicsWorld, physicsCubes } = createPhysicsWorld(
          RAPIER,
          scene,
          PARKOUR_SIZE,
          sampleHeight,
          { noDefaultGround: true },
        );

        // Parkour ground: fixed body so floor surface is at FLOOR_Y (top of cuboid) — matches index physics setup
        const groundHalfY = 0.5;
        const groundBodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(
          0,
          FLOOR_Y - groundHalfY,
          0,
        );
        const groundBody = physicsWorld.createRigidBody(groundBodyDesc);
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(
            PARKOUR_SIZE * 0.5,
            groundHalfY,
            PARKOUR_SIZE * 0.5,
          ),
          groundBody,
        );

        // Three separate cuboids — one per visual part — so each exactly matches its mesh.
        // A single merged box used TOWER_BASE*0.9 XZ, but the base is TOWER_BASE*2 wide
        // (half = TOWER_BASE), leaving a 2.4-unit gap the player could walk into.
        const _towerBase = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            TOWER_X,
            FLOOR_Y + TOWER_BASE / 2,
            TOWER_Z,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(TOWER_BASE, TOWER_BASE / 2, TOWER_BASE),
          _towerBase,
        );
        const _towerBody = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            TOWER_X,
            FLOOR_Y + TOWER_BASE + TOWER_HEIGHT / 2,
            TOWER_Z,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(
            TOWER_BASE * 0.8,
            TOWER_HEIGHT / 2,
            TOWER_BASE * 0.8,
          ),
          _towerBody,
        );
        const _towerTop = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            TOWER_X,
            FLOOR_Y + TOWER_BASE + TOWER_HEIGHT + TOWER_BASE * 0.4,
            TOWER_Z,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(
            TOWER_BASE * 0.9,
            TOWER_BASE * 0.4,
            TOWER_BASE * 0.9,
          ),
          _towerTop,
        );

        // Church colliders (solid cube, door opening only)
        const churchHS = CHURCH_S / 2;
        const _churchFrontL = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            CHURCH_X - churchHS + doorSide / 2,
            FLOOR_Y + doorH / 2,
            CHURCH_Z + churchHS - 0.25,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(doorSide / 2, doorH / 2, 0.25),
          _churchFrontL,
        );
        const _churchFrontR = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            CHURCH_X + churchHS - doorSide / 2,
            FLOOR_Y + doorH / 2,
            CHURCH_Z + churchHS - 0.25,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(doorSide / 2, doorH / 2, 0.25),
          _churchFrontR,
        );
        const _churchFrontT = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            CHURCH_X,
            FLOOR_Y + doorH + (CHURCH_H - doorH) / 2,
            CHURCH_Z + churchHS - 0.25,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(
            CHURCH_S / 2,
            (CHURCH_H - doorH) / 2,
            0.25,
          ),
          _churchFrontT,
        );
        const _churchBack = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            CHURCH_X,
            FLOOR_Y + CHURCH_H / 2,
            CHURCH_Z - churchHS + 0.25,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(CHURCH_S / 2, CHURCH_H / 2, 0.25),
          _churchBack,
        );
        const _churchLeft = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            CHURCH_X - churchHS + 0.25,
            FLOOR_Y + CHURCH_H / 2,
            CHURCH_Z,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(0.25, CHURCH_H / 2, CHURCH_S / 2),
          _churchLeft,
        );
        const _churchRight = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            CHURCH_X + churchHS - 0.25,
            FLOOR_Y + CHURCH_H / 2,
            CHURCH_Z,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(0.25, CHURCH_H / 2, CHURCH_S / 2),
          _churchRight,
        );
        const _churchRoof = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(
            CHURCH_X,
            FLOOR_Y + CHURCH_H + 0.25,
            CHURCH_Z,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid((CHURCH_S + 1) / 2, 0.25, (CHURCH_S + 1) / 2),
          _churchRoof,
        );

        // Pool GLB trimesh collider (deck, walls, floor — player can walk inside)
        // Water has no collider.
        scene.updateMatrixWorld();
        const _poolBox = new THREE.Box3();
        const _poolCenter = new THREE.Vector3();
        const _poolV = new THREE.Vector3();
        poolGltf.scene.updateMatrixWorld(true);
        _poolBox.setFromObject(poolGltf.scene);
        _poolBox.getCenter(_poolCenter);
        const poolVerts = [];
        const poolInds = [];
        let poolVertexOffset = 0;
        poolGltf.scene.traverse((child) => {
          if (!child.isMesh || !child.geometry) return;
          const geo = child.geometry;
          const posAttr =
            geo.getAttribute?.("position") ?? geo.attributes?.position;
          if (!posAttr || posAttr.count < 3) return;
          const worldMat = child.matrixWorld;
          for (let i = 0; i < posAttr.count; i++) {
            _poolV.fromBufferAttribute(posAttr, i).applyMatrix4(worldMat);
            poolVerts.push(
              _poolV.x - _poolCenter.x,
              _poolV.y - _poolCenter.y,
              _poolV.z - _poolCenter.z,
            );
          }
          const idxAttr = geo.index;
          if (idxAttr) {
            for (let i = 0; i < idxAttr.count; i++)
              poolInds.push(poolVertexOffset + idxAttr.getX(i));
          } else {
            for (let i = 0; i < posAttr.count; i++)
              poolInds.push(poolVertexOffset + i);
          }
          poolVertexOffset += posAttr.count;
        });
        if (poolVerts.length >= 9 && poolInds.length >= 3) {
          const tf = RAPIER.TriMeshFlags ?? {};
          const flags =
            (tf.MERGE_DUPLICATE_VERTICES ?? 16) |
            (tf.DELETE_DEGENERATE_TRIANGLES ?? 32) |
            (tf.FIX_INTERNAL_EDGES ?? 144);
          try {
            const poolBody = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed().setTranslation(
                _poolCenter.x,
                _poolCenter.y,
                _poolCenter.z,
              ),
            );
            physicsWorld.createCollider(
              RAPIER.ColliderDesc.trimesh(
                new Float32Array(poolVerts),
                new Uint32Array(poolInds),
                flags,
              ),
              poolBody,
            );
          } catch (e) {
            console.warn("Pool trimesh collider failed:", e);
          }
        }

        // Stair colliders
        for (let i = 0; i < STAIR_N; i++) {
          const stepH = (i + 1) * STAIR_RISE;
          physicsWorld.createCollider(
            RAPIER.ColliderDesc.cuboid(
              STAIR_W / 2,
              stepH / 2,
              STAIR_RUN / 2,
            ),
            physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed().setTranslation(
                POOL_X,
                FLOOR_Y + stepH / 2,
                POOL_SOUTH - (STAIR_N - i - 0.5) * STAIR_RUN,
              ),
            ),
          );
        }

        // Parkour platforms: one trimesh per platform (merge all meshes, like index7 ruins)
        // Per Rapier docs: vertices=Float32Array [x,y,z,...], indices=Uint32Array [i0,i1,i2,...]
        // IMPORTANT: force-update the full scene graph so parkourGroup.matrixWorld reflects its
        // position.y = FLOOR_Y offset before we sample child worldMatrix values for colliders.
        // Without this, parkourGroup.matrixWorld stays identity and every trimesh ends up 1 unit
        // below the visual mesh (inside the ground), making platforms un-walkable.
        scene.updateMatrixWorld();
        const _box = new THREE.Box3();
        const _center = new THREE.Vector3();
        const _v = new THREE.Vector3();
        for (const platform of parkourGroup.children) {
          platform.updateMatrixWorld(true);
          _box.setFromObject(platform);
          _box.getCenter(_center);
          const verts = [];
          const inds = [];
          let vertexOffset = 0;
          platform.traverse((child) => {
            if (!child.isMesh || !child.geometry) return;
            const geo = child.geometry;
            const posAttr =
              geo.getAttribute?.("position") ?? geo.attributes?.position;
            if (!posAttr || posAttr.count < 3) return;
            const worldMat = child.matrixWorld;
            for (let i = 0; i < posAttr.count; i++) {
              _v.fromBufferAttribute(posAttr, i).applyMatrix4(worldMat);
              verts.push(_v.x - _center.x, _v.y - _center.y, _v.z - _center.z);
            }
            const idxAttr = geo.index;
            if (idxAttr) {
              for (let i = 0; i < idxAttr.count; i++)
                inds.push(vertexOffset + idxAttr.getX(i));
            } else {
              for (let i = 0; i < posAttr.count; i++)
                inds.push(vertexOffset + i);
            }
            vertexOffset += posAttr.count;
          });
          if (verts.length < 9 || inds.length < 3) continue; // need at least 1 triangle
          const platformVerts = new Float32Array(verts);
          const platformInds = new Uint32Array(inds);
          // TriMeshFlags: MERGE_DUPLICATE=16, DELETE_DEGENERATE=32, FIX_INTERNAL_EDGES=144
          const tf = RAPIER.TriMeshFlags ?? {};
          const flags =
            (tf.MERGE_DUPLICATE_VERTICES ?? 16) |
            (tf.DELETE_DEGENERATE_TRIANGLES ?? 32) |
            (tf.FIX_INTERNAL_EDGES ?? 144);
          try {
            const platformBody = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed().setTranslation(
                _center.x,
                _center.y,
                _center.z,
              ),
            );
            const colliderDesc = RAPIER.ColliderDesc.trimesh(
              platformVerts,
              platformInds,
              flags,
            );
            physicsWorld.createCollider(colliderDesc, platformBody);
          } catch (e) {
            console.warn(
              "Parkour collider failed for",
              platform.name || platform.uuid,
              e,
            );
          }
        }

        // Hide the default world cubes (they spawn far away)
        physicsCubes.forEach(({ mesh }) => {
          mesh.visible = false;
        });

        // ── DYNAMIC PROPS ──────────────────────────────────────────────────────
        // boxes: [x, z, half-size, mass, color]  — y is computed from FLOOR_Y+half
        // ball:  [x, z, radius,    mass, color]
        const BOX_DEFS = [
          // tiny light (easy to kick) — red / orange / yellow
          [-3, -4, 0.3, 1, 0xff3333],
          [-4, -2, 0.3, 1, 0xff8800],
          [-2, -6, 0.3, 1, 0xffdd00],
          // medium (jump on / push with effort) — green / blue
          [4, -6, 0.5, 15, 0x33cc44],
          [6, -4, 0.5, 15, 0x3388ff],
          // stacked pair — purple tones
          [0, -8, 0.4, 5, 0xcc33ff],
          [0, -8, 0.4, 5, 0xff33cc], // spawns on top of previous
          // heavy blocks (barely budge, great to jump on) — dark blue / red
          [-5, 5, 0.75, 80, 0x2244dd],
          [5, 5, 0.75, 80, 0xdd4422],
        ];
        const BALL_DEFS = [
          // [x, z, radius, mass, color]
          [2, -4, 0.45, 3, 0xffffff],
          [-1, -3, 0.25, 1, 0xffaaff],
        ];

        // Dominos: 7 thin standing slabs in a line (push the first to knock the chain)
        const DOMINO_DEFS = [];
        for (let i = 0; i < 7; i++) {
          DOMINO_DEFS.push([3 + i * 0.65, -3]); // [x, z]
        }

        const dynamicObjects = []; // { body, mesh } — synced every frame

        let stackOffset = 0; // for the stacked pair
        for (const [bx, bz, bh, mass, color] of BOX_DEFS) {
          const isStack = bx === 0 && bz === -8;
          const by = FLOOR_Y + bh + stackOffset;
          if (isStack) stackOffset += bh * 2 + 0.05;
          const body = physicsWorld.createRigidBody(
            RAPIER.RigidBodyDesc.dynamic()
              .setTranslation(bx, by, bz)
              .setAdditionalMass(mass),
          );
          physicsWorld.createCollider(
            RAPIER.ColliderDesc.cuboid(bh, bh, bh),
            body,
          );
          const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(bh * 2, bh * 2, bh * 2),
            new THREE.MeshStandardMaterial({
              color,
              roughness: 0.55,
              metalness: 0.1,
            }),
          );
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          scene.add(mesh);
          dynamicObjects.push({ body, mesh });
        }

        for (const [bx, bz, r, mass, color] of BALL_DEFS) {
          const body = physicsWorld.createRigidBody(
            RAPIER.RigidBodyDesc.dynamic()
              .setTranslation(bx, FLOOR_Y + r, bz)
              .setAdditionalMass(mass),
          );
          physicsWorld.createCollider(RAPIER.ColliderDesc.ball(r), body);
          const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(r, 14, 10),
            new THREE.MeshStandardMaterial({
              color,
              roughness: 0.3,
              metalness: 0.2,
            }),
          );
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          scene.add(mesh);
          dynamicObjects.push({ body, mesh });
        }

        const dominoHx = 0.09,
          dominoHy = 0.75,
          dominoHz = 0.35;
        for (const [dx, dz] of DOMINO_DEFS) {
          const body = physicsWorld.createRigidBody(
            RAPIER.RigidBodyDesc.dynamic()
              .setTranslation(dx, FLOOR_Y + dominoHy, dz)
              .setAdditionalMass(2),
          );
          physicsWorld.createCollider(
            RAPIER.ColliderDesc.cuboid(dominoHx, dominoHy, dominoHz),
            body,
          );
          const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(dominoHx * 2, dominoHy * 2, dominoHz * 2),
            new THREE.MeshStandardMaterial({
              color: 0xddaa33,
              roughness: 0.6,
              metalness: 0.05,
            }),
          );
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          scene.add(mesh);
          dynamicObjects.push({ body, mesh });
        }

        // ── MOVING PLATFORM ────────────────────────────────────────────────────
        const movPlatBody = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(
            -8,
            FLOOR_Y + 0.25,
            0,
          ),
        );
        physicsWorld.createCollider(
          RAPIER.ColliderDesc.cuboid(2, 0.25, 2),
          movPlatBody,
        );
        const movPlatMesh = new THREE.Mesh(
          new THREE.BoxGeometry(4, 0.5, 4),
          new THREE.MeshStandardMaterial({
            color: 0x88ffaa,
            roughness: 0.4,
            metalness: 0.3,
          }),
        );
        movPlatMesh.castShadow = true;
        movPlatMesh.receiveShadow = true;
        scene.add(movPlatMesh);

        // ── STEP HEIGHT TEST ──────────────────────────────────────────────────
        // A row of blocks with increasing heights at Z=22.  Walk north from spawn
        // and try to walk directly into each block to see the auto-step threshold,
        // then jump to verify clearance.  Heights go from 5 cm to 80 cm.
        {
          const STEP_HEIGHTS  = [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.40, 0.50, 0.65, 0.80];
          const STEP_SPACING  = 2.6;   // centre-to-centre along X
          const STEP_BW       = 2.0;   // block X width  — wide enough for capsule
          const STEP_BD       = 2.0;   // block Z depth
          const STEP_Z        = 22;    // row Z position
          const totalW = (STEP_HEIGHTS.length - 1) * STEP_SPACING;
          for (let i = 0; i < STEP_HEIGHTS.length; i++) {
            const h  = STEP_HEIGHTS[i];
            const bx = -totalW * 0.5 + i * STEP_SPACING;
            const by = FLOOR_Y + h * 0.5;
            // Colour gradient: green (short/easy) → red (tall/jump required)
            const t = i / (STEP_HEIGHTS.length - 1);
            const color = new THREE.Color().setHSL(0.33 * (1 - t), 0.65, 0.50);
            const mesh = new THREE.Mesh(
              new THREE.BoxGeometry(STEP_BW, h, STEP_BD),
              new THREE.MeshStandardMaterial({ color, roughness: 0.75 }));
            mesh.position.set(bx, by, STEP_Z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            const body = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed().setTranslation(bx, by, STEP_Z));
            physicsWorld.createCollider(
              RAPIER.ColliderDesc.cuboid(STEP_BW * 0.5, h * 0.5, STEP_BD * 0.5), body);
          }
        }

        // ── STAIRS ────────────────────────────────────────────────────────────
        // 10 steps × 20 cm rise / 60 cm run at X=20, going north (+Z).
        // Rise is well under the 35 cm autostep limit so every step is walkable.
        // Layout: ascending stairs → 4 m landing → descending stairs back to floor.
        {
          const STAIR_N    = 10;
          const STAIR_RISE = 0.20;   // 20 cm per step
          const STAIR_RUN  = 0.60;   // 60 cm tread depth
          const STAIR_W    = 4.0;    // 4 m wide
          const STAIR_X    = 20;
          const STAIR_Z0   = 4;      // Z of bottom riser face
          const STAIR_H    = STAIR_N * STAIR_RISE;  // 2.0 m total height
          const mat = new THREE.MeshStandardMaterial({ color: 0xb8a080, roughness: 0.85 });
          const hw = STAIR_W / 2, hr = STAIR_RUN / 2;

          const addStepBox = (bx, by, bz, hh, hd) => {
            const mesh = new THREE.Mesh(
              new THREE.BoxGeometry(STAIR_W, hh * 2, hd * 2), mat);
            mesh.position.set(bx, by, bz);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            const body = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed().setTranslation(bx, by, bz));
            physicsWorld.createCollider(
              RAPIER.ColliderDesc.cuboid(hw, hh, hd), body);
          };

          // Ascending steps — each box is full height from floor so they look solid
          for (let i = 0; i < STAIR_N; i++) {
            const stepH = (i + 1) * STAIR_RISE;
            addStepBox(STAIR_X, FLOOR_Y + stepH / 2, STAIR_Z0 + (i + 0.5) * STAIR_RUN, stepH / 2, hr);
          }

          // Top landing
          const LAND_Z0 = STAIR_Z0 + STAIR_N * STAIR_RUN;  // Z = 10
          const LAND_D  = 4.0;
          addStepBox(STAIR_X, FLOOR_Y + STAIR_H / 2, LAND_Z0 + LAND_D / 2, STAIR_H / 2, LAND_D / 2);

          // Descending steps — mirror of ascent on the far side of the landing
          const DESC_Z0 = LAND_Z0 + LAND_D;  // Z = 14
          for (let i = 0; i < STAIR_N; i++) {
            const stepH = (STAIR_N - i) * STAIR_RISE;
            addStepBox(STAIR_X, FLOOR_Y + stepH / 2, DESC_Z0 + (i + 0.5) * STAIR_RUN, stepH / 2, hr);
          }
        }

        // ── TUNNEL ────────────────────────────────────────────────────────────
        // 10 m long at X=0, Z=32–42. Inner: 5 m wide × 1.7 m tall.
        // Too low to walk through standing (char = 2.5 m).
        // Hold Ctrl to crouch (~1.26 m) and slide through.
        // Headroom ray-cast in player.js prevents standing up inside.
        {
          const TUN_Z0  = 32;
          const TUN_LEN = 10;
          const TUN_ZC  = TUN_Z0 + TUN_LEN / 2;
          const TUN_IW  = 5.0;   // inner width
          const TUN_IH  = 1.7;   // inner height (fits crouch ≈1.26 m, blocks stand ≈2.5 m)
          const TUN_THK = 0.55;  // wall / ceiling thickness
          const TUN_HL  = TUN_LEN / 2;
          const mat = new THREE.MeshStandardMaterial({ color: 0x4e4640, roughness: 0.9 });

          const addTunBox = (x, y, z, hw, hh, hd) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(hw * 2, hh * 2, hd * 2), mat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            const body = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed().setTranslation(x, y, z));
            physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(hw, hh, hd), body);
          };

          const wallHH   = (TUN_IH + TUN_THK) / 2;
          const wallY    = FLOOR_Y + wallHH;
          const halfSide = TUN_IW / 2 + TUN_THK / 2;

          addTunBox(-halfSide, wallY, TUN_ZC, TUN_THK / 2, wallHH, TUN_HL); // left wall
          addTunBox( halfSide, wallY, TUN_ZC, TUN_THK / 2, wallHH, TUN_HL); // right wall
          addTunBox(0, FLOOR_Y + TUN_IH + TUN_THK / 2, TUN_ZC,              // ceiling
            TUN_IW / 2 + TUN_THK, TUN_THK / 2, TUN_HL);
        }

        // ── MOVING PLATFORM GAUNTLET ─────────────────────────────────────────
        // 5 kinematic platforms north of the tunnel (Z≈51–73), each with a
        // distinct motion type.  Colour-coded easy (blue) → hard (red).
        // A launch pad at Z=48 gives a clean entry from the tunnel exit.
        // A gold goal pad at Z=77 marks the finish.
        const movingGauntlet = [];   // { body, mesh, fn(t)→{x,y,z} } updated every frame
        {
          const MPG_HH = 0.15;   // half-height for all pads
          const addStaticPad = (x, y, z, hw, hd, col) => {
            const mesh = new THREE.Mesh(
              new THREE.BoxGeometry(hw * 2, MPG_HH * 2, hd * 2),
              new THREE.MeshStandardMaterial({ color: col, roughness: 0.5, metalness: 0.2 }));
            mesh.position.set(x, y, z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            const b = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed().setTranslation(x, y, z));
            physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(hw, MPG_HH, hd), b);
          };

          // Launch pad — standing point right after the tunnel, at floor level
          addStaticPad(0, FLOOR_Y + MPG_HH, 48, 3.5, 2.5, 0x6688cc);
          // Goal platform — visible gold finish marker
          addStaticPad(0, FLOOR_Y + 0.5, 77, 3.5, 2.5, 0xffdd44);

          const mpDefs = [
            // 1. Lateral sweep — slides ±3.5 m along X  (speed 0.85 rad/s, easy)
            { fn: (t) => ({ x: Math.sin(t * 0.85) * 3.5, y: FLOOR_Y + 1.5, z: 51 }),
              hw: 1.3, hd: 1.3, col: 0x44aaff },
            // 2. Depth surge — slides ±2 m along Z from base Z=57  (speed 1.1, medium)
            { fn: (t) => ({ x: 0, y: FLOOR_Y + 2.0, z: 57 + Math.sin(t * 1.1) * 2.0 }),
              hw: 1.2, hd: 1.2, col: 0x44ddaa },
            // 3. Elevator — Y oscillates between 1 and 3.5 m at Z=63  (speed 0.9, medium)
            { fn: (t) => ({ x: 0, y: FLOOR_Y + 1 + (Math.sin(t * 0.9) * 0.5 + 0.5) * 2.5, z: 63 }),
              hw: 1.3, hd: 1.3, col: 0xaadd44 },
            // 4. Circular orbit — rotates around Z=67 at radius 2.5 in XZ  (speed 0.65, hard)
            { fn: (t) => ({ x: Math.cos(t * 0.65) * 2.5, y: FLOOR_Y + 2.5,
                z: 67 + Math.sin(t * 0.65) * 1.5 }),
              hw: 1.1, hd: 1.1, col: 0xffaa33 },
            // 5. Fast sweeper — slides ±3.8 m along X at Z=73  (speed 1.5, hardest)
            { fn: (t) => ({ x: Math.sin(t * 1.5) * 3.8, y: FLOOR_Y + 2.0, z: 73 }),
              hw: 1.0, hd: 1.0, col: 0xff4444 },
          ];

          for (const def of mpDefs) {
            const p0 = def.fn(0);
            const body = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.kinematicPositionBased()
                .setTranslation(p0.x, p0.y, p0.z));
            physicsWorld.createCollider(
              RAPIER.ColliderDesc.cuboid(def.hw, MPG_HH, def.hd), body);
            const mesh = new THREE.Mesh(
              new THREE.BoxGeometry(def.hw * 2, MPG_HH * 2, def.hd * 2),
              new THREE.MeshStandardMaterial({ color: def.col, roughness: 0.45, metalness: 0.25 }));
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            movingGauntlet.push({ body, mesh, fn: def.fn });
          }
        }

        // ── DEBUG ELEVATOR ────────────────────────────────────────────────────
        // Simple kinematic platform at X=8, Z=0 that oscillates vertically
        // between FLOOR_Y+0.3 and FLOOR_Y+4 — used to test platform-following.
        const debugElevator = (() => {
          const ELV_X = 8, ELV_Z = 0;
          const ELV_HW = 2.0, ELV_HH = 0.25, ELV_HD = 2.0;
          // Top surface flush with floor at lowest so player can walk straight onto it.
          // (If the elevator starts higher, it rises into the player's capsule — Rapier
          // KCC can't resolve kinematic bodies moving INTO a kinematic character.)
          const ELV_LO = FLOOR_Y - ELV_HH;  // centre: top surface = FLOOR_Y exactly
          const ELV_HI = FLOOR_Y + 4.0;
          const ELV_SPD = 0.5;  // rad/s
          // physics body
          const rbDesc = RAPIER.RigidBodyDesc.kinematicPositionBased()
            .setTranslation(ELV_X, ELV_LO, ELV_Z);
          const body = physicsWorld.createRigidBody(rbDesc);
          const colDesc = RAPIER.ColliderDesc.cuboid(ELV_HW, ELV_HH, ELV_HD);
          physicsWorld.createCollider(colDesc, body);
          // visual mesh
          const geo  = new THREE.BoxGeometry(ELV_HW * 2, ELV_HH * 2, ELV_HD * 2);
          const mat  = new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.5, metalness: 0.3 });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.castShadow = true; mesh.receiveShadow = true;
          scene.add(mesh);
          // label so it's easy to spot
          const fn = (t) => {
            const y = ELV_LO + (ELV_HI - ELV_LO) * (0.5 - 0.5 * Math.cos(ELV_SPD * t));
            return { x: ELV_X, y, z: ELV_Z };
          };
          return { body, mesh, fn };
        })();

        // ── PUSHABLE BOX PUZZLE ───────────────────────────────────────────────
        // A 2.5 m ledge at X=15, Z=-25 that is too tall to jump from the ground.
        // Push the heavy crate south against the ledge face, then step on it
        // and jump to reach the green goal pad on top.
        // Guide walls on each side keep the crate aimed at the ledge.
        {
          const PBX      = 15;
          const LEDGE_Z  = -25;   // Z of ledge south face (player approaches from south)
          const LEDGE_H  = 2.5;   // just out of plain-jump reach (~1.5 m jump from ground)
          const LEDGE_W  = 5.0;
          const LEDGE_D  = 3.5;
          const CRATE_S  = 1.0;   // side of the cube crate

          const stoneMat = new THREE.MeshStandardMaterial({ color: 0xb0a090, roughness: 0.85 });
          const crateMat = new THREE.MeshStandardMaterial({ color: 0x7a5a2a, roughness: 0.9, metalness: 0.05 });
          const goalMat  = new THREE.MeshStandardMaterial({ color: 0x66ff88, roughness: 0.5 });

          // Ledge body
          const ledgeCy = FLOOR_Y + LEDGE_H / 2;
          const ledgeCz = LEDGE_Z + LEDGE_D / 2;
          {
            const m = new THREE.Mesh(new THREE.BoxGeometry(LEDGE_W, LEDGE_H, LEDGE_D), stoneMat);
            m.position.set(PBX, ledgeCy, ledgeCz);
            m.castShadow = true; m.receiveShadow = true;
            scene.add(m);
            const b = physicsWorld.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(PBX, ledgeCy, ledgeCz));
            physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(LEDGE_W / 2, LEDGE_H / 2, LEDGE_D / 2), b);
          }

          // Goal pad on ledge top (green = success)
          {
            const gy = FLOOR_Y + LEDGE_H + 0.06;
            const m = new THREE.Mesh(new THREE.BoxGeometry(LEDGE_W - 0.4, 0.12, LEDGE_D - 0.4), goalMat);
            m.position.set(PBX, gy, ledgeCz);
            scene.add(m);
          }

          // Channel guide walls — keep the crate aimed straight at the ledge face
          const GUIDE_Z0  = LEDGE_Z - 7;   // south start of channel
          const GUIDE_D   = (LEDGE_Z - GUIDE_Z0) / 2;
          const GUIDE_CZ  = GUIDE_Z0 + GUIDE_D;
          const GUIDE_HH  = 0.9;
          for (const gx of [PBX - LEDGE_W / 2, PBX + LEDGE_W / 2]) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.3, GUIDE_HH * 2, GUIDE_D * 2), stoneMat);
            m.position.set(gx, FLOOR_Y + GUIDE_HH, GUIDE_CZ);
            m.castShadow = true; m.receiveShadow = true;
            scene.add(m);
            const b = physicsWorld.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(gx, FLOOR_Y + GUIDE_HH, GUIDE_CZ));
            physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(0.15, GUIDE_HH, GUIDE_D), b);
          }

          // Pushable crate — dynamic, heavy & damped so it doesn't bounce wildly
          const crateBody = physicsWorld.createRigidBody(
            RAPIER.RigidBodyDesc.dynamic()
              .setTranslation(PBX, FLOOR_Y + CRATE_S / 2, LEDGE_Z - 4.5)
              .setLinearDamping(3.5)
              .setAngularDamping(10.0)
              .setAdditionalMass(14));
          physicsWorld.createCollider(
            RAPIER.ColliderDesc.cuboid(CRATE_S / 2, CRATE_S / 2, CRATE_S / 2), crateBody);
          const crateMesh = new THREE.Mesh(
            new THREE.BoxGeometry(CRATE_S, CRATE_S, CRATE_S), crateMat);
          crateMesh.castShadow = true; crateMesh.receiveShadow = true;
          scene.add(crateMesh);
          dynamicObjects.push({ body: crateBody, mesh: crateMesh });
        }

        // ── PENDULUM GAUNTLET ─────────────────────────────────────────────────
        // 3 swinging bobs (kinematic) at Z=-30, -38, -46, south of spawn.
        // Each pivots at Y=6.2 and swings ±40-45° along X with different
        // speeds and start phases.  Wait for the bob to reach full extension,
        // then dash through the centre to the teal goal pad at Z=-52.
        const pendulumBods = [];   // { body, mesh, rope*, pivot*, amp, freq, phase }
        {
          const PND_ROPE = 3.5;    // rope length (m)
          const PND_BOB  = 0.55;   // bob sphere radius
          const PND_PIVH = FLOOR_Y + 5.8;  // pivot height above world origin
          const PND_COL  = [0xcc4422, 0xdd8811, 0xcc2266];
          const ropeMat  = new THREE.LineBasicMaterial({ color: 0x554433 });

          const pndDefs = [
            { z: -30, amp: 0.70, freq: 0.80, phase: 0.0          },  // slow,   ~40°
            { z: -38, amp: 0.65, freq: 1.05, phase: Math.PI * 0.7 },  // medium, offset
            { z: -46, amp: 0.75, freq: 1.28, phase: Math.PI * 1.4 },  // fast,   wider
          ];

          // Teal goal pad at south end
          {
            const gm = new THREE.Mesh(
              new THREE.BoxGeometry(6, 0.2, 3.5),
              new THREE.MeshStandardMaterial({ color: 0x44ddcc, roughness: 0.5 }));
            gm.position.set(0, FLOOR_Y + 0.1, -52);
            scene.add(gm);
            const gb = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed().setTranslation(0, FLOOR_Y + 0.1, -52));
            physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(3, 0.1, 1.75), gb);
          }

          for (let i = 0; i < pndDefs.length; i++) {
            const def = pndDefs[i];

            // Pivot post — visual only (thin dark pillar)
            const postH = PND_PIVH - FLOOR_Y;
            const postM = new THREE.Mesh(
              new THREE.BoxGeometry(0.22, postH, 0.22),
              new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.85 }));
            postM.position.set(0, FLOOR_Y + postH / 2, def.z);
            postM.castShadow = true;
            scene.add(postM);

            // Kinematic bob
            const ang0 = def.amp * Math.sin(def.phase);
            const bx0  = Math.sin(ang0) * PND_ROPE;
            const by0  = PND_PIVH - Math.cos(ang0) * PND_ROPE;
            const body = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.kinematicPositionBased()
                .setTranslation(bx0, by0, def.z));
            physicsWorld.createCollider(RAPIER.ColliderDesc.ball(PND_BOB), body);
            const mesh = new THREE.Mesh(
              new THREE.SphereGeometry(PND_BOB, 14, 10),
              new THREE.MeshStandardMaterial({ color: PND_COL[i], roughness: 0.4, metalness: 0.3 }));
            mesh.castShadow = true;
            scene.add(mesh);

            // Rope line (two points: pivot → bob, updated every frame)
            const ropePts = new Float32Array([0, PND_PIVH, def.z, bx0, by0, def.z]);
            const ropeGeo = new THREE.BufferGeometry();
            ropeGeo.setAttribute('position', new THREE.BufferAttribute(ropePts, 3));
            const ropeLine = new THREE.Line(ropeGeo, ropeMat);
            ropeLine.frustumCulled = false;
            scene.add(ropeLine);

            pendulumBods.push({
              body, mesh, ropeLine, ropePts,
              pivotY: PND_PIVH, pivotZ: def.z,
              ropeLen: PND_ROPE, amp: def.amp, freq: def.freq, phase: def.phase,
            });
          }
        }

        // Mesh/body collectors for tweakpane show-hide
        const b1Vis = [], b1Phy = [];  // bridge 1 (physics)
        const b2Vis = [], b2Phy = [];  // bridge 2 (spring)

        // ── FLEXIBLE ROPE BRIDGE ──────────────────────────────────────────────
        // Chain of planks linked by spherical joints (ball-socket), anchored at
        // both ends to fixed pillars. Sways under the player's movement impulses.
        const BRIDGE_X      = -15;
        const BRIDGE_Z_MIN  = -12;
        const BRIDGE_Z_MAX  =  12;
        const BRIDGE_Y      = FLOOR_Y + 3.5;   // deck height
        const N_PLANKS      = 12;
        const BSPAN         = BRIDGE_Z_MAX - BRIDGE_Z_MIN;  // 24 units
        const BSTEP         = BSPAN / N_PLANKS;              // 2 units/plank
        const P_HW = 1.5,  P_HH = 0.09,  P_HD = BSTEP * 0.38; // half extents
        const BRIDGE_CENTER_Z = (BRIDGE_Z_MIN + BRIDGE_Z_MAX) * 0.5;
        const MAX_SAG = 0.4; // centre sags this many units below anchor height

        // Pillar visuals + colliders at each end
        {
          const pillarH = BRIDGE_Y - FLOOR_Y + 0.5;
          const pillarGeo = new THREE.BoxGeometry(P_HW * 2 + 0.4, pillarH, 1.2);
          const pillarMat = new THREE.MeshStandardMaterial({ color: 0x7a5c3a, roughness: 0.9 });
          for (const pz of [BRIDGE_Z_MIN, BRIDGE_Z_MAX]) {
            const py = FLOOR_Y + pillarH * 0.5;
            const m = new THREE.Mesh(pillarGeo, pillarMat);
            m.position.set(BRIDGE_X, py, pz);
            m.castShadow = true; m.receiveShadow = true;
            scene.add(m); b1Vis.push(m);
            const pb = physicsWorld.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(BRIDGE_X, py, pz));
            physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(P_HW + 0.2, pillarH * 0.5, 0.6), pb);
            b1Phy.push(pb);
          }
        }

        // Access ramps — one tilted box at each bridge end so the player can walk up
        {
          const RAMP_RUN  = 10;   // horizontal length of ramp
          const rampAngle = Math.atan2(BRIDGE_Y - FLOOR_Y, RAMP_RUN); // tilt angle
          const rampLen   = Math.sqrt(RAMP_RUN * RAMP_RUN + (BRIDGE_Y - FLOOR_Y) ** 2);
          const rampMat   = new THREE.MeshStandardMaterial({ color: 0x9a7a5a, roughness: 0.8 });
          const rampGeo   = new THREE.BoxGeometry(P_HW * 2 + 0.4, 0.4, rampLen);
          // [anchorZ, sign]: sign < 0 → ramp runs from low (outside) to high (bridge entry)
          for (const [anchorZ, sign] of [[BRIDGE_Z_MIN, -1], [BRIDGE_Z_MAX, 1]]) {
            const cz = anchorZ + sign * RAMP_RUN * 0.5;
            const cy = FLOOR_Y + (BRIDGE_Y - FLOOR_Y) * 0.5;
            const rx = sign * rampAngle;
            const q  = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), rx);
            // visual
            const m = new THREE.Mesh(rampGeo, rampMat);
            m.position.set(BRIDGE_X, cy, cz);
            m.quaternion.copy(q);
            m.castShadow = true; m.receiveShadow = true;
            scene.add(m); b1Vis.push(m);
            // collider
            const rb = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.fixed()
                .setTranslation(BRIDGE_X, cy, cz)
                .setRotation({ x: q.x, y: q.y, z: q.z, w: q.w }));
            physicsWorld.createCollider(
              RAPIER.ColliderDesc.cuboid(P_HW + 0.2, 0.2, rampLen * 0.5), rb);
            b1Phy.push(rb);
          }
        }

        // Fixed anchor bodies at deck height (joint attachment only, no collider needed)
        const bridgeAnchorA = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(BRIDGE_X, BRIDGE_Y, BRIDGE_Z_MIN));
        const bridgeAnchorB = physicsWorld.createRigidBody(
          RAPIER.RigidBodyDesc.fixed().setTranslation(BRIDGE_X, BRIDGE_Y, BRIDGE_Z_MAX));
        b1Phy.push(bridgeAnchorA, bridgeAnchorB);

        // Planks — pre-positioned on a parabolic arc so the chain starts near equilibrium.
        // Each plank is also pre-rotated to match the catenary tangent angle at its position,
        // minimising joint stress at spawn and preventing oscillation from the start.
        const bridgePlanks = [];
        const _iq = new THREE.Quaternion();
        {
          const plankGeo = new THREE.BoxGeometry(P_HW * 2, P_HH * 2, P_HD * 2);
          const plankMat = new THREE.MeshStandardMaterial({ color: 0xa07830, roughness: 0.85 });
          for (let i = 0; i < N_PLANKS; i++) {
            const pz  = BRIDGE_Z_MIN + BSTEP * (i + 0.5);
            const rel = (pz - BRIDGE_CENTER_Z) / (BSPAN * 0.5);
            const py  = BRIDGE_Y - MAX_SAG * (1 - rel * rel); // catenary approx
            // Tangent slope of the parabola at this z: dy/dz = -MAX_SAG * 2*rel / (BSPAN*0.5)
            const slope = -MAX_SAG * 2 * rel / (BSPAN * 0.5);
            const rx = Math.atan(slope); // rotate X-axis to match slope
            _iq.setFromAxisAngle(new THREE.Vector3(1, 0, 0), rx);
            const body = physicsWorld.createRigidBody(
              RAPIER.RigidBodyDesc.dynamic()
                .setTranslation(BRIDGE_X, py, pz)
                .setRotation({ x: _iq.x, y: _iq.y, z: _iq.z, w: _iq.w })
                .setLinearDamping(6.0)
                .setAngularDamping(12.0));
            physicsWorld.createCollider(
              RAPIER.ColliderDesc.cuboid(P_HW, P_HH, P_HD).setDensity(5), body);
            const mesh = new THREE.Mesh(plankGeo, plankMat);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            bridgePlanks.push({ body, mesh });
          }
          bridgePlanks.forEach(p => { b1Vis.push(p.mesh); b1Phy.push(p.body); });
        }

        // Revolute (hinge) joint chain — planks hinge around the bridge's X-axis only.
        // This allows vertical flex (sag/bounce) but prevents lateral wobble and twist,
        // which are the main sources of instability with ball-socket joints.
        // The velocity motor at target=0 acts as a direct torsional damper per joint.
        {
          const HS = BSTEP * 0.5;
          const AX = { x: 1, y: 0, z: 0 }; // hinge axis = bridge width (X)
          const addHinge = (b1, b2, a1z, a2z) => {
            const j = physicsWorld.createImpulseJoint(
              RAPIER.JointData.revolute({ x: 0, y: 0, z: a1z }, { x: 0, y: 0, z: a2z }, AX),
              b1, b2, true);
            if (typeof j?.configureMotorVelocity === 'function') j.configureMotorVelocity(0, 8);
          };
          addHinge(bridgeAnchorA, bridgePlanks[0].body, 0, -HS);
          for (let i = 0; i < N_PLANKS - 1; i++)
            addHinge(bridgePlanks[i].body, bridgePlanks[i + 1].body, HS, -HS);
          addHinge(bridgePlanks[N_PLANKS - 1].body, bridgeAnchorB, HS, 0);
        }

        // Physics warm-up: advance ~250 steps so bridge settles to equilibrium
        // before the first rendered frame (also settles dynamic props to the floor).
        for (let i = 0; i < 250; i++) physicsWorld.step();
        for (const { body, mesh } of bridgePlanks) {
          const t = body.translation(), r = body.rotation();
          mesh.position.set(t.x, t.y, t.z);
          mesh.quaternion.set(r.x, r.y, r.z, r.w);
        }

        // Rope line geometry: two lines tracing the left/right plank edges
        const ROPE_PTS = N_PLANKS + 2; // anchorA + planks + anchorB
        const ropeBufL = new Float32Array(ROPE_PTS * 3);
        const ropeBufR = new Float32Array(ROPE_PTS * 3);
        const ropeGeoL = new THREE.BufferGeometry();
        const ropeGeoR = new THREE.BufferGeometry();
        ropeGeoL.setAttribute('position', new THREE.BufferAttribute(ropeBufL, 3));
        ropeGeoR.setAttribute('position', new THREE.BufferAttribute(ropeBufR, 3));
        const ropeLineMat = new THREE.LineBasicMaterial({ color: 0x5a3010 });
        const ropeLineL = new THREE.Line(ropeGeoL, ropeLineMat);
        const ropeLineR = new THREE.Line(ropeGeoR, ropeLineMat);
        ropeLineL.frustumCulled = false;
        ropeLineR.frustumCulled = false;
        scene.add(ropeLineL); scene.add(ropeLineR);
        b1Vis.push(ropeLineL, ropeLineR);
        // Temp vectors reused each frame for rope corner computation
        const _brV = new THREE.Vector3();
        const _brQ = new THREE.Quaternion();

        // ── BRIDGE 2: SPRING-ANIMATED PLANKS ─────────────────────────────────
        // Kinematic planks with a per-plank spring: each board dips under the
        // player's weight and bounces back. Neighbours pick up a fraction of
        // the load (stagger/wave). No physics joints — fully predictable.
        const B2_X     = -32;
        const B2_Z_MIN = -12;
        const B2_Z_MAX =  12;
        const B2_Y     = FLOOR_Y + 3.5;
        const B2_N     = 12;
        const B2_STEP  = (B2_Z_MAX - B2_Z_MIN) / B2_N;
        const B2_HW    = P_HW;
        const B2_HH    = P_HH;
        const B2_HD    = B2_STEP * 0.38;
        const B2_DIP   = 0.28;   // max dip in metres
        const B2_K     = 18;     // spring stiffness
        const B2_D     = 7;      // spring damping

        // Pillars
        {
          const pillarH   = B2_Y - FLOOR_Y + 0.5;
          const pillarGeo = new THREE.BoxGeometry(B2_HW * 2 + 0.4, pillarH, 1.2);
          const pillarMat = new THREE.MeshStandardMaterial({ color: 0x7a5c3a, roughness: 0.9 });
          for (const pz of [B2_Z_MIN, B2_Z_MAX]) {
            const py = FLOOR_Y + pillarH * 0.5;
            const m = new THREE.Mesh(pillarGeo, pillarMat);
            m.position.set(B2_X, py, pz); m.castShadow = true; m.receiveShadow = true;
            scene.add(m); b2Vis.push(m);
