<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parkour Scene</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #info {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        font:
          12px/1.5 "SF Mono",
          "Fira Code",
          monospace;
        color: #b0d890;
        background: rgba(0, 0, 0, 0.55);
        padding: 8px 12px;
        border-radius: 6px;
        pointer-events: none;
        user-select: none;
        backdrop-filter: blur(4px);
      }
      #info span {
        color: #e0f0c0;
        font-weight: 600;
      }
      .tp-dfwv {
        z-index: 20 !important;
        max-height: 90vh !important;
        overflow-y: auto !important;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.tsl.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/",
          "stats-gl": "https://cdn.jsdelivr.net/npm/stats-gl/dist/main.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="info">
      Parkour &mdash; <span id="backend">loading…</span> &bull;
      <span id="stats">—</span> &bull; WASD + click to look &bull; Shift run
      &bull; Ctrl crouch &bull; F roll &bull; right-click / E attack &bull;
      Space jump &bull; Space mid-air glide &bull; Pool (-60, 80) &bull;
      Stylized water + character foam at (28, -30) &bull; Church (-40, -35) god
      rays
    </div>
    <div
      id="platform-debug"
      style="
        display: none;
        position: fixed;
        top: 60px;
        left: 16px;
        z-index: 100;
        font: 12px monospace;
        color: #0f0;
        background: rgba(0, 0, 0, 0.8);
        padding: 8px;
        border-radius: 4px;
        max-width: 320px;
      "
    ></div>

    <script type="module">
            const Tweakpane =
              await import("https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js");

            import * as THREE from "three";
            import {
              pass,
              color,
              fog,
              float,
              mrt,
              output,
              emissive,
              renderOutput,
              positionWorld,
              positionView,
              positionLocal,
              triNoise3D,
              uniform,
              mul,
              div,
              sub,
              add,
              clamp,
              mix,
              vec2,
              vec3,
              vec4,
              step,
              abs,
              smoothstep,
              uv,
              Loop,
              Fn,
              int,
              convertToTexture,
              nodeObject,
              normalView,
              directionToColor,
              colorToDirection,
              sample,
              screenUV,
              sin,
              cos,
              length,
              pow,
              dot,
              normalize,
              negate,
              mx_noise_float,
            } from "three/tsl";
            import { bloom } from "three/addons/tsl/display/BloomNode.js";
            import { fxaa } from "three/addons/tsl/display/FXAANode.js";
            import { lensflare } from "three/addons/tsl/display/LensflareNode.js";
            import { gaussianBlur } from "three/addons/tsl/display/GaussianBlurNode.js";
            import { boxBlur } from "three/addons/tsl/display/boxBlur.js";
            import { ao } from "three/addons/tsl/display/GTAONode.js";
            import { denoise } from "three/addons/tsl/display/DenoiseNode.js";
            import Stats from "stats-gl";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";
            import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
            import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";
            import { WaterMesh } from "three/addons/objects/Water2Mesh.js";
            import { SkyMesh } from "three/addons/objects/SkyMesh.js";
            import { CSMShadowNode } from "three/addons/csm/CSMShadowNode.js";
            import RAPIER from "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/+esm";
            import {
              createPhysicsWorld,
              createPlayerController,
              createPhysicsDebug,
            } from "./physics.js";
            import { createPlayer } from "./player-parkourtsushima.js";
            import { createFloatingLeaves } from "./floating-leaves.js";
            import { createFlowingLines } from "./flowing-lines.js";
            import { PARAMS } from "./params.js";
            import { PI, TERRAIN_SIZE, TERRAIN_RES, TRAIL_RES, TRAIL_SIZE } from "./constants.js";
            import { createTerrain } from "./terrain.js";

            const PARKOUR_SIZE = TERRAIN_SIZE;

            async function init() {
              const parkourParams = {
              tile: {
                textureScale: 1500,
                gradientIntensity: 0.5,
                gradientBias: 0.1,
                tileColor: "#d4d4d4",
                gridColor: "#707070",
                gridLineColor: "#404040",
                roughness: 1,
                metalness: 0,
              },
              ground: {
                planeSize: 800,
              },
              csm: {
                cascades: 3,
                maxFar: 150,
                lightMargin: 100,
                mapSize: 2048,
                updateEveryFrame: true,
              },
              light: {
                sunAzimuth: 135,
                sunElevation: 43,
                dirColor: "#fff5e0",
                dirIntensity: 2.2,
                hemiSkyColor: "#c8e0ff",
                hemiGroundColor: "#88aa55",
                hemiIntensity: 1,
                envIntensity: 0.45,
                exposure: 0.5,
              },
              sky: {
                turbidity: 2,
                rayleigh: 1.5,
                mie: 0.005,
                mieG: 0.8,
                cloudCoverage: 0.4,
                cloudDensity: 0.4,
                cloudElevation: 0.5,
              },
              debug: {
                rapierDebug: false,
                platformDebug: false,
              },
              npc: {
                enabled: false,
                speed: 2,
                walkRadius: 100,
                directionChangeInterval: 3,
                turnSpeed: 5,
                scale: 1,
                floorOffset: 0,
                idleWhenNearPlayer: true,
                nearPlayerDistance: 4,
              },
              foliage: {
                floatingLeaves: false,
                count: 40,
                areaSize: 25,
                spawnHeight: 12,
                leafSize: 0.5,
                scale: 2,
                opacity: 0.9,
                windInfluence: 0.2,
                gravity: 0.0003,
                terminalVelocity: 0.004,
                rotationSpeed: 0.0003,
                airResistance: 0.995,
                maxAge: 2000,
                terrainFloorOffset: 2,
                windStr: 0.08,
                windSpeed: 0.4,
              },
              bridge1: { enabled: false },
              bridge2: { enabled: false },
              katana: {
                posX: -0.085,
                posY: 0.18,
                posZ: -0.17,
                rotX: -1.07,
                rotY: 1.35,
                rotZ: -2.21,
              },
              flowingLines: {
                enabled: false,
                lineCount: 8,
                lineLength: 12,
                lineWidth: 0.15,
                segments: 20,
                heightOffset: 0.3,
                verticalWave: 0.08,
                animationSpeed: 1,
                pathRadius: 25,
                pathFrequency: 0.8,
                lineColor: "#a8d8ea",
                lineOpacity: 0.7,
              },
              enemies: {
                enabled: true,
                speed: 2,
                walkRadius: 80,
                directionChangeInterval: 3,
                turnSpeed: 5,
                scale: 1,
                floorOffset: 0,
                maxHp: 100,
                idleWhenNearPlayer: true,
                nearPlayerDistance: 4,
              },
            };
            const hazeParams = {
              enabled: false,
              thickness: 35,
              opacity: 0.9,
              falloff: 2.2,
              hazeColor: "#f5f5f0",
              noiseScaleA: 0.004,
              noiseScaleB: 0.008,
              noiseAmountA: 0.22,
              noiseAmountB: 0.18,
              noiseDetail: 0.12,
              noiseSpeed: 1,
            };

            // Post-processing params (enable/disable + per-effect settings)
            const postParams = {
              enabled: false,
              bloom: { enabled: false, strength: 0.4, radius: 0.4, threshold: 0.6 },
              lensflare: {
                enabled: false,
                bloomThreshold: 0.72,
                threshold: 0.6,
                ghostAttenuation: 25,
                ghostSpacing: 0.25,
              },
              godRays: {
                enabled: true,
                strength: 0.15,
                decay: 0.96,
                density: 0.8,
                samples: 32,
              },
              dof: {
                enabled: false,
                focusDistance: 25,
                blurStart: 5,
                blurEnd: 60,
                blurSize: 1,
                blurSpread: 3,
              },
              gtao: {
                enabled: false,
                intensity: 1.2,
                radius: 1.2,
                samples: 14,
                resolutionScale: 0.5,
                scale: 1,
                distanceFallOff: 1,
                distanceExponent: 1,
                thickness: 1,
                denoiseEnabled: true,
                denoiseRadius: 5,
                denoiseLumaPhi: 5,
                denoiseDepthPhi: 5,
                denoiseNormalPhi: 5,
              },
            };

            function srgbToLinear(hex) {
              const c = new THREE.Color(hex);
              c.convertSRGBToLinear();
              return c;
            }

            function sunDirectionFromAngles(azimuthDeg, elevationDeg) {
              const az = (azimuthDeg * Math.PI) / 180;
              const el = (elevationDeg * Math.PI) / 180;
              const cosEl = Math.cos(el);
              return new THREE.Vector3(
                cosEl * Math.cos(az),
                Math.sin(el),
                cosEl * Math.sin(az),
              ).normalize();
            }

              const renderer = new THREE.WebGPURenderer({ antialias: true });
              await renderer.init();
              renderer.setSize(innerWidth, innerHeight);
              renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
              renderer.toneMapping = THREE.ACESFilmicToneMapping;
              renderer.toneMappingExposure = parkourParams.light.exposure;
              renderer.shadowMap.enabled = true;
              renderer.shadowMap.type = THREE.PCFSoftShadowMap;
              document.body.appendChild(renderer.domElement);
              document.getElementById("backend").textContent =
                renderer.backend?.constructor?.name?.includes("WebGPU")
                  ? "WebGPU ✓"
                  : "WebGL fallback";

              const stats = new Stats({ trackGPU: false });
              stats.init(renderer);
              document.body.appendChild(stats.dom);

              const scene = new THREE.Scene();
              const camera = new THREE.PerspectiveCamera(
                60,
                innerWidth / innerHeight,
                0.5,
                1000,
              );
              camera.position.set(0, 4, 12);

              const orbitControls = new OrbitControls(camera, renderer.domElement);
              orbitControls.target.set(0, 2, 0);
              orbitControls.maxPolarAngle = PI * 0.48;
              orbitControls.enableDamping = true;
              orbitControls.dampingFactor = 0.05;
              orbitControls.enabled = false;
              orbitControls.update();

              // ── LIGHTING ──
              const _sunDir = sunDirectionFromAngles(
                parkourParams.light.sunAzimuth,
                parkourParams.light.sunElevation,
              );
              const dirLight = new THREE.DirectionalLight(
                parkourParams.light.dirColor,
                parkourParams.light.dirIntensity,
              );
              dirLight.position.copy(_sunDir.clone().multiplyScalar(50));
              dirLight.castShadow = true;
              dirLight.shadow.mapSize.width = parkourParams.csm.mapSize;
              dirLight.shadow.mapSize.height = parkourParams.csm.mapSize;
              dirLight.shadow.camera.near = 1;
              dirLight.shadow.camera.far = 200;
              dirLight.shadow.camera.left = -80;
              dirLight.shadow.camera.right = 80;
              dirLight.shadow.camera.top = 80;
              dirLight.shadow.camera.bottom = -80;
              dirLight.shadow.bias = PARAMS.shadowBias;
              dirLight.shadow.normalBias = PARAMS.shadowNormalBias;

              const csm = new CSMShadowNode(dirLight, {
                cascades: parkourParams.csm.cascades,
                maxFar: parkourParams.csm.maxFar,
                mode: "practical",
                lightMargin: parkourParams.csm.lightMargin,
              });
              dirLight.shadow.shadowNode = csm;
              scene.add(dirLight);

              // Fixed shadow target — sun points at scene center (updated after createTerrain)
              const shadowTarget = new THREE.Object3D();
              scene.add(shadowTarget);
              dirLight.target = shadowTarget;

              const hemiLight = new THREE.HemisphereLight(
                parkourParams.light.hemiSkyColor,
                parkourParams.light.hemiGroundColor,
                parkourParams.light.hemiIntensity,
              );
              scene.add(hemiLight);

              // ── TERRAIN (same as index.html: createTerrain from terrain.js) ──
              const {
                terrain,
                heightTex,
                sampleHeight,
                syncTerrainUniforms,
              } = createTerrain(scene, PARAMS, {
                TERRAIN_SIZE,
                TERRAIN_RES,
                TERRAIN_HEIGHT: PARAMS.terrainHeight,
                TRAIL_RES,
                TRAIL_SIZE,
              });
              shadowTarget.position.set(0, sampleHeight(0, 0), 0);

              // ── VILLAGE PLACEHOLDER HOUSES (cubes → replace with GLB later) ──
              const villageHousePositions = [
                [-40, -50], [-30, 22], [0, -62], [28, 32], [-55, 2], [42, -28],
                [-22, -68], [18, -18], [-48, 48], [38, 52], [-60, -25], [10, 55],
                [-35, -75], [45, -5], [-15, 35], [0, 0],
              ];
              const villageHousesGroup = new THREE.Group();
              villageHousesGroup.name = "VillageHouses";
              const houseMaterial = new THREE.MeshStandardMaterial({
                color: 0x8b7355,
                roughness: 0.9,
                metalness: 0.1,
              });
              villageHousePositions.forEach(([x, z], i) => {
                const seed = (i * 7 + 11) % 10;
                const w = 4 + (seed / 10) * 4;
                const h = 3 + ((seed * 3) % 7) * 0.5;
                const d = 5 + ((seed * 2) % 5);
                const box = new THREE.Mesh(
                  new THREE.BoxGeometry(w, h, d),
                  houseMaterial.clone(),
                );
                box.castShadow = true;
                box.receiveShadow = true;
                const terrainY = sampleHeight(x, z);
                box.position.set(x, terrainY + h * 0.5, z);
                box.rotation.y = (i * 0.4) % (Math.PI * 2);
                box.name = `HousePlaceholder_${i}`;
                box.userData.replaceWithGlb = true;
                villageHousesGroup.add(box);
              });
              scene.add(villageHousesGroup);

              // ── SKY ──
              const sky = new SkyMesh();
              sky.scale.setScalar(10000);
              scene.add(sky);
              sky.turbidity.value = parkourParams.sky.turbidity;
              sky.rayleigh.value = parkourParams.sky.rayleigh;
              sky.mieCoefficient.value = parkourParams.sky.mie;
              sky.mieDirectionalG.value = parkourParams.sky.mieG;
              sky.cloudCoverage.value = parkourParams.sky.cloudCoverage;
              sky.cloudDensity.value = parkourParams.sky.cloudDensity;
              sky.cloudElevation.value = parkourParams.sky.cloudElevation;
              sky.sunPosition.value.copy(
                sunDirectionFromAngles(
                  parkourParams.light.sunAzimuth,
                  parkourParams.light.sunElevation,
                ),
              );

              const pmremGenerator = new THREE.PMREMGenerator(renderer);
              const skyEnvScene = new THREE.Scene();
              skyEnvScene.add(sky.clone());
              scene.environment = pmremGenerator.fromScene(skyEnvScene, 0.04).texture;
              scene.environmentIntensity = parkourParams.light.envIntensity;

              // ── VOLUMETRIC HAZE (ground mist, Ghost of Tsushima style) ──
              const uHazeThickness = uniform(hazeParams.thickness);
              const uHazeOpacity = uniform(hazeParams.opacity);
              const uHazeFalloff = uniform(hazeParams.falloff);
              const uHazeColor = uniform(new THREE.Color(hazeParams.hazeColor));
              const uNoiseScaleA = uniform(hazeParams.noiseScaleA);
              const uNoiseScaleB = uniform(hazeParams.noiseScaleB);
              const uNoiseAmountA = uniform(hazeParams.noiseAmountA);
              const uNoiseAmountB = uniform(hazeParams.noiseAmountB);
              const uNoiseDetail = uniform(hazeParams.noiseDetail);
              const uNoiseSpeed = uniform(hazeParams.noiseSpeed);
              const hazeTimer = uniform(0).onFrameUpdate((frame) => frame.time);

              function applyVolumetricHaze() {
                if (!hazeParams.enabled) {
                  scene.fogNode = null;
                  return;
                }
                const fogNoiseDistance = positionView.z
                  .negate()
                  .smoothstep(0, camera.far - 200);
                const distance = fogNoiseDistance.mul(uHazeThickness).max(8);
                const heightAboveFloor = positionWorld.y;
                const groundFogArea = float(distance)
                  .sub(heightAboveFloor)
                  .div(distance)
                  .pow(uHazeFalloff)
                  .saturate()
                  .mul(uHazeOpacity);
                const fogNoiseA = triNoise3D(
                  positionWorld.mul(uNoiseScaleA),
                  uNoiseAmountA,
                  hazeTimer,
                );
                const fogNoiseB = triNoise3D(
                  positionWorld.mul(uNoiseScaleB),
                  uNoiseAmountB,
                  hazeTimer.mul(uNoiseSpeed),
                );
                const fogNoiseC = triNoise3D(
                  positionWorld.mul(0.015),
                  uNoiseDetail,
                  hazeTimer.mul(0.5),
                );
                const fogNoise = fogNoiseA
                  .add(fogNoiseB)
                  .add(fogNoiseC)
                  .mul(color(uHazeColor));
                const groundColor = color(
                  new THREE.Color(parkourParams.light.hemiGroundColor),
                );
                scene.fogNode = fog(
                  fogNoiseDistance.oneMinus().mix(groundColor, fogNoise),
                  groundFogArea,
                );
              }
              applyVolumetricHaze();

              // ── FLOATING LEAVES ──
              const windParams = {
                uTime: { value: 0 },
                uWindStr: { value: parkourParams.foliage.windStr },
                uWindSpeed: { value: parkourParams.foliage.windSpeed },
              };
              const leaves = createFloatingLeaves({
                scene,
                enabled: parkourParams.foliage.floatingLeaves,
                count: parkourParams.foliage.count,
                maxCount: 500,
                areaSize: parkourParams.foliage.areaSize,
                spawnHeight: parkourParams.foliage.spawnHeight,
                leafSize: parkourParams.foliage.leafSize,
                scale: parkourParams.foliage.scale,
                opacity: parkourParams.foliage.opacity,
                windInfluence: parkourParams.foliage.windInfluence,
                gravity: parkourParams.foliage.gravity,
                terminalVelocity: parkourParams.foliage.terminalVelocity,
                rotationSpeed: parkourParams.foliage.rotationSpeed,
                airResistance: parkourParams.foliage.airResistance,
                maxAge: parkourParams.foliage.maxAge,
                terrainFloorOffset: parkourParams.foliage.terrainFloorOffset,
                getTerrainHeight: (x, z) => (x !== undefined && z !== undefined ? sampleHeight(x, z) : 0),
                windParams,
              });

              // ── FLOWING LINES ──
              const flowing = createFlowingLines({
                scene,
                getTerrainHeight: (x, z) => (x !== undefined && z !== undefined ? sampleHeight(x, z) : 0),
                enabled: parkourParams.flowingLines.enabled,
                lineCount: parkourParams.flowingLines.lineCount,
                lineLength: parkourParams.flowingLines.lineLength,
                lineWidth: parkourParams.flowingLines.lineWidth,
                segments: parkourParams.flowingLines.segments,
                heightOffset: parkourParams.flowingLines.heightOffset,
                verticalWave: parkourParams.flowingLines.verticalWave,
                animationSpeed: parkourParams.flowingLines.animationSpeed,
                pathRadius: parkourParams.flowingLines.pathRadius,
                pathFrequency: parkourParams.flowingLines.pathFrequency,
                lineColor: parkourParams.flowingLines.lineColor,
                lineOpacity: parkourParams.flowingLines.lineOpacity,
              });

              // ── PHYSICS ──
              await RAPIER.init({});
              const { physicsWorld, physicsCubes } = createPhysicsWorld(
                RAPIER,
                scene,
                PARKOUR_SIZE,
                sampleHeight,
                { noDefaultGround: true },
              );

              // Terrain heightfield collider — built from createTerrain's sampleHeight (same as index)
              const _HF_N = 128;
              const _HF_HEIGHTS = new Float32Array((_HF_N + 1) * (_HF_N + 1));
              for (let r = 0; r <= _HF_N; r++) {
                for (let c = 0; c <= _HF_N; c++) {
                  const wx = (c / _HF_N - 0.5) * PARKOUR_SIZE;
                  const wz = (r / _HF_N - 0.5) * PARKOUR_SIZE;
                  _HF_HEIGHTS[r * (_HF_N + 1) + c] = sampleHeight(wx, wz);
                }
              }
              {
                const groundBody = physicsWorld.createRigidBody(
                  RAPIER.RigidBodyDesc.fixed().setTranslation(0, 0, 0),
                );
                physicsWorld.createCollider(
                  RAPIER.ColliderDesc.heightfield(
                    _HF_N, _HF_N,
                    _HF_HEIGHTS,
                    new RAPIER.Vector3(PARKOUR_SIZE, 1, PARKOUR_SIZE),
                  ),
                  groundBody,
                );
              }

              // Hide the default world cubes (they spawn far away)
              physicsCubes.forEach(({ mesh }) => {
                mesh.visible = false;
              });


              const { physicsDebugGroup, buildRapierDebugMeshes } =
                createPhysicsDebug(RAPIER, scene, physicsWorld);
              physicsDebugGroup.visible = false;

              // ── PLAYER ──
              const charPos = new THREE.Vector3(0, 0, 0);
              const capR = PARAMS.capsuleRadius;
              const capHalfH = Math.max(0.1, (PARAMS.characterHeight - 2 * capR) / 2);
              charPos.y = sampleHeight(0, 0) + capHalfH + capR;

              const { playerBody, playerCollider, characterController } =
                createPlayerController(RAPIER, physicsWorld, charPos, PARAMS, {
                  enableSnapToGround: true,
                  characterOffset: 0.01,
                  maxSlopeClimbAngle: (60 * Math.PI) / 180,
                  minSlopeSlideAngle: (65 * Math.PI) / 180,
                });

              const platformDebugOut = {};
              const player = createPlayer({
                scene,
                renderer,
                camera,
                PARAMS,
                charPos,
                playerBody,
                playerCollider,
                characterController,
                physicsWorld,
                RAPIER,
                // no sampleHeight → parkour mode: Rapier trimesh colliders + computedGrounded()
                footstepSoundsPath: "sounds",
                TERRAIN_SIZE: PARKOUR_SIZE,
                debugOut: platformDebugOut,
              });

              // ── TWEAKPANE CONTROLS ──
              const pane = new Tweakpane.Pane({ title: "Parkour", expanded: true });

              const tileFolder = pane.addFolder({
                title: "Tile Material",
                expanded: true,
              });
              tileFolder.addBinding(parkourParams.tile, "textureScale", {
                min: 1,
                max: 3000,
                step: 1,
                label: "scale",
              });
              tileFolder.addBinding(parkourParams.tile, "gradientIntensity", {
                min: 0,
                max: 2,
                step: 0.01,
              });
              tileFolder.addBinding(parkourParams.tile, "gradientBias", {
                min: -0.5,
                max: 0.5,
                step: 0.01,
              });
              tileFolder.addBinding(parkourParams.tile, "tileColor", {
                view: "color",
                label: "tile",
              });
              tileFolder.addBinding(parkourParams.tile, "gridColor", {
                view: "color",
                label: "grid",
              });
              tileFolder.addBinding(parkourParams.tile, "gridLineColor", {
                view: "color",
                label: "lines",
              });
              tileFolder.addBinding(parkourParams.tile, "roughness", {
                min: 0,
                max: 1,
                step: 0.01,
              });
              tileFolder.addBinding(parkourParams.tile, "metalness", {
                min: 0,
                max: 1,
                step: 0.01,
              });

              const groundFolder = pane.addFolder({
                title: "Ground",
                expanded: true,
              });
              groundFolder.addBinding(parkourParams.ground, "planeSize", {
                min: 100,
                max: 1500,
                step: 50,
              });

              const katanaFolder = pane.addFolder({

              postGtaoFolder.addBinding(postParams.gtao, "denoiseRadius", {

                step: 1,
              });

              // ── RENDER PIPELINE (full post-processing) ──
              const renderPipeline = new THREE.RenderPipeline(renderer);
              renderPipeline.outputColorTransform = false;
              // MRT: output (beauty), emissive (portals), normal (GTAO)
              const scenePass = pass(scene, camera);
              scenePass.setMRT(
                mrt({
                  output,
                  emissive,
                  normal: directionToColor(normalView),
                }),
              );
              const scenePassColor = scenePass.getTextureNode("output");
              const emissivePass = scenePass.getTextureNode("emissive");
              const scenePassDepth = scenePass.getTextureNode("depth");
              const scenePassNormalEncoded = scenePass.getTextureNode("normal");
              const scenePassNormal = sample((uvCoord) =>
                colorToDirection(scenePassNormalEncoded.sample(uvCoord)),
              );
              const normalTexture = scenePass.getTexture("normal");
              if (normalTexture) normalTexture.type = THREE.UnsignedByteType;

              // Emissive bloom (portals, glowing elements)
              const emissiveBloomPass = bloom(emissivePass, 2);
              let baseColor = scenePassColor.add(emissiveBloomPass);

              // GTAO (screen-space ambient occlusion)
              const uGtaoEnabled = uniform(
                postParams.enabled && postParams.gtao.enabled ? 1 : 0,
              );
              const uGtaoIntensity = uniform(postParams.gtao.intensity);
              const aoPass = ao(scenePassDepth, scenePassNormal, camera);
              aoPass.resolutionScale = postParams.gtao.resolutionScale;
              aoPass.radius.value = postParams.gtao.radius;
              aoPass.samples.value = postParams.gtao.samples;
              aoPass.scale.value = postParams.gtao.scale;
              aoPass.distanceFallOff.value = postParams.gtao.distanceFallOff;
              aoPass.distanceExponent.value = postParams.gtao.distanceExponent;
              aoPass.thickness.value = postParams.gtao.thickness;
              const aoTex = aoPass.getTextureNode();
              const denoisePass = denoise(
                aoTex,
                scenePassDepth,
                scenePassNormal,
                camera,
              );
              denoisePass.updateBefore = () => {};
              denoisePass.radius.value = postParams.gtao.denoiseRadius;
              denoisePass.lumaPhi.value = postParams.gtao.denoiseLumaPhi;
              denoisePass.depthPhi.value = postParams.gtao.denoiseDepthPhi;
              denoisePass.normalPhi.value = postParams.gtao.denoiseNormalPhi;
              const uGtaoDenoiseEnabled = uniform(
                postParams.gtao.denoiseEnabled ? 1 : 0,
              );
              const rawAoVal = aoTex.sample(screenUV).r;
              const denoisedAoVal = denoisePass.r;
              const aoVal = mix(rawAoVal, denoisedAoVal, uGtaoDenoiseEnabled);
              baseColor = vec4(
                baseColor.rgb.mul(
                  sub(1, mul(mul(aoVal, uGtaoIntensity), uGtaoEnabled)),
                ),
                baseColor.a,
              );

              // Depth for DoF, sky mask, god rays
              const linearDepth = scenePass.getLinearDepthNode
                ? scenePass.getLinearDepthNode()
                : float(0.5);
              const uCameraFar = uniform(camera.far);
              const worldDepth = mul(linearDepth, uCameraFar);
              const skyMask = step(float(0.999), linearDepth);

              // DoF (depth of field)
              const uDofEnabled = uniform(
                postParams.enabled && postParams.dof.enabled ? 1 : 0,
              );
              const uDofFocusDistance = uniform(postParams.dof.focusDistance);
              const uDofBlurStart = uniform(postParams.dof.blurStart);
              const uDofBlurEnd = uniform(postParams.dof.blurEnd);
              const uDofBlurSize = uniform(postParams.dof.blurSize);
              const uDofBlurSpread = uniform(postParams.dof.blurSpread);
              const sceneBlurred = boxBlur(baseColor, {
                size: uDofBlurSize,
                separation: uDofBlurSpread,
              });
              const dofBlurAmount = smoothstep(
                uDofBlurStart,
                uDofBlurEnd,
                abs(sub(worldDepth, uDofFocusDistance)),
              );
              baseColor = mix(
                baseColor,
                sceneBlurred,
                mul(dofBlurAmount, uDofEnabled),
              );

              // Scene bloom (full scene glow)
              const uBloomEnabled = uniform(
                postParams.enabled && postParams.bloom.enabled ? 1 : 0,
              );
              const bloomScenePass = bloom(
                baseColor,
                postParams.bloom.strength,
                postParams.bloom.radius,
                postParams.bloom.threshold,
              );

              // Lens flare: bloom sky only (sun/sky at far depth)
              const skyOnlyColor = mix(vec4(0, 0, 0, 0), baseColor, skyMask);
              const skyBloomPass = bloom(
                skyOnlyColor,
                1,
                0.5,
                postParams.lensflare.bloomThreshold,
              );
              const flareThreshold = uniform(postParams.lensflare.threshold);
              const flareGhostAttenuation = uniform(
                postParams.lensflare.ghostAttenuation,
              );
              const flareGhostSpacing = uniform(postParams.lensflare.ghostSpacing);
              const flarePass = lensflare(skyBloomPass, {
                threshold: flareThreshold,
                ghostAttenuationFactor: flareGhostAttenuation,
                ghostSpacing: flareGhostSpacing,
              });
              const flareBlurPass = gaussianBlur(flarePass, null, 8);
              const uLensflareEnabled = uniform(
                postParams.enabled && postParams.lensflare.enabled ? 1 : 0,
              );

              // God rays (volumetric sunlight)
              const uSunScreenPos = uniform(new THREE.Vector2(0.5, 0.5));
              const uGodRaysEnabled = uniform(
                postParams.enabled && postParams.godRays.enabled ? 1 : 0,
              );
              const uGodRaysStrength = uniform(postParams.godRays.strength);
              const uGodRaysDecay = uniform(postParams.godRays.decay);
              const uGodRaysDensity = uniform(postParams.godRays.density);
              const uGodRaysSamples = uniform(postParams.godRays.samples);
              const sceneTex = convertToTexture(baseColor);
              const godRaysFn = Fn(() => {
                const uvNode = uv();
                const stepUV = sub(nodeObject(uSunScreenPos), uvNode)
                  .mul(uGodRaysDensity)
                  .div(uGodRaysSamples);
                const illumination = float(0).toVar();
                const decayVar = float(1).toVar();
                Loop(
                  {
                    start: int(0),
                    end: int(uGodRaysSamples),
                    type: "int",
                    condition: "<",
                  },
                  ({ i }) => {
                    const sampleUV = add(uvNode, stepUV.mul(float(i)));
                    const s = sceneTex.sample(sampleUV);
                    const lum = add(
                      add(mul(s.r, 0.299), mul(s.g, 0.587)),
                      mul(s.b, 0.114),
                    );
                    illumination.addAssign(mul(lum, decayVar));
                    decayVar.mulAssign(uGodRaysDecay);
                  },
                );
                const normalized = illumination.div(uGodRaysSamples);
                return vec4(normalized, normalized, normalized, 1)
                  .mul(uGodRaysStrength)
                  .mul(uGodRaysEnabled);
              });
              const godRaysNode = godRaysFn();

              // Final composite (each effect gated by postParams.enabled && effect.enabled)
              const finalOutput = baseColor
                .add(bloomScenePass.mul(uBloomEnabled))
                .add(flareBlurPass.mul(uLensflareEnabled))
                .add(godRaysNode);

              renderPipeline.outputNode = fxaa(renderOutput(finalOutput));

              await renderer.compileAsync(scene, camera);
              csm.camera = camera;
              csm.updateFrustums();

              const timer = new THREE.Timer();
              let lastTime = 0;
              let lastPlaneSize = parkourParams.ground.planeSize;
              const smoothCamPos = new THREE.Vector3();
              const smoothLookAt = new THREE.Vector3();
              const smoothCharPos = new THREE.Vector3();
              let camSmoothInit = false;
              let charSmoothInit = false;
              const CAM_SMOOTH = 12; // higher = snappier, lower = smoother (filters jitter)
              const CHAR_SMOOTH = 14; // character visual smoothing
              let lastCsmCascades = parkourParams.csm.cascades;
              let lastCsmMaxFar = parkourParams.csm.maxFar;
              let lastCsmLightMargin = parkourParams.csm.lightMargin;
              let lastCsmMapSize = parkourParams.csm.mapSize;

              renderer.setAnimationLoop(() => {
                timer.update();
                const elapsed = timer.getElapsed();
                const dt = Math.min(elapsed - lastTime, 0.05);
                lastTime = elapsed;

                // ─── PRE-STEP: kinematic body updates ─────────────────────────────────
                // setNextKinematicTranslation MUST be called before physicsWorld.step()
                // (which runs inside player.update). This way Rapier sees the correct
                // frame-N target positions during collision detection and computes
                // accurate linvel() for platform-riding.

                player.update(dt);

                const swordGroup = player.characterGroup.userData.sword;
                if (swordGroup && parkourParams.katana) {
                  const k = parkourParams.katana;
                  swordGroup.position.set(k.posX, k.posY, k.posZ);
                  swordGroup.rotation.set(k.rotX, k.rotY, k.rotZ);
                }

                const pdDiv = document.getElementById("platform-debug");
                if (parkourParams.debug.platformDebug) {
                  pdDiv.style.display = "block";
                  const d = platformDebugOut;
                  const nearElevator =
                    Math.abs(charPos.x - 8) < 4 && Math.abs(charPos.z) < 4;
                  const elevY =
                    debugElevator?.body?.translation?.()?.y?.toFixed(3) ?? "?";
                  pdDiv.innerHTML = nearElevator
                    ? `<pre style="margin:0;font-size:11px">PLATFORM DEBUG (near elevator)
      elevatorY: ${elevY}
      onKinematicPlatform: ${d.onKinematicPlatform ?? "?"}
      platformBody: ${d.platformBody ?? "?"}
      charPosY: ${d.charPosY ?? "?"}
      charBottom: ${d.charBottom ?? "?"}
      snapToY: ${d.snapToY ?? "?"}
      totalDy: ${d.totalDy ?? "?"}
      didCorrect: ${d.didCorrect ?? "?"}
      isGrounded: ${d.isGrounded ?? "?"}
      rawInAir: ${d.rawInAir ?? "?"}
      inAir: ${d.inAir ?? "?"}
      moveState: ${d.moveState ?? "?"}</pre>`
                    : `<pre style="margin:0;font-size:11px">Stand on elevator (X≈8, Z≈0) to see debug</pre>`;
                } else {
                  pdDiv.style.display = "none";
                }

                windParams.uTime.value = elapsed;
                windParams.uWindStr.value = parkourParams.foliage.windStr;
                windParams.uWindSpeed.value = parkourParams.foliage.windSpeed;
                leaves.params.enabled = parkourParams.foliage.floatingLeaves;
                leaves.params.count = parkourParams.foliage.count;
                leaves.params.areaSize = parkourParams.foliage.areaSize;
                leaves.params.spawnHeight = parkourParams.foliage.spawnHeight;
                leaves.params.leafSize = parkourParams.foliage.leafSize;
                leaves.params.scale = parkourParams.foliage.scale;
                leaves.params.opacity = parkourParams.foliage.opacity;
                leaves.params.windInfluence = parkourParams.foliage.windInfluence;
                leaves.params.gravity = parkourParams.foliage.gravity;
                leaves.params.terminalVelocity =
                  parkourParams.foliage.terminalVelocity;
                leaves.params.rotationSpeed = parkourParams.foliage.rotationSpeed;
                leaves.params.airResistance = parkourParams.foliage.airResistance;
                leaves.params.maxAge = parkourParams.foliage.maxAge;
                leaves.params.terrainFloorOffset =
                  parkourParams.foliage.terrainFloorOffset;
                leaves.update();

                flowing.params.enabled = parkourParams.flowingLines.enabled;
                flowing.params.heightOffset = parkourParams.flowingLines.heightOffset;
                flowing.params.verticalWave = parkourParams.flowingLines.verticalWave;
                flowing.params.animationSpeed =
                  parkourParams.flowingLines.animationSpeed;
                flowing.params.pathRadius = parkourParams.flowingLines.pathRadius;
                flowing.params.pathFrequency =
                  parkourParams.flowingLines.pathFrequency;
                flowing.group.visible = parkourParams.flowingLines.enabled;
                flowing.setParams({
                  lineColor: parkourParams.flowingLines.lineColor,
                  lineOpacity: parkourParams.flowingLines.lineOpacity,
                });
                flowing.update(elapsed);

                // Smooth character visual + camera to filter physics jitter (ground appears to shake otherwise)
                const inAir = !player.state.isGrounded;
                if (!charSmoothInit) {
                  smoothCharPos.copy(charPos);
                  charSmoothInit = true;
                }
                if (inAir) {
                  smoothCharPos.copy(charPos);
                  player.characterGroup.position.copy(charPos);
                } else {
                  const charAlpha = 1 - Math.exp(-CHAR_SMOOTH * dt);
                  smoothCharPos.lerp(charPos, charAlpha);
                  player.characterGroup.position.copy(smoothCharPos);
                }

                syncTerrainUniforms(PARAMS);

                if (PARAMS.cameraMode === "thirdPerson") {
                  const camDist = PARAMS.camDist;
                  const cx =
                    smoothCharPos.x -
                    Math.sin(player.state.camYaw) *
                      Math.cos(player.state.camPitch) *
                      camDist;
                  const cy =
                    smoothCharPos.y +
                    Math.sin(player.state.camPitch) * camDist +
                    PARAMS.camHeight;
                  const cz =
                    smoothCharPos.z -
                    Math.cos(player.state.camYaw) *
                      Math.cos(player.state.camPitch) *
                      camDist;
                  const camTerrainY = sampleHeight(cx, cz) + 1.5;
                  const targetPos = new THREE.Vector3(
                    cx,
                    Math.max(cy, camTerrainY),
                    cz,
                  );
                  const targetLook = new THREE.Vector3(
                    smoothCharPos.x,
                    smoothCharPos.y + 0.5,
                    smoothCharPos.z,
                  );
                  if (!camSmoothInit) {
                    smoothCamPos.copy(targetPos);
                    smoothLookAt.copy(targetLook);
                    camSmoothInit = true;
                  }
                  const alpha = 1 - Math.exp(-CAM_SMOOTH * dt);
                  smoothCamPos.lerp(targetPos, alpha);
                  smoothLookAt.lerp(targetLook, alpha);
                  camera.position.copy(smoothCamPos);
                  camera.lookAt(smoothLookAt);
                  orbitControls.enabled = false;
                } else {
                  orbitControls.target.set(
                    smoothCharPos.x,
                    smoothCharPos.y + 0.5,
                    smoothCharPos.z,
                  );
                  orbitControls.enabled = true;
                  orbitControls.update();
                }

                dirLight.shadow.bias = PARAMS.shadowBias;
                dirLight.shadow.normalBias = PARAMS.shadowNormalBias;

                // Apply lighting params
                const sunDir = sunDirectionFromAngles(
                  parkourParams.light.sunAzimuth,
                  parkourParams.light.sunElevation,
                );
                dirLight.position.copy(sunDir.clone().multiplyScalar(50));
                dirLight.color.set(parkourParams.light.dirColor);
                dirLight.intensity = parkourParams.light.dirIntensity;
                hemiLight.color.set(parkourParams.light.hemiSkyColor);
                hemiLight.groundColor.set(parkourParams.light.hemiGroundColor);
                hemiLight.intensity = parkourParams.light.hemiIntensity;
                sky.turbidity.value = parkourParams.sky.turbidity;
                sky.rayleigh.value = parkourParams.sky.rayleigh;
                sky.mieCoefficient.value = parkourParams.sky.mie;
                sky.mieDirectionalG.value = parkourParams.sky.mieG;
                sky.cloudCoverage.value = parkourParams.sky.cloudCoverage;
                sky.cloudDensity.value = parkourParams.sky.cloudDensity;
                sky.cloudElevation.value = parkourParams.sky.cloudElevation;
                sky.sunPosition.value.copy(sunDir);
                scene.environmentIntensity = parkourParams.light.envIntensity;
                renderer.toneMappingExposure = parkourParams.light.exposure;

                // Post-processing uniform sync
                uGtaoEnabled.value =
                  postParams.enabled && postParams.gtao.enabled ? 1 : 0;
                uGtaoIntensity.value = postParams.gtao.intensity;
                aoPass.radius.value = postParams.gtao.radius;
                aoPass.samples.value = postParams.gtao.samples;
                aoPass.scale.value = postParams.gtao.scale;
                aoPass.distanceFallOff.value = postParams.gtao.distanceFallOff;
                aoPass.distanceExponent.value = postParams.gtao.distanceExponent;
                aoPass.thickness.value = postParams.gtao.thickness;
                denoisePass.radius.value = postParams.gtao.denoiseRadius;
                denoisePass.lumaPhi.value = postParams.gtao.denoiseLumaPhi;
                denoisePass.depthPhi.value = postParams.gtao.denoiseDepthPhi;
                denoisePass.normalPhi.value = postParams.gtao.denoiseNormalPhi;
                uGtaoDenoiseEnabled.value = postParams.gtao.denoiseEnabled ? 1 : 0;
                if (denoisePass._resolution) {
                  const size = renderer.getDrawingBufferSize(new THREE.Vector2());
                  denoisePass._resolution.value.set(size.x, size.y);
                }

                uDofEnabled.value =
                  postParams.enabled && postParams.dof.enabled ? 1 : 0;
                uDofFocusDistance.value = postParams.dof.focusDistance;
                uDofBlurStart.value = postParams.dof.blurStart;
                uDofBlurEnd.value = postParams.dof.blurEnd;
                uDofBlurSize.value = postParams.dof.blurSize;
                uDofBlurSpread.value = postParams.dof.blurSpread;

                uBloomEnabled.value =
                  postParams.enabled && postParams.bloom.enabled ? 1 : 0;
                bloomScenePass.strength.value = postParams.bloom.strength;
                bloomScenePass.radius.value = postParams.bloom.radius;
                bloomScenePass.threshold.value = postParams.bloom.threshold;

                uLensflareEnabled.value =
                  postParams.enabled && postParams.lensflare.enabled ? 1 : 0;
                skyBloomPass.threshold.value = postParams.lensflare.bloomThreshold;
                flareThreshold.value = postParams.lensflare.threshold;
                flareGhostAttenuation.value = postParams.lensflare.ghostAttenuation;
                flareGhostSpacing.value = postParams.lensflare.ghostSpacing;

                uGodRaysEnabled.value =
                  postParams.enabled && postParams.godRays.enabled ? 1 : 0;
                uGodRaysStrength.value = postParams.godRays.strength;
                uGodRaysDecay.value = postParams.godRays.decay;
                uGodRaysDensity.value = postParams.godRays.density;
                uGodRaysSamples.value = postParams.godRays.samples;

                // Sun screen position for god rays (project sun direction to NDC)
                const sunWorld = camera.position
                  .clone()
                  .add(sunDir.clone().multiplyScalar(500000));
                const v4 = new THREE.Vector4(sunWorld.x, sunWorld.y, sunWorld.z, 1);
                v4.applyMatrix4(camera.matrixWorldInverse);
                v4.applyMatrix4(camera.projectionMatrix);
                const ndcX = v4.x / v4.w;
                const ndcY = v4.y / v4.w;
                uSunScreenPos.value.set(ndcX * 0.5 + 0.5, ndcY * 0.5 + 0.5);

                // Apply CSM param changes (only when changed — updateFrustums is expensive)
                const csmChanged =
                  parkourParams.csm.cascades !== lastCsmCascades ||
                  parkourParams.csm.maxFar !== lastCsmMaxFar ||
                  parkourParams.csm.lightMargin !== lastCsmLightMargin ||
                  parkourParams.csm.mapSize !== lastCsmMapSize;
                if (csmChanged) {
                  lastCsmCascades = parkourParams.csm.cascades;
                  lastCsmMaxFar = parkourParams.csm.maxFar;
                  lastCsmLightMargin = parkourParams.csm.lightMargin;
                  lastCsmMapSize = parkourParams.csm.mapSize;
                  csm.cascades = parkourParams.csm.cascades;
                  csm.maxFar = parkourParams.csm.maxFar;
                  csm.lightMargin = parkourParams.csm.lightMargin;
                  dirLight.shadow.mapSize.width = parkourParams.csm.mapSize;
                  dirLight.shadow.mapSize.height = parkourParams.csm.mapSize;
                  if (csm.frustums) csm.updateFrustums();
                }

                // Update frustums every frame when enabled — fixes shadow disappearing at certain
                // camera angles (CSM is camera-relative; stale frustums = shadow outside cascade bounds)
                if (parkourParams.csm.updateEveryFrame && csm.frustums) {
                  csm.updateFrustums();
                }

                physicsDebugGroup.visible = !!parkourParams.debug.rapierDebug;
                if (parkourParams.debug.rapierDebug) buildRapierDebugMeshes();

                camera.updateMatrixWorld();
                renderPipeline.render();
                stats.update();
              });

              window.addEventListener("resize", () => {
                camera.aspect = innerWidth / innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
                if (csm.frustums) csm.updateFrustums(); // Only on resize
              });
            }

            init().catch((e) => {
              console.error("Init failed:", e);
              document.getElementById("backend").textContent = "Error: " + e.message;
            });
    </script>
  </body>
</html>
