<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TSL Ocean</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #060a10;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #controls {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 260px;
        background: rgba(6, 10, 18, 0.9);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(82, 167, 247, 0.12);
        border-radius: 10px;
        padding: 14px 16px;
        font-family: "DM Mono", monospace;
        color: #c8daf0;
        font-size: 11px;
        z-index: 10;
        max-height: calc(100vh - 32px);
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(82, 167, 247, 0.2) transparent;
      }
      #controls::-webkit-scrollbar {
        width: 3px;
      }
      #controls::-webkit-scrollbar-track {
        background: transparent;
      }
      #controls::-webkit-scrollbar-thumb {
        background: rgba(82, 167, 247, 0.25);
        border-radius: 2px;
      }
      #controls h2 {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #52a7f7;
        margin-bottom: 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid rgba(82, 167, 247, 0.15);
      }
      .ctrl-group {
        margin-bottom: 8px;
      }
      .ctrl-group label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2px;
        color: #7a94b0;
        font-size: 10px;
      }
      .ctrl-group label span {
        color: #52a7f7;
        font-weight: 500;
      }
      .ctrl-group input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 3px;
        border-radius: 2px;
        background: rgba(82, 167, 247, 0.12);
        outline: none;
      }
      .ctrl-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #52a7f7;
        cursor: pointer;
        box-shadow: 0 0 5px rgba(82, 167, 247, 0.4);
      }
      .ctrl-group input[type="color"] {
        -webkit-appearance: none;
        border: 1px solid rgba(82, 167, 247, 0.2);
        border-radius: 4px;
        width: 100%;
        height: 22px;
        cursor: pointer;
        background: transparent;
        padding: 1px;
      }
      .ctrl-group select {
        width: 100%;
        background: rgba(10, 16, 28, 0.9);
        border: 1px solid rgba(82, 167, 247, 0.2);
        border-radius: 4px;
        color: #c8daf0;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        padding: 4px 6px;
        cursor: pointer;
        outline: none;
      }
      .ctrl-group select option {
        background: #0a1020;
        color: #c8daf0;
      }
      .section-label {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: rgba(82, 167, 247, 0.4);
        margin: 12px 0 5px;
      }
      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .toggle-row span {
        color: #7a94b0;
        font-size: 10px;
      }
      .toggle {
        position: relative;
        width: 32px;
        height: 16px;
        background: rgba(82, 167, 247, 0.15);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .toggle.on {
        background: rgba(82, 167, 247, 0.6);
      }
      .toggle::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #c8daf0;
        transition: transform 0.2s;
      }
      .toggle.on::after {
        transform: translateX(16px);
        background: #fff;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.webgpu.min.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.webgpu.min.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.tsl.min.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="controls">
      <h2>Ocean Controls</h2>

      <div class="section-label">Material</div>
      <div class="ctrl-group">
        <label>Base Material</label>
        <select id="baseMaterial">
          <option value="physical" selected>MeshPhysicalNodeMaterial</option>
          <option value="standard">MeshStandardNodeMaterial</option>
          <option value="phong">MeshPhongNodeMaterial</option>
          <option value="lambert">MeshLambertNodeMaterial</option>
          <option value="basic">MeshBasicNodeMaterial</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Roughness <span id="roughVal">0.15</span></label>
        <input
          type="range"
          id="roughness"
          min="0"
          max="1"
          step="0.01"
          value="0.15"
        />
      </div>
      <div class="ctrl-group">
        <label>Metalness <span id="metalVal">0.05</span></label>
        <input
          type="range"
          id="metalness"
          min="0"
          max="1"
          step="0.01"
          value="0.05"
        />
      </div>
      <div class="ctrl-group">
        <label>Opacity <span id="opacityVal">1.00</span></label>
        <input
          type="range"
          id="opacity"
          min="0.05"
          max="1"
          step="0.01"
          value="1.0"
        />
      </div>

      <div class="section-label">Colors</div>
      <div class="ctrl-group">
        <label>Water Color</label>
        <input type="color" id="waterColor" value="#52a7f7" />
      </div>
      <div class="ctrl-group">
        <label>Highlight Color</label>
        <input type="color" id="highlightColor" value="#b3ffff" />
      </div>
      <div class="ctrl-group">
        <label>Brightness <span id="brightnessVal">0.50</span></label>
        <input
          type="range"
          id="brightness"
          min="0.1"
          max="2"
          step="0.01"
          value="0.5"
        />
      </div>

      <div class="section-label">Surface Coloring</div>
      <div class="ctrl-group">
        <label>Color Offset <span id="offsetVal">0.40</span></label>
        <input
          type="range"
          id="offset"
          min="0"
          max="2"
          step="0.01"
          value="0.4"
        />
      </div>
      <div class="ctrl-group">
        <label>Contrast <span id="contrastVal">1.20</span></label>
        <input
          type="range"
          id="contrast"
          min="0"
          max="10"
          step="0.1"
          value="1.2"
        />
      </div>

      <div class="section-label">Waves</div>
      <div class="ctrl-group">
        <label>Time Speed <span id="timeSpeedVal">5.0</span></label>
        <input
          type="range"
          id="timeSpeed"
          min="0.5"
          max="20"
          step="0.5"
          value="5"
        />
      </div>
      <div class="ctrl-group">
        <label>Water Height <span id="waveHeightVal">0.20</span></label>
        <input
          type="range"
          id="waveHeight"
          min="0.01"
          max="0.8"
          step="0.01"
          value="0.2"
        />
      </div>
      <div class="ctrl-group">
        <label>Wave Amplitude <span id="waveAmpVal">1.00</span></label>
        <input
          type="range"
          id="waveAmp"
          min="0"
          max="3"
          step="0.05"
          value="1.0"
        />
      </div>
      <div class="ctrl-group">
        <label>Wave Frequency <span id="waveFreqVal">1.00</span></label>
        <input
          type="range"
          id="waveFreq"
          min="0.1"
          max="5"
          step="0.1"
          value="1.0"
        />
      </div>
      <div class="ctrl-group">
        <label>Segments <span id="segmentsVal">128</span></label>
        <input
          type="range"
          id="segments"
          min="16"
          max="512"
          step="16"
          value="128"
        />
      </div>

      <div class="section-label">Foam / Whitecaps</div>
      <div class="toggle-row">
        <span>Enable Foam</span>
        <div class="toggle on" id="foamToggle"></div>
      </div>
      <div class="ctrl-group">
        <label>Foam Threshold <span id="foamThreshVal">0.35</span></label>
        <input
          type="range"
          id="foamThresh"
          min="0"
          max="1"
          step="0.01"
          value="0.35"
        />
      </div>
      <div class="ctrl-group">
        <label>Foam Intensity <span id="foamIntVal">0.80</span></label>
        <input
          type="range"
          id="foamInt"
          min="0"
          max="1.5"
          step="0.01"
          value="0.80"
        />
      </div>
      <div class="ctrl-group">
        <label>Foam Color</label>
        <input type="color" id="foamColor" value="#e8f4ff" />
      </div>

      <div class="section-label">Fresnel Rim</div>
      <div class="toggle-row">
        <span>Enable Fresnel</span>
        <div class="toggle on" id="fresnelToggle"></div>
      </div>
      <div class="ctrl-group">
        <label>Fresnel Power <span id="fresnelPowerVal">3.00</span></label>
        <input
          type="range"
          id="fresnelPower"
          min="0.5"
          max="10"
          step="0.1"
          value="3.0"
        />
      </div>
      <div class="ctrl-group">
        <label>Fresnel Intensity <span id="fresnelIntVal">0.40</span></label>
        <input
          type="range"
          id="fresnelInt"
          min="0"
          max="1"
          step="0.01"
          value="0.4"
        />
      </div>
      <div class="ctrl-group">
        <label>Fresnel Color</label>
        <input type="color" id="fresnelColor" value="#aaeeff" />
      </div>

      <div class="section-label">Depth Fog</div>
      <div class="toggle-row">
        <span>Enable Depth Fog</span>
        <div class="toggle on" id="depthFogToggle"></div>
      </div>
      <div class="ctrl-group">
        <label>Deep Color</label>
        <input type="color" id="deepColor" value="#0a2a5c" />
      </div>
      <div class="ctrl-group">
        <label>Depth Strength <span id="depthStrVal">0.45</span></label>
        <input
          type="range"
          id="depthStr"
          min="0"
          max="1"
          step="0.01"
          value="0.45"
        />
      </div>

      <div class="section-label">Environment</div>
      <div class="ctrl-group">
        <label>Env. Light</label>
        <select id="envSource">
          <option value="procedural">Procedural (Sky)</option>
          <option value="hdri">HDRI</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Scene Mood</label>
        <select id="sceneMood">
          <option value="day" selected>Day (Bright Sky)</option>
          <option value="sunset">Sunset</option>
          <option value="night">Night (Dark)</option>
          <option value="overcast">Overcast</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Sun Elevation <span id="sunElVal">45</span>°</label>
        <input type="range" id="sunEl" min="-10" max="90" step="1" value="45" />
      </div>
      <div class="ctrl-group">
        <label>Sun Azimuth <span id="sunAzVal">180</span>°</label>
        <input type="range" id="sunAz" min="0" max="360" step="1" value="180" />
      </div>
      <div class="ctrl-group">
        <label>Atmosphere Haze <span id="hazeVal">0.30</span></label>
        <input
          type="range"
          id="haze"
          min="0"
          max="1"
          step="0.01"
          value="0.30"
        />
      </div>
    </div>

    <script type="module">
      import * as THREE from "three/webgpu";
      import {
        Fn,
        uniform,
        vec2,
        vec3,
        vec4,
        float,
        int,
        time,
        sin,
        cos,
        dot,
        floor,
        fract,
        mix,
        abs,
        pow,
        normalize,
        cross,
        positionLocal,
        positionWorld,
        normalLocal,
        normalWorld,
        positionGeometry,
        cameraPosition,
        Loop,
        max,
        min,
        smoothstep,
        select,
        varying,
        vertexStage,
        oneMinus,
        exp,
        clamp,
        length,
        saturate,
      } from "three/tsl";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { HDRLoader } from "three/addons/loaders/HDRLoader.js";

      // ═══════════════════════════════════════════
      //  UNIFORMS
      // ═══════════════════════════════════════════

      // Wave
      const uTimeSpeed = uniform(5.0);
      const uWaterHeight = uniform(0.2);
      const uWaveAmp = uniform(1.0);
      const uWaveFreq = uniform(1.0);

      // Color
      const uWaterColor = uniform(
        new THREE.Color(0x52a7f7).convertLinearToSRGB(),
      );
      const uHighlight = uniform(
        new THREE.Color(0xb3ffff).convertLinearToSRGB(),
      );
      const uBrightness = uniform(1.0);
      const uOffset = uniform(0.4);
      const uContrast = uniform(1.2);
      const uOpacity = uniform(1.0);

      // Foam
      const uFoamEnabled = uniform(1.0);
      const uFoamThreshold = uniform(0.35);
      const uFoamIntensity = uniform(0.8);
      const uFoamColor = uniform(new THREE.Color(0xe8f4ff));

      // Fresnel
      const uFresnelEnabled = uniform(1.0);
      const uFresnelPower = uniform(3.0);
      const uFresnelIntensity = uniform(0.4);
      const uFresnelColor = uniform(new THREE.Color(0xaaeeff));

      // Depth fog
      const uDepthFogEnabled = uniform(1.0);
      const uDeepColor = uniform(new THREE.Color(0x0a2a5c));
      const uDepthStrength = uniform(0.45);

      // Sky
      const uSkyTop = uniform(new THREE.Color(0x1a6bc4));
      const uSkyHorizon = uniform(new THREE.Color(0xaaccee));
      const uSkyBottom = uniform(new THREE.Color(0x0a2a5c));
      const uSunColor = uniform(new THREE.Color(0xffffee));
      const uSunDir = uniform(new THREE.Vector3(0, 0.7, -0.7));
      const uSunSize = uniform(0.04);
      const uHaze = uniform(0.3);

      // ═══════════════════════════════════════════
      //  NOISE
      // ═══════════════════════════════════════════
      const hash21 = Fn(([p]) => {
        return fract(sin(dot(p, vec2(12.9898, 78.233))).mul(43758.5453));
      });

      const valueNoise2D = Fn(([p_immutable]) => {
        const p = p_immutable.toVar();
        const i = floor(p).toVar();
        const f = fract(p).toVar();
        const u = f.mul(f).mul(float(3.0).sub(f.mul(2.0)));
        const a = hash21(i);
        const b = hash21(i.add(vec2(1.0, 0.0)));
        const c = hash21(i.add(vec2(0.0, 1.0)));
        const d = hash21(i.add(vec2(1.0, 1.0)));
        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      });

      // fBm: scale=0.4, lacunarity=2.3, persistence=0.4, octaves=5
      const fbm = Fn(([p_immutable]) => {
        const p = p_immutable.toVar();
        const value = float(0.0).toVar();
        const amp = float(1.0).toVar();
        const freq = float(0.4).toVar();
        const totalAmp = float(0.0).toVar();
        Loop(5, () => {
          value.addAssign(amp.mul(valueNoise2D(p.mul(freq))));
          totalAmp.addAssign(amp);
          freq.mulAssign(2.3);
          amp.mulAssign(0.4);
        });
        return value.div(totalAmp);
      });

      // ═══════════════════════════════════════════
      //  GERSTNER WAVE
      // ═══════════════════════════════════════════
      const gerstnerWave = Fn(
        ([
          pos,
          dirX,
          dirY,
          steepness_immutable,
          wavelength_immutable,
          t_immutable,
        ]) => {
          const steepness = float(steepness_immutable).toVar();
          const wavelength = float(wavelength_immutable).toVar();
          const t = float(t_immutable).toVar();
          const k = float(6.283185).div(wavelength);
          const c = float(9.8).div(k).abs().sqrt();
          const dir = normalize(vec2(float(dirX), float(dirY))).toVar();
          const f = k.mul(dot(dir, vec2(pos.x, pos.y)).sub(c.mul(t)));
          return vec3(
            steepness.div(k).mul(dir.x).mul(cos(f)),
            steepness.div(k).mul(sin(f)),
            steepness.div(k).mul(dir.y).mul(cos(f)),
          );
        },
      );

      // ═══════════════════════════════════════════
      //  DISPLACEMENT
      // ═══════════════════════════════════════════
      const displace = Fn(([point_immutable]) => {
        const point = point_immutable.toVar();
        const t = time.div(uTimeSpeed).negate();
        const pScrolled = vec2(point.x, point.y.add(t.mul(2.0)));
        const n = vec3(0.0, 0.0, 0.0).toVar();

        // fBm
        const fbmVal = fbm(pScrolled.add(t.mul(0.5)));
        n.z.addAssign(fbmVal);

        // Gerstner waves A-D
        const wA = gerstnerWave(
          point,
          0.0,
          -1.0,
          0.5,
          float(2.0).div(uWaveFreq),
          t,
        );
        const wB = gerstnerWave(
          point,
          0.0,
          1.0,
          0.25,
          float(4.0).div(uWaveFreq),
          t,
        );
        const wC = gerstnerWave(
          point,
          1.0,
          1.0,
          0.15,
          float(6.0).div(uWaveFreq),
          t,
        );
        const wD = gerstnerWave(
          point,
          1.0,
          1.0,
          0.4,
          float(2.0).div(uWaveFreq),
          t,
        );

        n.addAssign(vec3(wA.x, wA.z, wA.y));
        n.addAssign(vec3(wB.x, wB.z, wB.y).mul(0.5));
        n.addAssign(vec3(wC.x, wC.z, wC.y).mul(0.25));
        n.addAssign(vec3(wD.x, wD.z, wD.y).mul(0.2));

        n.mulAssign(uWaveAmp);

        // Top-face mask
        const topMask = smoothstep(
          float(0.0),
          float(0.05),
          point.z.add(uWaterHeight.mul(0.5)),
        );
        n.mulAssign(topMask);

        return point.add(n);
      });

      // ═══════════════════════════════════════════
      //  NORMAL RECALC
      // ═══════════════════════════════════════════
      const recalcNormals = Fn(([newPos, origPos, origNormal]) => {
        const eps = float(0.002);
        const tangent = normalize(
          select(
            abs(origNormal.x).greaterThan(abs(origNormal.z)),
            vec3(origNormal.y.negate(), origNormal.x, 0.0),
            vec3(0.0, origNormal.z.negate(), origNormal.y),
          ),
        ).toVar();
        const bitangent = normalize(cross(origNormal, tangent)).toVar();
        const dn1 = displace(origPos.add(tangent.mul(eps)));
        const dn2 = displace(origPos.add(bitangent.mul(eps)));
        return normalize(cross(dn1.sub(newPos), dn2.sub(newPos)));
      });

      // ═══════════════════════════════════════════
      //  VARYINGS
      // ═══════════════════════════════════════════
      const vHeightCalc = Fn(() => {
        const pos = positionLocal.toVar();
        const displaced = displace(pos);
        return displaced.z.sub(pos.z);
      });
      const vHeight = varying(vertexStage(vHeightCalc()), "vHeight");

      const vWorldPosCalc = Fn(() => {
        return displace(positionLocal);
      });
      const vDisplacedPos = varying(
        vertexStage(vWorldPosCalc()),
        "vDisplacedPos",
      );

      // ═══════════════════════════════════════════
      //  FRAGMENT: COLOR
      // ═══════════════════════════════════════════
      const colorShader = Fn(() => {
        const h = vHeight.toVar();

        // Base color from height: soft gradient (smoothstep) so transitions feather like the reference
        const gradientWidth = float(0.5).div(max(uContrast, float(0.5)));
        const mask = smoothstep(
          uOffset.sub(gradientWidth),
          uOffset.add(gradientWidth),
          h,
        ).clamp(0.0, 1.0);
        const baseColor = mix(uWaterColor, uHighlight, mask).toVar();

        // Depth fog: wide soft transition so deep blue blends gradually
        const depthMask = oneMinus(smoothstep(float(-0.5), float(0.2), h))
          .mul(uDepthStrength)
          .mul(uDepthFogEnabled);
        baseColor.assign(mix(baseColor, uDeepColor, depthMask));

        // Foam: smooth gradient by height only (no noise), same shape as wave crests
        const foamMask = smoothstep(uFoamThreshold, uFoamThreshold.add(0.5), h)
          .mul(uFoamIntensity)
          .mul(uFoamEnabled);
        baseColor.assign(mix(baseColor, uFoamColor, foamMask.clamp(0.0, 1.0)));

        // Brightness
        baseColor.mulAssign(uBrightness);

        // Fresnel
        const viewDir = normalize(cameraPosition.sub(positionWorld));
        const NdotV = max(dot(normalWorld, viewDir), 0.0);
        const fresnel = pow(oneMinus(NdotV), uFresnelPower)
          .mul(uFresnelIntensity)
          .mul(uFresnelEnabled);
        baseColor.assign(
          mix(baseColor, uFresnelColor, fresnel.clamp(0.0, 1.0)),
        );

        return baseColor;
      });

      // ═══════════════════════════════════════════
      //  FRAGMENT: OPACITY
      // ═══════════════════════════════════════════
      const opacityShader = Fn(() => {
        const alpha = uOpacity.toVar();
        const viewDir = normalize(cameraPosition.sub(positionWorld));
        const NdotV = max(dot(normalWorld, viewDir), 0.0);
        const edgeAlpha = pow(oneMinus(NdotV), float(2.0))
          .mul(0.4)
          .mul(uFresnelEnabled);
        alpha.assign(max(alpha, alpha.add(edgeAlpha)).clamp(0.0, 1.0));
        return alpha;
      });

      // ═══════════════════════════════════════════
      //  SCENE
      // ═══════════════════════════════════════════
      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        50,
        window.innerWidth / window.innerHeight,
        0.1,
        5000,
      );
      camera.position.set(3, 4, 6);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGPURenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      document.body.appendChild(renderer.domElement);

      await renderer.init();

      const orbitControls = new OrbitControls(camera, renderer.domElement);
      orbitControls.enableDamping = true;
      orbitControls.dampingFactor = 0.05;
      orbitControls.minDistance = 1;
      orbitControls.maxDistance = 50;
      orbitControls.target.set(0, 0, 0);

      // ═══════════════════════════════════════════
      //  LIGHTING
      // ═══════════════════════════════════════════
      const ambientLight = new THREE.AmbientLight(0x8ab4d8, 0.6);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xfff5e0, 3.0);
      sunLight.position.set(5, 10, 7);
      scene.add(sunLight);

      const fillLight = new THREE.DirectionalLight(0x6699cc, 1.0);
      fillLight.position.set(-5, 5, -5);
      scene.add(fillLight);

      const rimLight = new THREE.DirectionalLight(0xaaddff, 1.2);
      rimLight.position.set(0, 3, -8);
      scene.add(rimLight);

      // ═══════════════════════════════════════════
      //  PROCEDURAL SKY (TSL — no Sky addon)
      // ═══════════════════════════════════════════

      // Sky dome: large inverted sphere with TSL fragment shader
      const skyGeo = new THREE.SphereGeometry(2000, 32, 32);
      const skyMat = new THREE.MeshBasicNodeMaterial({ side: THREE.BackSide });

      skyMat.colorNode = Fn(() => {
        const dir = normalize(positionGeometry).toVar();

        // Vertical gradient: y goes -1 (nadir) to +1 (zenith)
        const y = dir.y.toVar();

        // Sky gradient
        const horizonMix = smoothstep(float(-0.05), float(0.0), y);
        const skyGrad = mix(uSkyBottom, uSkyHorizon, horizonMix).toVar();

        const zenithMix = smoothstep(float(0.0), float(0.6), y);
        skyGrad.assign(mix(skyGrad, uSkyTop, zenithMix));

        // Sun disc
        const sunDot = max(dot(dir, normalize(uSunDir)), 0.0);
        const sunDisc = smoothstep(oneMinus(uSunSize), float(1.0), sunDot);
        skyGrad.assign(mix(skyGrad, uSunColor, sunDisc));

        // Sun glow / halo
        const sunGlow = pow(max(sunDot, 0.0), float(8.0)).mul(0.6);
        skyGrad.addAssign(uSunColor.mul(sunGlow).mul(uHaze.add(0.3)));

        // Atmospheric haze near horizon
        const hazeAmount = exp(abs(y).negate().mul(4.0)).mul(uHaze);
        const hazeColor = mix(uSkyHorizon, uSunColor, float(0.2));
        skyGrad.assign(mix(skyGrad, hazeColor, hazeAmount));

        return skyGrad;
      })();

      const skyMesh = new THREE.Mesh(skyGeo, skyMat);
      scene.add(skyMesh);

      // ═══════════════════════════════════════════
      //  HDRI ENVIRONMENT
      // ═══════════════════════════════════════════
      const pmremGen = new THREE.PMREMGenerator(renderer);
      let proceduralEnvTexture = null;
      let hdriEnvTexture = null;
      let envSource = "procedural"; // 'procedural' | 'hdri'

      function updateEnvMap() {
        if (waterMesh) waterMesh.visible = false;
        if (proceduralEnvTexture) proceduralEnvTexture.dispose();
        const renderTarget = pmremGen.fromScene(scene, 0, 0.1, 5000);
        proceduralEnvTexture = renderTarget.texture;
        if (waterMesh) waterMesh.visible = true;
        if (envSource === "procedural")
          scene.environment = proceduralEnvTexture;
      }

      function applyEnvSource() {
        if (envSource === "hdri" && hdriEnvTexture) {
          scene.environment = hdriEnvTexture;
          sunLight.intensity = 0;
        } else if (envSource === "procedural" && proceduralEnvTexture) {
          scene.environment = proceduralEnvTexture;
          const moodName = document.getElementById("sceneMood").value;
          const m = moods[moodName];
          if (m) {
            sunLight.intensity = m.sunInt;
            sunLight.color.set(m.sunColor);
          }
        }
      }

      // Load HDRI for background and reflections (nice outdoor/sky)
      const HDRI_URL =
        "https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/venice_sunset_1k.hdr";
      const hdrLoader = new HDRLoader();
      hdrLoader.load(
        HDRI_URL,
        (hdrEquirectangular) => {
          hdrEquirectangular.mapping = THREE.EquirectangularReflectionMapping;
          const rt = pmremGen.fromEquirectangular(hdrEquirectangular);
          hdriEnvTexture = rt.texture;
          skyMesh.visible = true;
          rt.dispose();
          if (envSource === "hdri") {
            scene.environment = hdriEnvTexture;
            sunLight.intensity = 0;
          }
        },
        undefined,
        (err) => {
          console.warn("HDRI failed to load, using procedural sky:", err);
          updateEnvMap();
        },
      );

      // ═══════════════════════════════════════════
      //  SUN / MOOD
      // ═══════════════════════════════════════════
      function updateSun(elevation, azimuth) {
        const phi = THREE.MathUtils.degToRad(90 - elevation);
        const theta = THREE.MathUtils.degToRad(azimuth);
        const dir = new THREE.Vector3().setFromSphericalCoords(1, phi, theta);
        uSunDir.value.copy(dir);
        sunLight.position.copy(dir).multiplyScalar(100);
        updateEnvMap();
      }

      const moods = {
        day: {
          elevation: 45,
          azimuth: 180,
          haze: 0.3,
          skyTop: 0x1a6bc4,
          skyHorizon: 0xaaccee,
          skyBottom: 0x445577,
          sunColor: 0xffffee,
          ambientColor: 0x8ab4d8,
          ambientInt: 0.6,
          sunInt: 3.0,
          exposure: 1.0,
        },
        sunset: {
          elevation: 5,
          azimuth: 200,
          haze: 0.7,
          skyTop: 0x1a2a6c,
          skyHorizon: 0xff8844,
          skyBottom: 0x220a00,
          sunColor: 0xffaa44,
          ambientColor: 0xcc8866,
          ambientInt: 0.4,
          sunInt: 4.0,
          exposure: 0.8,
        },
        night: {
          elevation: -5,
          azimuth: 180,
          haze: 0.05,
          skyTop: 0x040810,
          skyHorizon: 0x0a1428,
          skyBottom: 0x020408,
          sunColor: 0x8899bb,
          ambientColor: 0x1a2a44,
          ambientInt: 0.3,
          sunInt: 0.3,
          exposure: 0.5,
        },
        overcast: {
          elevation: 60,
          azimuth: 180,
          haze: 0.8,
          skyTop: 0x778899,
          skyHorizon: 0xbbccdd,
          skyBottom: 0x556677,
          sunColor: 0xdddddd,
          ambientColor: 0x99aabc,
          ambientInt: 1.0,
          sunInt: 1.2,
          exposure: 0.9,
        },
      };

      function setMood(name) {
        const m = moods[name];

        // Update sliders
        document.getElementById("sunEl").value = m.elevation;
        document.getElementById("sunAz").value = m.azimuth;
        document.getElementById("haze").value = m.haze;
        document.getElementById("sunElVal").textContent = m.elevation;
        document.getElementById("sunAzVal").textContent = m.azimuth;
        document.getElementById("hazeVal").textContent = m.haze.toFixed(2);

        // Sky colors
        uSkyTop.value.set(m.skyTop);
        uSkyHorizon.value.set(m.skyHorizon);
        uSkyBottom.value.set(m.skyBottom);
        uSunColor.value.set(m.sunColor);
        uHaze.value = m.haze;

        // Lighting
        ambientLight.color.set(m.ambientColor);
        ambientLight.intensity = m.ambientInt;
        sunLight.intensity = m.sunInt;
        sunLight.color.set(m.sunColor);
        renderer.toneMappingExposure = m.exposure;

        updateSun(m.elevation, m.azimuth);
        if (envSource === "hdri") sunLight.intensity = 0;
      }

      // ═══════════════════════════════════════════
      //  WATER
      // ═══════════════════════════════════════════
      let waterMesh;
      let currentMaterialType = "physical";

      function createMaterial(type) {
        let mat;
        switch (type) {
          case "physical":
            mat = new THREE.MeshPhysicalNodeMaterial();
            mat.roughness = parseFloat(
              document.getElementById("roughness").value,
            );
            mat.metalness = parseFloat(
              document.getElementById("metalness").value,
            );
            mat.clearcoat = 0.3;
            mat.clearcoatRoughness = 0.2;
            break;
          case "standard":
            mat = new THREE.MeshStandardNodeMaterial();
            mat.roughness = parseFloat(
              document.getElementById("roughness").value,
            );
            mat.metalness = parseFloat(
              document.getElementById("metalness").value,
            );
            break;
          case "phong":
            mat = new THREE.MeshPhongNodeMaterial();
            mat.shininess = 80;
            break;
          case "lambert":
            mat = new THREE.MeshLambertNodeMaterial();
            break;
          case "basic":
            mat = new THREE.MeshBasicNodeMaterial();
            break;
        }

        mat.side = THREE.DoubleSide;
        mat.flatShading = false;
        mat.transparent = true;

        // Position
        mat.positionNode = Fn(() => displace(positionLocal))();

        // Normals (skip for basic — no lighting)
        if (type !== "basic") {
          mat.normalNode = Fn(() => {
            const displaced = displace(positionLocal);
            return recalcNormals(displaced, positionLocal, normalLocal);
          })();
        }

        // Color + Opacity
        mat.colorNode = colorShader();
        mat.opacityNode = opacityShader();

        return mat;
      }

      function createWater() {
        if (waterMesh) {
          scene.remove(waterMesh);
          waterMesh.geometry.dispose();
          waterMesh.material.dispose();
        }

        const segments = Math.max(
          16,
          Math.min(
            512,
            Math.round(parseFloat(document.getElementById("segments").value) || 128),
          ),
        );
        const geometry = new THREE.BoxGeometry(
          8,
          8,
          0.2,
          segments,
          segments,
          1,
        );
        const material = createMaterial(currentMaterialType);

        waterMesh = new THREE.Mesh(geometry, material);
        waterMesh.rotation.x = -Math.PI / 2;
        scene.add(waterMesh);

        // Rebuild env with new water hidden
        updateEnvMap();
      }

      // Init sky first, then water
      setMood("day");
      createWater();

      // ═══════════════════════════════════════════
      //  UI BINDING
      // ═══════════════════════════════════════════
      function bindSlider(id, valId, cb) {
        const el = document.getElementById(id);
        const valEl = document.getElementById(valId);
        el.addEventListener("input", () => {
          const v = parseFloat(el.value);
          valEl.textContent = v.toFixed(2);
          cb(v);
        });
      }

      function bindToggle(id, cb) {
        const el = document.getElementById(id);
        el.addEventListener("click", () => {
          el.classList.toggle("on");
          cb(el.classList.contains("on") ? 1.0 : 0.0);
        });
      }

      // Material
      document
        .getElementById("baseMaterial")
        .addEventListener("change", (e) => {
          currentMaterialType = e.target.value;
          createWater();
        });

      bindSlider("roughness", "roughVal", (v) => {
        if (waterMesh && waterMesh.material.roughness !== undefined)
          waterMesh.material.roughness = v;
      });
      bindSlider("metalness", "metalVal", (v) => {
        if (waterMesh && waterMesh.material.metalness !== undefined)
          waterMesh.material.metalness = v;
      });
      bindSlider("opacity", "opacityVal", (v) => {
        uOpacity.value = v;
      });

      // Colors
      bindSlider("brightness", "brightnessVal", (v) => {
        uBrightness.value = v * 2;
      });
      bindSlider("offset", "offsetVal", (v) => {
        uOffset.value = v;
      });
      bindSlider("contrast", "contrastVal", (v) => {
        uContrast.value = v;
      });
      document.getElementById("waterColor").addEventListener("input", (e) => {
        uWaterColor.value.set(e.target.value).convertLinearToSRGB();
      });
      document
        .getElementById("highlightColor")
        .addEventListener("input", (e) => {
          uHighlight.value.set(e.target.value).convertLinearToSRGB();
        });

      // Waves
      bindSlider("timeSpeed", "timeSpeedVal", (v) => {
        uTimeSpeed.value = v;
      });
      bindSlider("waveHeight", "waveHeightVal", (v) => {
        uWaterHeight.value = v;
      });
      bindSlider("waveAmp", "waveAmpVal", (v) => {
        uWaveAmp.value = v;
      });
      bindSlider("waveFreq", "waveFreqVal", (v) => {
        uWaveFreq.value = v;
      });
      const segmentsEl = document.getElementById("segments");
      const segmentsValEl = document.getElementById("segmentsVal");
      segmentsEl.addEventListener("input", () => {
        const seg = Math.max(
          16,
          Math.min(512, Math.round(parseFloat(segmentsEl.value) || 128)),
        );
        segmentsEl.value = seg;
        segmentsValEl.textContent = seg;
        createWater();
      });

      // Foam
      bindToggle("foamToggle", (v) => {
        uFoamEnabled.value = v;
      });
      bindSlider("foamThresh", "foamThreshVal", (v) => {
        uFoamThreshold.value = v;
      });
      bindSlider("foamInt", "foamIntVal", (v) => {
        uFoamIntensity.value = v;
      });
      document.getElementById("foamColor").addEventListener("input", (e) => {
        uFoamColor.value.set(e.target.value);
      });

      // Fresnel
      bindToggle("fresnelToggle", (v) => {
        uFresnelEnabled.value = v;
      });
      bindSlider("fresnelPower", "fresnelPowerVal", (v) => {
        uFresnelPower.value = v;
      });
      bindSlider("fresnelInt", "fresnelIntVal", (v) => {
        uFresnelIntensity.value = v;
      });
      document.getElementById("fresnelColor").addEventListener("input", (e) => {
        uFresnelColor.value.set(e.target.value);
      });

      // Depth fog
      bindToggle("depthFogToggle", (v) => {
        uDepthFogEnabled.value = v;
      });
      bindSlider("depthStr", "depthStrVal", (v) => {
        uDepthStrength.value = v;
      });
      document.getElementById("deepColor").addEventListener("input", (e) => {
        uDeepColor.value.set(e.target.value);
      });

      // Environment
      document.getElementById("envSource").addEventListener("change", (e) => {
        envSource = e.target.value;
        applyEnvSource();
      });
      document.getElementById("sceneMood").addEventListener("change", (e) => {
        setMood(e.target.value);
      });

      document.getElementById("sunEl").addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        document.getElementById("sunElVal").textContent = v;
        updateSun(v, parseFloat(document.getElementById("sunAz").value));
      });
      document.getElementById("sunAz").addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        document.getElementById("sunAzVal").textContent = v;
        updateSun(parseFloat(document.getElementById("sunEl").value), v);
      });
      bindSlider("haze", "hazeVal", (v) => {
        uHaze.value = v;
        updateEnvMap();
      });

      // ═══════════════════════════════════════════
      //  RESIZE + ANIMATE
      // ═══════════════════════════════════════════
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function animate() {
        requestAnimationFrame(animate);
        orbitControls.update();
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
