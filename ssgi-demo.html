<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU SSGI Demo – Screen Space Global Illumination</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #111;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #info {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        font: 12px/1.5 "SF Mono", "Fira Code", monospace;
        color: #b0d890;
        background: rgba(0, 0, 0, 0.6);
        padding: 8px 12px;
        border-radius: 6px;
        pointer-events: none;
      }
      #pane-container {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 100;
        max-height: calc(100vh - 32px);
        overflow-y: auto;
        background: rgba(20, 20, 25, 0.92);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .tp-dfwv {
        z-index: 100 !important;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.tsl.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="pane-container"></div>
    <div id="info">
      SSGI Demo &mdash; <span id="backend">loading…</span> &bull; OrbitControls:
      drag to rotate
    </div>

    <script type="module">
      import * as THREE from "three/webgpu";
      import {
        pass,
        mrt,
        output,
        normalView,
        diffuseColor,
        velocity,
        add,
        vec4,
        vec3,
        directionToColor,
        colorToDirection,
        sample,
      } from "three/tsl";
      import { ssgi } from "three/addons/tsl/display/SSGINode.js";
      import { traa } from "three/addons/tsl/display/TRAANode.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      const TweakpaneMod = await import(
        "https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js"
      );
      const Pane = TweakpaneMod.Pane ?? TweakpaneMod.default;

      let camera, scene, renderer, renderPipeline, controls;

      async function init() {
        camera = new THREE.PerspectiveCamera(
          40,
          window.innerWidth / window.innerHeight,
          0.1,
          100,
        );
        camera.position.set(0, 10, 30);

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaaaaa);

        renderer = new THREE.WebGPURenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setAnimationLoop(animate);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        document.getElementById("backend").textContent = "WebGPU";

        controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 7, 0);
        controls.enablePan = true;
        controls.minDistance = 1;
        controls.maxDistance = 100;
        controls.update();

        renderPipeline = new THREE.RenderPipeline(renderer);

        const scenePass = pass(scene, camera);
        scenePass.setMRT(
          mrt({
            output: output,
            diffuseColor: diffuseColor,
            normal: directionToColor(normalView),
            velocity: velocity,
          }),
        );

        const scenePassColor = scenePass.getTextureNode("output");
        const scenePassDiffuse = scenePass.getTextureNode("diffuseColor");
        const scenePassDepth = scenePass.getTextureNode("depth");
        const scenePassNormal = scenePass.getTextureNode("normal");

        const diffuseTexture = scenePass.getTexture("diffuseColor");
        diffuseTexture.type = THREE.UnsignedByteType;
        const normalTexture = scenePass.getTexture("normal");
        normalTexture.type = THREE.UnsignedByteType;

        const sceneNormal = sample((uv) => {
          return colorToDirection(scenePassNormal.sample(uv));
        });

        const giPass = ssgi(
          scenePassColor,
          scenePassDepth,
          sceneNormal,
          camera,
        );
        giPass.sliceCount.value = 2;
        giPass.stepCount.value = 8;
        giPass.giIntensity.value = 15;
        giPass.aoIntensity.value = 1.2;

        const gi = giPass.rgb;
        const ao = giPass.a;

        const compositePass = vec4(
          add(scenePassColor.rgb.mul(ao), scenePassDiffuse.rgb.mul(gi)),
          scenePassColor.a,
        );

        const scenePassVelocity = scenePass.getTextureNode("velocity");
        const traaPass = traa(
          compositePass,
          scenePassDepth,
          scenePassVelocity,
          camera,
        );

        renderPipeline.outputNode = traaPass;

        // Cornell Box scene
        const wallGeometry = new THREE.PlaneGeometry(1, 1);

        const redWallMaterial = new THREE.MeshPhysicalMaterial({
          color: "#ff3333",
        });
        const leftWall = new THREE.Mesh(wallGeometry, redWallMaterial);
        leftWall.scale.set(20, 15, 1);
        leftWall.rotation.y = Math.PI * 0.5;
        leftWall.position.set(-10, 7.5, 0);
        leftWall.receiveShadow = true;
        scene.add(leftWall);

        const greenWallMaterial = new THREE.MeshPhysicalMaterial({
          color: "#33ff33",
        });
        const rightWall = new THREE.Mesh(wallGeometry, greenWallMaterial);
        rightWall.scale.set(20, 15, 1);
        rightWall.rotation.y = Math.PI * -0.5;
        rightWall.position.set(10, 7.5, 0);
        rightWall.receiveShadow = true;
        scene.add(rightWall);

        const whiteMaterial = new THREE.MeshPhysicalMaterial({
          color: "#ffffff",
        });

        const floor = new THREE.Mesh(wallGeometry, whiteMaterial);
        floor.scale.set(20, 20, 1);
        floor.rotation.x = Math.PI * -0.5;
        floor.receiveShadow = true;
        scene.add(floor);

        const backWall = new THREE.Mesh(wallGeometry, whiteMaterial);
        backWall.scale.set(15, 20, 1);
        backWall.rotation.z = Math.PI * -0.5;
        backWall.position.set(0, 7.5, -10);
        backWall.receiveShadow = true;
        scene.add(backWall);

        const ceiling = new THREE.Mesh(wallGeometry, whiteMaterial);
        ceiling.scale.set(20, 20, 1);
        ceiling.rotation.x = Math.PI * 0.5;
        ceiling.position.set(0, 15, 0);
        ceiling.receiveShadow = true;
        scene.add(ceiling);

        const tallBoxGeometry = new THREE.BoxGeometry(5, 7, 5);
        const tallBox = new THREE.Mesh(tallBoxGeometry, whiteMaterial);
        tallBox.rotation.y = Math.PI * 0.25;
        tallBox.position.set(-3, 3.5, -2);
        tallBox.castShadow = true;
        tallBox.receiveShadow = true;
        scene.add(tallBox);

        const shortBoxGeometry = new THREE.BoxGeometry(4, 4, 4);
        const shortBox = new THREE.Mesh(shortBoxGeometry, whiteMaterial);
        shortBox.rotation.y = Math.PI * -0.1;
        shortBox.position.set(4, 2, 4);
        shortBox.castShadow = true;
        shortBox.receiveShadow = true;
        scene.add(shortBox);

        const lightSourceGeometry = new THREE.CylinderGeometry(2.5, 2.5, 1, 64);
        const lightSourceMaterial = new THREE.MeshBasicMaterial();
        const lightSource = new THREE.Mesh(
          lightSourceGeometry,
          lightSourceMaterial,
        );
        lightSource.position.y = 15;
        scene.add(lightSource);

        const pointLight = new THREE.PointLight("#ffffff", 100);
        pointLight.position.set(0, 13, 0);
        pointLight.distance = 100;
        pointLight.castShadow = true;
        pointLight.shadow.mapSize.width = 1024;
        pointLight.shadow.mapSize.height = 1024;
        scene.add(pointLight);

        const ambientLight = new THREE.AmbientLight("#0c0c0c");
        scene.add(ambientLight);

        window.addEventListener("resize", onWindowResize);

        const params = {
          output: "Combined",
          sliceCount: 2,
          stepCount: 8,
          radius: 12,
          giIntensity: 15,
          aoIntensity: 1.2,
          expFactor: 2,
          thickness: 1,
          backfaceLighting: 0,
          useLinearThickness: false,
          useScreenSpaceSampling: false,
          temporalFiltering: true,
          sceneBg: "#aaaaaa",
          ambientIntensity: 1,
          pointLightIntensity: 100,
          pointLightX: 0,
          pointLightY: 13,
          pointLightZ: 0,
          leftWallColor: "#ff3333",
          rightWallColor: "#33ff33",
          floorColor: "#ffffff",
        };

        const pane = new Pane({
          title: "SSGI Demo",
          container: document.getElementById("pane-container"),
        });

        const fPresets = pane.addFolder({ title: "Presets", expanded: true });
        fPresets.addButton({ title: "Low (fast)" }).on("click", () => {
          params.sliceCount = 1;
          params.stepCount = 12;
          giPass.sliceCount.value = 1;
          giPass.stepCount.value = 12;
          pane.refresh();
        });
        fPresets.addButton({ title: "Medium" }).on("click", () => {
          params.sliceCount = 2;
          params.stepCount = 8;
          giPass.sliceCount.value = 2;
          giPass.stepCount.value = 8;
          pane.refresh();
        });
        fPresets.addButton({ title: "High (quality)" }).on("click", () => {
          params.sliceCount = 3;
          params.stepCount = 16;
          giPass.sliceCount.value = 3;
          giPass.stepCount.value = 16;
          pane.refresh();
        });

        const fOutput = pane.addFolder({ title: "Output", expanded: true });
        fOutput
          .addBinding(params, "output", {
            options: {
              Combined: "Combined",
              Direct: "Direct",
              AO: "AO",
              GI: "GI",
            },
          })
          .on("change", updateOutput);
        fOutput.addBinding(params, "temporalFiltering").on("change", (ev) => {
          giPass.useTemporalFiltering = ev.value;
          updateOutput();
        });

        const fQuality = pane.addFolder({ title: "Quality", expanded: true });
        fQuality
          .addBinding(params, "sliceCount", { min: 1, max: 4, step: 1 })
          .on("change", (ev) => {
            giPass.sliceCount.value = ev.value;
          });
        fQuality
          .addBinding(params, "stepCount", { min: 1, max: 32, step: 1 })
          .on("change", (ev) => {
            giPass.stepCount.value = ev.value;
          });
        fQuality
          .addBinding(params, "radius", { min: 1, max: 25 })
          .on("change", (ev) => {
            giPass.radius.value = ev.value;
          });
        fQuality
          .addBinding(params, "expFactor", { min: 1, max: 3, step: 0.1 })
          .on("change", (ev) => {
            giPass.expFactor.value = ev.value;
          });

        const fIntensity = pane.addFolder({ title: "Intensity", expanded: true });
        fIntensity
          .addBinding(params, "giIntensity", { min: 0, max: 100 })
          .on("change", (ev) => {
            giPass.giIntensity.value = ev.value;
          });
        fIntensity
          .addBinding(params, "aoIntensity", { min: 0, max: 4 })
          .on("change", (ev) => {
            giPass.aoIntensity.value = ev.value;
          });
        fIntensity
          .addBinding(params, "backfaceLighting", { min: 0, max: 1, step: 0.05 })
          .on("change", (ev) => {
            giPass.backfaceLighting.value = ev.value;
          });

        const fAdvanced = pane.addFolder({ title: "Advanced", expanded: false });
        fAdvanced
          .addBinding(params, "thickness", { min: 0.01, max: 10, step: 0.1 })
          .on("change", (ev) => {
            giPass.thickness.value = ev.value;
          });
        fAdvanced.addBinding(params, "useLinearThickness").on("change", (ev) => {
          giPass.useLinearThickness.value = ev.value;
        });
        fAdvanced
          .addBinding(params, "useScreenSpaceSampling")
          .on("change", (ev) => {
            giPass.useScreenSpaceSampling.value = ev.value;
          });

        const fScene = pane.addFolder({ title: "Scene", expanded: false });
        fScene.addBinding(params, "sceneBg", { view: "color" }).on("change", (ev) => {
          scene.background.set(ev.value);
        });
        fScene
          .addBinding(params, "ambientIntensity", { min: 0, max: 0.5, step: 0.01 })
          .on("change", (ev) => {
            ambientLight.intensity = ev.value;
          });
        fScene
          .addBinding(params, "leftWallColor", { view: "color" })
          .on("change", (ev) => {
            redWallMaterial.color.set(ev.value);
          });
        fScene
          .addBinding(params, "rightWallColor", { view: "color" })
          .on("change", (ev) => {
            greenWallMaterial.color.set(ev.value);
          });
        fScene
          .addBinding(params, "floorColor", { view: "color" })
          .on("change", (ev) => {
            whiteMaterial.color.set(ev.value);
          });

        const fLight = pane.addFolder({ title: "Point Light", expanded: false });
        fLight
          .addBinding(params, "pointLightIntensity", { min: 0, max: 200 })
          .on("change", (ev) => {
            pointLight.intensity = ev.value;
          });
        fLight
          .addBinding(params, "pointLightX", { min: -15, max: 15 })
          .on("change", (ev) => {
            pointLight.position.x = ev.value;
          });
        fLight
          .addBinding(params, "pointLightY", { min: 5, max: 20 })
          .on("change", (ev) => {
            pointLight.position.y = ev.value;
          });
        fLight
          .addBinding(params, "pointLightZ", { min: -15, max: 15 })
          .on("change", (ev) => {
            pointLight.position.z = ev.value;
          });

        function updateOutput() {
          if (params.output === "Direct") {
            renderPipeline.outputNode = scenePassColor;
          } else if (params.output === "AO") {
            renderPipeline.outputNode = vec4(vec3(ao), 1);
          } else if (params.output === "GI") {
            renderPipeline.outputNode = vec4(gi, 1);
          } else {
            renderPipeline.outputNode = giPass.useTemporalFiltering
              ? traaPass
              : compositePass;
          }
          renderPipeline.needsUpdate = true;
        }
      }

      function onWindowResize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      }

      function animate() {
        controls.update();
        renderPipeline.render();
      }

      init();
    </script>
  </body>
</html>
