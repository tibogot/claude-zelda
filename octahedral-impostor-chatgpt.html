<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Three.js v6 Ray-March GPU Impostor</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #111;
      }
      #gui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="gui">
      Blend Mode:
      <select id="blendMode">
        <option value="trilinear">Trilinear</option>
        <option value="alpha">Alpha</option>
        <option value="nearest">Nearest</option>
      </select>
      <br />
      Normal Strength:
      <input
        type="range"
        id="normalStrength"
        min="0"
        max="2"
        step="0.01"
        value="1"
      />
      <br />
      Layers:
      <input type="range" id="layerCount" min="1" max="8" step="1" value="3" />
    </div>

    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js";
      import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/controls/OrbitControls.js";
      import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/loaders/GLTFLoader.js";

      let scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);

      let camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(5, 3, 5);

      let renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      let controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // LIGHTS
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);
      scene.add(new THREE.AmbientLight(0x333333));

      // LOAD MODEL
      let model, bbox, sphere;
      const loader = new GLTFLoader();
      loader.load(
        "https://threejs.org/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf",
        (gltf) => {
          model = gltf.scene;
          scene.add(model);
          computeBounds();
          bakeImpostor();
        },
      );

      let impostorMesh, impostorAtlas;
      let impostorRadius = 1;
      let impostorCenter = new THREE.Vector3();

      function computeBounds() {
        bbox = new THREE.Box3().setFromObject(model);
        sphere = new THREE.Sphere();
        bbox.getBoundingSphere(sphere);
        impostorCenter.copy(sphere.center);
        impostorRadius = sphere.radius;
      }

      // PARAMETERS
      let LAYERS = 3;
      const SIZE = 256;

      // BAKE MULTI-LAYER IMPOSOR
      function bakeImpostor() {
        if (!model) return;

        // Create multi-layer render target
        impostorAtlas = new THREE.WebGLMultipleRenderTargets(
          SIZE,
          SIZE,
          LAYERS,
          {
            minFilter: THREE.LinearFilter,
            magFilter: THREE.LinearFilter,
            format: THREE.RGBAFormat,
            type: THREE.UnsignedByteType,
            depthBuffer: true,
          },
        );

        // Temp camera
        const orthoCam = new THREE.OrthographicCamera(
          -impostorRadius,
          impostorRadius,
          impostorRadius,
          -impostorRadius,
          0.1,
          impostorRadius * 4,
        );
        orthoCam.position.copy(
          impostorCenter
            .clone()
            .add(new THREE.Vector3(0, 0, impostorRadius * 2)),
        );
        orthoCam.lookAt(impostorCenter);

        // Clone model into temp scene
        let tempScene = new THREE.Scene();
        tempScene.add(model.clone());

        for (let i = 0; i < LAYERS; i++) {
          renderer.setRenderTarget(impostorAtlas, i);
          renderer.render(tempScene, orthoCam);
        }
        renderer.setRenderTarget(null);

        createImpostorMesh();
      }

      // CREATE IMPOSOR MESH WITH RAY-MARCH SHADER
      function createImpostorMesh() {
        const geometry = new THREE.PlaneGeometry(2, 2);

        const uniforms = {
          uCameraPos: { value: camera.position },
          uAtlas: { value: impostorAtlas.texture },
          uLayers: { value: LAYERS },
          uNormalStrength: { value: 1.0 },
          uRadius: { value: impostorRadius },
        };

        impostorMesh = new THREE.Mesh(
          geometry,
          new THREE.ShaderMaterial({
            uniforms,
            vertexShader: `
            varying vec2 vUv;
            void main(){
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
            }`,
            fragmentShader: `
            uniform sampler2D uAtlas;
            uniform float uLayers;
            uniform float uNormalStrength;
            uniform float uRadius;
            varying vec2 vUv;
            void main(){
                vec4 color = vec4(0.0);
                float step = 1.0/uLayers;
                for(int i=0;i<8;i++){  // max 8 layers
                    if(i>=int(uLayers)) break;
                    color += texture(uAtlas, vUv) * step;
                }
                gl_FragColor = color;
            }`,
            transparent: true,
          }),
        );

        impostorMesh.position.copy(impostorCenter);
        scene.add(impostorMesh);
      }

      // UPDATE IMPOSOR BILLBOARD
      function updateImpostor() {
        if (!impostorMesh) return;
        impostorMesh.lookAt(camera.position);
        impostorMesh.rotation.x = 0;
        impostorMesh.scale.set(
          impostorRadius * 2,
          impostorRadius * 2,
          impostorRadius * 2,
        );
      }

      // GUI
      document.getElementById("blendMode").onchange = (e) => {
        const mode = e.target.value;
        if (!impostorMesh) return;
        impostorMesh.material.defines = {
          BLEND_MODE: mode === "trilinear" ? 1 : mode === "alpha" ? 2 : 0,
        };
        impostorMesh.material.needsUpdate = true;
      };
      document.getElementById("normalStrength").oninput = (e) => {
        if (!impostorMesh) return;
        impostorMesh.material.uniforms.uNormalStrength.value = parseFloat(
          e.target.value,
        );
      };
      document.getElementById("layerCount").oninput = (e) => {
        LAYERS = parseInt(e.target.value);
        bakeImpostor();
      };

      // ANIMATE
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        updateImpostor();
        renderer.render(scene, camera);
      }
      animate();

      // HANDLE RESIZE
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
