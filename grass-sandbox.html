<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grass Sandbox — Terrain + Character + Lights + Sky (no grass)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #info {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        font:
          12px/1.5 "SF Mono",
          "Fira Code",
          monospace;
        color: #b0d890;
        background: rgba(0, 0, 0, 0.55);
        padding: 8px 12px;
        border-radius: 6px;
        pointer-events: none;
        user-select: none;
      }
      #info span {
        color: #e0f0c0;
        font-weight: 600;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.tsl.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="info">
      Grass Sandbox &mdash; <span id="backend">loading…</span> &bull;
      <span id="stats"></span> &bull; WASD + click to look &bull; Shift run
      &bull; Ctrl crouch &bull; F roll
    </div>

    <script type="module">
      import * as THREE from "three";
      import {
        pass,
        uniform,
        float,
        vec2,
        vec3,
        vec4,
        Fn,
        mix,
        mul,
        div,
        sub,
        add,
        clamp,
        step,
        color,
        fog,
        texture,
        positionWorld,
        positionView,
        positionLocal,
        triNoise3D,
        sin,
        cos,
        smoothstep,
        length,
        abs,
        pow,
        dot,
        normalize,
        negate,
        mx_noise_float,
      } from "three/tsl";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { SkyMesh } from "three/addons/objects/SkyMesh.js";
      import { CSMShadowNode } from "three/addons/csm/CSMShadowNode.js";
      import RAPIER from "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/+esm";
      import { createTerrain } from "./terrain-sandbox.js";
      import {
        createGrassGeometry,
        createGrassMaterial,
        setupGrassPatches,
        GRASS_PATCH_SIZE,
        GRASS_SEGMENTS_LOW,
        GRASS_SEGMENTS_MID,
        GRASS_SEGMENTS_HIGH,
        GRASS_VERTS_LOW,
        GRASS_VERTS_MID,
        GRASS_VERTS_HIGH,
        NEAR_PATCH_SIZE,
        GRASS_DENSITY,
        GRASS_DENSITY_LOW,
        GRASS_DENSITY_MID,
      } from "./grass-sandbox.js";
      import {
        createUniforms,
        createSyncUniforms,
      } from "./uniforms-sandbox.js";
      import {
        createPhysicsWorld,
        createPlayerController,
        createPhysicsDebug,
      } from "./physics.js";
      import { createPlayer } from "./player.js";
      import { PARAMS } from "./params.js";
      import {
        TERRAIN_SIZE,
        TERRAIN_RES,
        TRAIL_RES,
        TRAIL_SIZE,
        PI,
        GRID_SIZE,
        PATCH_SPACING,
        NPC_COUNT,
      } from "./constants.js";
      import { setSeed, randRange } from "./rng.js";
      import { buildSusukiCtx } from "./susuki-field.js";
      import {
        createSusukiSingleFieldResources,
        setupSusukiSingleField,
      } from "./susuki-single-field.js";
      import { createFlowerField } from "./flower-field-sandbox.js";
      import { createReedField } from "./reed-field-sandbox.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

      async function init() {
        const renderer = new THREE.WebGPURenderer({ antialias: true });
        await renderer.init();
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        const sandboxParams = { ...PARAMS, grassBladesNear: 0.78 };
        renderer.toneMappingExposure = PARAMS.exposure;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        const be = renderer.backend?.constructor?.name || "?";
        document.getElementById("backend").textContent = be.includes("WebGPU")
          ? "WebGPU ✓"
          : "WebGL fallback";

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(
          60,
          innerWidth / innerHeight,
          0.5,
          500000,
        );
        camera.position.set(0, 8, 20);

        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.target.set(0, 2, 0);
        orbitControls.maxPolarAngle = PI * 0.48;
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.enabled = false;
        orbitControls.update();

        // ── LIGHTING ──
        const dirLight = new THREE.DirectionalLight(
          0xfff5e0,
          PARAMS.sunIntensity,
        );
        dirLight.position.copy(
          new THREE.Vector3(PARAMS.sunDirX, PARAMS.sunDirY, PARAMS.sunDirZ)
            .normalize()
            .multiplyScalar(50),
        );
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 200;
        dirLight.shadow.bias = PARAMS.shadowBias;
        dirLight.shadow.normalBias = PARAMS.shadowNormalBias;

        // CSM — same setup as parkour (tighter = sharper shadows)
        const csm = new CSMShadowNode(dirLight, {
          cascades: 3,
          maxFar: 150,
          mode: "practical",
          lightMargin: 100,
        });
        dirLight.shadow.shadowNode = csm;
        const shadowTarget = new THREE.Object3D();
        shadowTarget.position.set(0, 0, 0);
        scene.add(shadowTarget);
        dirLight.target = shadowTarget;
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(
          0xc8e0ff,
          0x88aa55,
          PARAMS.sceneAmbient,
        );
        scene.add(hemiLight);

        // ── TERRAIN ──
        const {
          terrain,
          heightTex,
          trailTex,
          sampleHeight,
          regenTerrain,
          syncTerrainUniforms,
        } = createTerrain(scene, PARAMS, {
          TERRAIN_SIZE,
          TERRAIN_RES,
          TERRAIN_HEIGHT: PARAMS.terrainHeight,
          TRAIL_RES,
          TRAIL_SIZE,
        });

        // ── SKY ──
        const sky = new SkyMesh();
        sky.scale.setScalar(450000);
        scene.add(sky);
        sky.turbidity.value = PARAMS.skyTurbidity;
        sky.rayleigh.value = PARAMS.skyRayleigh;
        sky.mieCoefficient.value = PARAMS.skyMie;
        sky.mieDirectionalG.value = PARAMS.skyMieG;
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        function updateSkyParams() {
          const sd = new THREE.Vector3(
            PARAMS.sunDirX,
            PARAMS.sunDirY,
            PARAMS.sunDirZ,
          ).normalize();
          sky.sunPosition.value.copy(sd);
          sky.turbidity.value = PARAMS.skyTurbidity;
          sky.rayleigh.value = PARAMS.skyRayleigh;
          sky.mieCoefficient.value = PARAMS.skyMie;
          sky.mieDirectionalG.value = PARAMS.skyMieG;
        }
        function bakeEnvMap() {
          const skyEnvScene = new THREE.Scene();
          skyEnvScene.add(sky.clone());
          const skyEnv = pmremGenerator.fromScene(skyEnvScene, 0.04).texture;
          if (scene.environment) scene.environment.dispose();
          scene.environment = skyEnv;
          scene.environmentIntensity = PARAMS.environmentIntensity;
        }
        updateSkyParams();
        bakeEnvMap();

        // ── VOLUMETRIC HAZE (ground mist, follows terrain via heightTex) ──
        const hazeParams = {
          enabled: true,
          thickness: 35,
          opacity: 0.9,
          falloff: 2.2,
          hazeColor: "#f5f5f0",
          noiseScaleA: 0.004,
          noiseScaleB: 0.008,
          noiseAmountA: 0.22,
          noiseAmountB: 0.18,
          noiseDetail: 0.12,
          noiseSpeed: 1,
        };
        const uHazeThickness = uniform(hazeParams.thickness);
        const uHazeOpacity = uniform(hazeParams.opacity);
        const uHazeFalloff = uniform(hazeParams.falloff);
        const uHazeColor = uniform(new THREE.Color(hazeParams.hazeColor));
        const uNoiseScaleA = uniform(hazeParams.noiseScaleA);
        const uNoiseScaleB = uniform(hazeParams.noiseScaleB);
        const uNoiseAmountA = uniform(hazeParams.noiseAmountA);
        const uNoiseAmountB = uniform(hazeParams.noiseAmountB);
        const uNoiseDetail = uniform(hazeParams.noiseDetail);
        const uNoiseSpeed = uniform(hazeParams.noiseSpeed);
        const hazeTimer = uniform(0).onFrameUpdate((frame) => frame.time);
        const uHazeTerrainSize = uniform(TERRAIN_SIZE);

        function applyVolumetricHaze() {
          if (!hazeParams.enabled) {
            scene.fogNode = null;
            return;
          }
          const fogNoiseDistance = positionView.z
            .negate()
            .smoothstep(0, camera.far - 200);
          const distance = fogNoiseDistance.mul(uHazeThickness).max(8);
          const terrainUV = vec2(
            div(positionWorld.x, uHazeTerrainSize).add(0.5),
            div(positionWorld.z, uHazeTerrainSize).add(0.5),
          );
          const terrainUVClamped = clamp(terrainUV, 0.01, 0.99);
          const terrainHeight = texture(heightTex, terrainUVClamped).r;
          const heightAboveFloor = sub(positionWorld.y, terrainHeight);
          const groundFogArea = float(distance)
            .sub(heightAboveFloor)
            .div(distance)
            .pow(uHazeFalloff)
            .saturate()
            .mul(uHazeOpacity);
          const fogNoiseA = triNoise3D(
            positionWorld.mul(uNoiseScaleA),
            uNoiseAmountA,
            hazeTimer,
          );
          const fogNoiseB = triNoise3D(
            positionWorld.mul(uNoiseScaleB),
            uNoiseAmountB,
            hazeTimer.mul(uNoiseSpeed),
          );
          const fogNoiseC = triNoise3D(
            positionWorld.mul(0.015),
            uNoiseDetail,
            hazeTimer.mul(0.5),
          );
          const fogNoise = fogNoiseA
            .add(fogNoiseB)
            .add(fogNoiseC)
            .mul(color(uHazeColor));
          const groundColor = color(
            new THREE.Color(PARAMS.hemiGroundColor ?? 0x88aa55),
          );
          scene.fogNode = fog(
            fogNoiseDistance.oneMinus().mix(groundColor, fogNoise),
            groundFogArea,
          );
        }
        applyVolumetricHaze();

        // ── PHYSICS ──
        await RAPIER.init({});
        const { physicsWorld, physicsCubes } = createPhysicsWorld(
          RAPIER,
          scene,
          TERRAIN_SIZE,
          sampleHeight,
        );
        const { physicsDebugGroup, buildRapierDebugMeshes } =
          createPhysicsDebug(RAPIER, scene, physicsWorld);

        // ── PLAYER ──
        const charPos = new THREE.Vector3(0, 0, 0);
        charPos.y =
          sampleHeight(0, 0) +
          Math.max(
            0.1,
            (PARAMS.characterHeight - 2 * PARAMS.capsuleRadius) / 2,
          ) +
          PARAMS.capsuleRadius;
        const { playerBody, playerCollider, characterController } =
          createPlayerController(RAPIER, physicsWorld, charPos, PARAMS);
        const capR = PARAMS.capsuleRadius;
        const capHalfH = Math.max(0.1, (PARAMS.characterHeight - 2 * capR) / 2);
        const player = createPlayer({
          scene,
          renderer,
          camera,
          PARAMS,
          charPos,
          playerBody,
          playerCollider,
          characterController,
          physicsWorld,
          sampleHeight,
          capR,
          capHalfH,
          TERRAIN_SIZE,
        });

        // ── GRASS (sandbox copy — same LOD system as index.html) ──
        const uniforms = createUniforms(sandboxParams, TERRAIN_SIZE, NPC_COUNT);
        const grassCtx = {
          heightTex,
          trailTex,
          uTerrainSize: uniforms.uTerrainSize,
          uTrailCenter: uniforms.uTrailCenter,
          uTrailSize: uniforms.uTrailSize,
          uTime: uniforms.uTime,
          uPlayerPos: uniforms.uPlayerPos,
          uNpcPos: uniforms.uNpcPos,
          uLodDist: uniforms.uLodDist,
          uLodBlendStart: uniforms.uLodBlendStart,
          uMaxDist: uniforms.uMaxDist,
          uBladeDensityRegular: uniforms.uBladeDensityRegular,
          uBladeDensityNear: uniforms.uBladeDensityNear,
          uNearFadeEnd: uniforms.uNearFadeEnd,
          uNearFadeRange: uniforms.uNearFadeRange,
          uGrassWidth: uniforms.uGrassWidth,
          uGrassHeight: uniforms.uGrassHeight,
          uWindDirX: uniforms.uWindDirX,
          uWindDirZ: uniforms.uWindDirZ,
          uWindWaveScale: uniforms.uWindWaveScale,
          uWindSpeed: uniforms.uWindSpeed,
          uWindAxis: uniforms.uWindAxis,
          uCrossAxis: uniforms.uCrossAxis,
          uWindGust: uniforms.uWindGust,
          uWindStr: uniforms.uWindStr,
          uWindMicro: uniforms.uWindMicro,
          uInteractionRange: uniforms.uInteractionRange,
          uInteractionStrength: uniforms.uInteractionStrength,
          uInteractionHThresh: uniforms.uInteractionHThresh,
          uInteractionRepel: uniforms.uInteractionRepel,
          uMinSkyBlend: uniforms.uMinSkyBlend,
          uMaxSkyBlend: uniforms.uMaxSkyBlend,
          uAoIntensity: uniforms.uAoIntensity,
          uSeasonalScale: uniforms.uSeasonalScale,
          uSeasonalStr: uniforms.uSeasonalStr,
          uBaseColor1: uniforms.uBaseColor1,
          uBaseColor2: uniforms.uBaseColor2,
          uTipColor1: uniforms.uTipColor1,
          uTipColor2: uniforms.uTipColor2,
          uGradientCurve: uniforms.uGradientCurve,
          uColorVariation: uniforms.uColorVariation,
          uLushColor: uniforms.uLushColor,
          uBleachedColor: uniforms.uBleachedColor,
          uSeasonalDryColor: uniforms.uSeasonalDryColor,
          uSunDir: uniforms.uSunDir,
          uBsColor: uniforms.uBsColor,
          uBsPower: uniforms.uBsPower,
          uFrontScatter: uniforms.uFrontScatter,
          uRimSSS: uniforms.uRimSSS,
          uBsIntensity: uniforms.uBsIntensity,
          uSpecV1Intensity: uniforms.uSpecV1Intensity,
          uSpecV1Color: uniforms.uSpecV1Color,
          uSpecV1Dir: uniforms.uSpecV1Dir,
          uSpecV2Intensity: uniforms.uSpecV2Intensity,
          uSpecV2Color: uniforms.uSpecV2Color,
          uSpecV2Dir: uniforms.uSpecV2Dir,
          uSpecV2NoiseScale: uniforms.uSpecV2NoiseScale,
          uSpecV2NoiseStr: uniforms.uSpecV2NoiseStr,
          uSpecV2Power: uniforms.uSpecV2Power,
          uSpecV2TipBias: uniforms.uSpecV2TipBias,
          PI,
        };
        const geoLow = createGrassGeometry(
          GRASS_SEGMENTS_LOW,
          GRASS_DENSITY_LOW,
          GRASS_PATCH_SIZE,
          setSeed,
          randRange,
        );
        const geoMid = createGrassGeometry(
          GRASS_SEGMENTS_MID,
          GRASS_DENSITY_MID,
          GRASS_PATCH_SIZE,
          setSeed,
          randRange,
        );
        const geoHigh = createGrassGeometry(
          GRASS_SEGMENTS_HIGH,
          GRASS_DENSITY,
          GRASS_PATCH_SIZE,
          setSeed,
          randRange,
        );
        const geoNear = createGrassGeometry(
          GRASS_SEGMENTS_HIGH,
          GRASS_DENSITY,
          NEAR_PATCH_SIZE,
          setSeed,
          randRange,
        );
        const matLowSimple = createGrassMaterial(
          GRASS_SEGMENTS_LOW,
          GRASS_VERTS_LOW,
          false,
          "regular",
          grassCtx,
        );
        const matMidSimple = createGrassMaterial(
          GRASS_SEGMENTS_MID,
          GRASS_VERTS_MID,
          false,
          "regular",
          grassCtx,
        );
        const matHighSimple = createGrassMaterial(
          GRASS_SEGMENTS_HIGH,
          GRASS_VERTS_HIGH,
          false,
          "regular",
          grassCtx,
        );
        const matHighSimpleNear = createGrassMaterial(
          GRASS_SEGMENTS_HIGH,
          GRASS_VERTS_HIGH,
          false,
          "near",
          grassCtx,
        );
        const grassGroup = new THREE.Group();
        scene.add(grassGroup);
        const grassPatchSystem = setupGrassPatches(
          scene,
          camera,
          grassGroup,
          {
            geoLow,
            geoMid,
            geoHigh,
            geoNear,
            matLowSimple,
            matMidSimple,
            matHighSimple,
            matHighSimpleNear,
          },
          {
            PATCH_SPACING,
            GRID_SIZE,
            NEAR_PATCH_SIZE,
            GRASS_DENSITY,
            nearRingExtent: PARAMS.nearRingExtent,
            lodDistance: PARAMS.lodDistance,
            lodDistanceMid: PARAMS.lodDistance * 1.4,
            maxDistance: Math.min(PARAMS.maxDistance, 65),
            lodHysteresis: 2,
          },
        );

        // ── SUSUKI SINGLE FIELD (one dense field at fixed position, organic noise-shaped edges) ──
        const SUSUKI_FIELD_CENTER_X = 50;
        const SUSUKI_FIELD_CENTER_Z = 30;
        const susukiGroup = new THREE.Group();
        scene.add(susukiGroup);
        const susukiCtx = buildSusukiCtx({
          uniforms,
          heightTex,
          params: {
            stemHeight: PARAMS.susukiStemHeight,
            stemWidth: PARAMS.susukiStemWidth,
            bandWidth: PARAMS.susukiBandWidth,
            plumeStart: PARAMS.susukiPlumeStart,
            plumeFlex: PARAMS.susukiPlumeFlex,
            plumeSoftEdge: PARAMS.susukiPlumeSoftEdge,
            stemColor: PARAMS.susukiStemColor,
            plumeColor: PARAMS.susukiPlumeColor,
            windDir: PARAMS.windDir,
            windWaveScale: PARAMS.windWaveScale,
            windSpeed: PARAMS.windSpeed,
            windStr: PARAMS.windStrength,
            windGust: PARAMS.windGust,
            windMicro: PARAMS.windMicroSway,
          },
        });
        const susukiResources = createSusukiSingleFieldResources(susukiCtx);
        const susukiPatchSystem = setupSusukiSingleField(
          susukiGroup,
          susukiResources,
          {
            centerX: SUSUKI_FIELD_CENTER_X,
            centerZ: SUSUKI_FIELD_CENTER_Z,
            halfWidth: 60,
            halfDepth: 60,
            patchSpacing: 12,
            threshold: 0.2,
            lodDist: 55,
          },
        );

        // ── FLOWER FIELD (on terrain, smaller & denser, pink–white gradient) ──
        const FLOWER_FIELD_CENTER_X = -50;
        const FLOWER_FIELD_CENTER_Z = -30;
        const flowerField = await createFlowerField(scene, {
          sampleHeight,
          centerX: FLOWER_FIELD_CENTER_X,
          centerZ: FLOWER_FIELD_CENTER_Z,
          halfWidth: 22,
          halfDepth: 22,
          density: 50 * 50,
          windDir: PARAMS.windDir,
          windSpeed: PARAMS.windSpeed,
          windStr: PARAMS.windStrength,
          params: {
            petalColorBase: "#ff88aa",
            petalColorTip: "#fff5f8",
            petalGradientBlend: 0.85,
            flowerHeight: 1.1,
          },
          uniforms: {
            uTrailCenter: uniforms.uTrailCenter,
            uPlayerPos: uniforms.uPlayerPos,
            uInteractionRange: uniforms.uInteractionRange,
            uInteractionStrength: uniforms.uInteractionStrength,
            uInteractionHThresh: uniforms.uInteractionHThresh,
            uInteractionRepel: uniforms.uInteractionRepel,
          },
        });

        // ── REED FIELD (instanced reedplant.glb, compact & dense, west of spawn) ──
        const REED_FIELD_CENTER_X = -28;
        const REED_FIELD_CENTER_Z = 12;
        const reedField = await createReedField(scene, {
          sampleHeight,
          centerX: REED_FIELD_CENTER_X,
          centerZ: REED_FIELD_CENTER_Z,
          halfWidth: 12,
          halfDepth: 12,
          density: 70 * 70,
          modelPath: "./models/reedplant.glb",
          scale: 2.5,
          scaleVariation: 0.25,
          windDir: PARAMS.windDir,
          windSpeed: PARAMS.windSpeed,
          windStr: PARAMS.windStrength,
          uniforms: {
            uTrailCenter: uniforms.uTrailCenter,
            uPlayerPos: uniforms.uPlayerPos,
            uInteractionRange: uniforms.uInteractionRange,
            uInteractionStrength: uniforms.uInteractionStrength,
            uInteractionHThresh: uniforms.uInteractionHThresh,
            uInteractionRepel: uniforms.uInteractionRepel,
          },
        });

        // ── STYLIZED WATER LAKE (from stylized-water-showcase3) ──
        const LAKE_CENTER_X = 40;
        const LAKE_CENTER_Z = -35;
        const LAKE_HALF_SIZE = 25;
        const lakeY = (() => {
          const cx = LAKE_CENTER_X;
          const cz = LAKE_CENTER_Z;
          const r = LAKE_HALF_SIZE;
          let minH = sampleHeight(cx, cz);
          for (let dx = -r; dx <= r; dx += 10) {
            for (let dz = -r; dz <= r; dz += 10) {
              const h = sampleHeight(cx + dx, cz + dz);
              if (h < minH) minH = h;
            }
          }
          return minH - 0.02;
        })();
        const waterParams = {
          waterColor: "#00f2ff",
          deepColor: "#006d77",
          waveSpeed: 0.8,
          waveHeight: 0.25,
          waveDirection2: 0.7,
          noiseScale: 0.2,
          lineThinness: 0.04,
          causticLayer2Scale: 0.08,
          foamWidth: 1.2,
          foamDistortion: 1.5,
          opacity: 0.85,
          fresnelPower: 3.5,
          fresnelStrength: 0.35,
          sunHighlightSize: 0.15,
          sunHighlightStrength: 0.5,
        };
        const uWaterTime = uniform(0);
        const uWaterColor = uniform(new THREE.Color(waterParams.waterColor));
        const uDeepColor = uniform(new THREE.Color(waterParams.deepColor));
        const uWaveSpeed = uniform(waterParams.waveSpeed);
        const uWaveHeight = uniform(waterParams.waveHeight);
        const uNoiseScale = uniform(waterParams.noiseScale);
        const uLineThinness = uniform(waterParams.lineThinness);
        const uCausticLayer2 = uniform(waterParams.causticLayer2Scale);
        const uFoamWidth = uniform(waterParams.foamWidth);
        const uFoamDistort = uniform(waterParams.foamDistortion);
        const uFresnelPower = uniform(waterParams.fresnelPower);
        const uFresnelStrength = uniform(waterParams.fresnelStrength);
        const uSunHighlightSize = uniform(waterParams.sunHighlightSize);
        const uSunHighlightStrength = uniform(waterParams.sunHighlightStrength);
        const uWaveDir2 = uniform(waterParams.waveDirection2);
        const uWaterCameraPosition = uniform(new THREE.Vector3());
        const uWaterSunDirection = uniform(
          new THREE.Vector3(PARAMS.sunDirX, PARAMS.sunDirY, PARAMS.sunDirZ)
            .normalize(),
        );
        const uLakeCenter = uniform(
          new THREE.Vector2(LAKE_CENTER_X, LAKE_CENTER_Z),
        );
        const uLakeHalfSize = uniform(LAKE_HALF_SIZE);

        const waterPositionNode = Fn(() => {
          const p = positionLocal;
          const t = uWaterTime.mul(uWaveSpeed);
          const waveX = sin(p.x.mul(0.4).add(t)).mul(uWaveHeight);
          const waveZ = sin(p.z.mul(0.35).add(t.mul(0.7)))
            .mul(uWaveHeight)
            .mul(uWaveDir2);
          const yOff = waveX.add(waveZ);
          return positionLocal.add(vec3(0, 0, yOff));
        })();

        const waterColorNode = Fn(() => {
          const wPos = positionWorld;
          const distFromCenter = length(sub(wPos.xz, uLakeCenter));

          const nUV = wPos.xz.mul(uNoiseScale).add(uWaterTime.mul(0.1));
          const n1 = mx_noise_float(nUV);
          const n2 = mx_noise_float(nUV.add(vec2(0.5, 0.5)));
          const combined = mix(n1, n2, 0.5);
          const ridge = abs(sub(combined, 0.5));
          let thinLines = smoothstep(uLineThinness, 0.0, ridge);
          const nUV2 = wPos.xz.mul(uCausticLayer2).add(uWaterTime.mul(0.05));
          const r2 = abs(sub(mx_noise_float(nUV2), 0.5));
          const layer2Strength = smoothstep(0.0, 0.05, uCausticLayer2);
          thinLines = thinLines.add(
            smoothstep(uLineThinness.mul(1.5), 0.0, r2)
              .mul(0.4)
              .mul(layer2Strength),
          );
          thinLines = thinLines.clamp(0, 1);

          const fDistort = mx_noise_float(
            wPos.xz.mul(0.6).add(uWaterTime.mul(0.6)),
          ).mul(uFoamDistort);
          const foamMask = smoothstep(
            uLakeHalfSize,
            sub(uLakeHalfSize, uFoamWidth),
            sub(distFromCenter, fDistort),
          ).clamp(0, 1);

          const viewDir = normalize(sub(uWaterCameraPosition, wPos));
          const flatNormal = vec3(0, 1, 0);
          const NdotV = dot(flatNormal, viewDir).clamp(0, 1);
          const fresnel = pow(sub(1.0, NdotV), uFresnelPower).mul(
            uFresnelStrength,
          );

          const sunDir = normalize(uWaterSunDirection);
          const H = normalize(add(viewDir, sunDir));
          const NdotH = dot(flatNormal, H).clamp(0, 1);
          const sunHighlight = pow(NdotH, div(float(1), uSunHighlightSize)).mul(
            uSunHighlightStrength,
          );

          const baseMix = smoothstep(
            float(0),
            uLakeHalfSize,
            distFromCenter,
          );
          const waterBase = mix(uWaterColor, uDeepColor, baseMix);

          let final = waterBase;
          final = mix(final, vec3(1.0), thinLines.mul(0.6));
          final = mix(final, vec3(1.0), foamMask);
          final = add(final, vec3(fresnel, fresnel, fresnel));
          final = add(final, vec3(sunHighlight, sunHighlight, sunHighlight));

          return final;
        })();

        const waveNormalNode = Fn(() => {
          const wPos = positionWorld;
          const t = uWaterTime.mul(uWaveSpeed);
          const dwaveDx = cos(wPos.x.mul(0.4).add(t)).mul(0.4).mul(uWaveHeight);
          const dwaveDz = cos(wPos.z.mul(0.35).add(t.mul(0.7)))
            .mul(0.35)
            .mul(uWaveHeight)
            .mul(uWaveDir2);
          return normalize(vec3(negate(dwaveDx), float(1), negate(dwaveDz)));
        })();

        const waterMat = new THREE.MeshStandardNodeMaterial({
          transparent: true,
          roughness: 0.25,
          metalness: 0.0,
        });
        waterMat.positionNode = waterPositionNode;
        waterMat.colorNode = waterColorNode;
        waterMat.normalNode = waveNormalNode;
        waterMat.opacityNode = uniform(waterParams.opacity);

        const lakeGeometry = new THREE.PlaneGeometry(
          LAKE_HALF_SIZE * 2,
          LAKE_HALF_SIZE * 2,
          64,
          64,
        );
        const waterMesh = new THREE.Mesh(lakeGeometry, waterMat);
        waterMesh.rotation.x = -Math.PI / 2;
        waterMesh.position.set(LAKE_CENTER_X, lakeY, LAKE_CENTER_Z);
        waterMesh.receiveShadow = true;
        scene.add(waterMesh);

        // ── BOTANIQ TREE (single, on terrain, alpha leaves, shadow test) ──
        const TREE_X = 18;
        const TREE_Z = 20;
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath(
          "https://www.gstatic.com/draco/versioned/decoders/1.5.6/",
        );
        const gltfLoader = new GLTFLoader();
        gltfLoader.setDRACOLoader(dracoLoader);
        const treeGltf = await gltfLoader.loadAsync("models/botaniq1.glb");
        const treeRoot = treeGltf.scene;
        treeRoot.traverse((o) => {
          if (!o.isMesh) return;
          const m = o.material;
          const meshName = (o.name || "").toLowerCase();
          const matName = (m?.name || "").toLowerCase();
          const isLeaf =
            /leaf|leave|foliage|canopy|frond|branch|plant/i.test(
              meshName + " " + matName,
            ) ||
            (m && (m.transparent || (m.map && m.alphaTest > 0)));
          o.castShadow = true;
          o.receiveShadow = true;
          if (m && !m.isNodeMaterial) {
            o.material = new THREE.MeshStandardNodeMaterial({
              color: m.color?.getHex?.() ?? 0x2d6b1a,
              roughness: m.roughness ?? 0.7,
              metalness: m.metalness ?? 0,
              map: m.map || null,
              normalMap: m.normalMap || null,
              transparent: isLeaf,
              alphaTest: isLeaf ? 0.05 : 0,
              opacity: isLeaf ? (m.opacity ?? 1) : 1,
              side: isLeaf ? THREE.DoubleSide : THREE.FrontSide,
              depthWrite: !isLeaf,
            });
          }
        });
        const treeY = sampleHeight(TREE_X, TREE_Z);
        treeRoot.position.set(TREE_X, treeY, TREE_Z);
        treeRoot.scale.setScalar(5);
        scene.add(treeRoot);

        const syncUniforms = createSyncUniforms(uniforms, {
          PARAMS: sandboxParams,
          camera,
          dirLight,
          hemiLight,
          renderer,
          charPos,
          syncTerrainUniforms,
          updateSkyParams,
        });

        const frustum = new THREE.Frustum();
        const projMat = new THREE.Matrix4();

        function srgbToLinear(hex) {
          const c = new THREE.Color(hex);
          c.convertSRGBToLinear();
          return c;
        }
        const uFogNear = uniform(PARAMS.fogNear);
        const uFogFar = uniform(PARAMS.fogFar);
        const uFogCameraFar = uniform(500000);
        const uFogIntensity = uniform(PARAMS.fogIntensity);
        const uFogColor = uniform(srgbToLinear(PARAMS.fogColor));
        const uFogEnabled = uniform(PARAMS.fogEnabled ? 1 : 0);

        const scenePass = pass(scene, camera);
        const sceneColor = scenePass.getTextureNode
          ? scenePass.getTextureNode()
          : scenePass;
        const linearDepth = scenePass.getLinearDepthNode
          ? scenePass.getLinearDepthNode()
          : float(0.5);
        const worldDepth = mul(linearDepth, uFogCameraFar);
        const fogF = mul(
          clamp(
            mul(
              div(sub(worldDepth, uFogNear), sub(uFogFar, uFogNear)),
              uFogIntensity,
            ),
            0,
            1,
          ),
          uFogEnabled,
        );
        const skyMask = step(float(0.999), linearDepth);
        const foggedOutput = mix(
          sceneColor,
          vec4(uFogColor, 1),
          mul(fogF, sub(1, skyMask)),
        );
        const renderPipeline = new THREE.RenderPipeline(renderer);
        renderPipeline.outputNode = foggedOutput;

        await renderer.compileAsync(scene, camera);

        csm.camera = camera;
        csm.updateFrustums();

        const timer = new THREE.Timer();
        let lastTime = 0;
        let frameCount = 0;
        renderer.setAnimationLoop(() => {
          timer.update();
          const elapsed = timer.getElapsed();
          const dt = Math.min(elapsed - lastTime, 0.05);
          lastTime = elapsed;
          player.update(dt);

          projMat.multiplyMatrices(
            camera.projectionMatrix,
            camera.matrixWorldInverse,
          );
          frustum.setFromProjectionMatrix(projMat);
          const { patchCount } = grassPatchSystem.update(charPos, frustum);
          const { patchCount: susukiPatchCount } = susukiPatchSystem.update(
            charPos,
            frustum,
          );
          syncUniforms();
          uniforms.uTime.value = elapsed;
          uniforms.uPlayerPos.value.copy(charPos);
          uWaterTime.value = elapsed;
          uWaterCameraPosition.value.copy(camera.position);
          uWaterSunDirection.value.copy(dirLight.position).normalize();
          flowerField.update(elapsed);
          reedField.update(elapsed);

          if (++frameCount % 30 === 0) {
            let statsText = `${patchCount} grass patches`;
            if (susukiPatchCount > 0)
              statsText += ` ▪ ${susukiPatchCount} susuki patches`;
            statsText += ` ▪ ${flowerField.flowerCount} flowers`;
            if (reedField.reedCount > 0)
              statsText += ` ▪ ${reedField.reedCount} reeds`;
            document.getElementById("stats").textContent = statsText;
          }

          physicsDebugGroup.visible = !!PARAMS.rapierDebug;
          if (PARAMS.rapierDebug) buildRapierDebugMeshes();
          for (const { body, mesh } of physicsCubes) {
            const t = body.translation();
            const r = body.rotation();
            mesh.position.set(t.x, t.y, t.z);
            mesh.quaternion.set(r.x, r.y, r.z, r.w);
          }

          if (PARAMS.cameraMode === "thirdPerson") {
            const camDist = PARAMS.camDist;
            const cx =
              charPos.x -
              Math.sin(player.state.camYaw) *
                Math.cos(player.state.camPitch) *
                camDist;
            const cy =
              charPos.y +
              Math.sin(player.state.camPitch) * camDist +
              PARAMS.camHeight;
            const cz =
              charPos.z -
              Math.cos(player.state.camYaw) *
                Math.cos(player.state.camPitch) *
                camDist;
            const camTerrainY = sampleHeight(cx, cz) + 1.5;
            camera.position.set(cx, Math.max(cy, camTerrainY), cz);
            camera.lookAt(charPos.x, charPos.y + 0.5, charPos.z);
            orbitControls.enabled = false;
          } else {
            orbitControls.enabled = true;
            orbitControls.update();
          }

          uFogNear.value = PARAMS.fogEnabled ? PARAMS.fogNear : 9999;
          uFogFar.value = PARAMS.fogEnabled ? PARAMS.fogFar : 99999;
          uFogIntensity.value = PARAMS.fogEnabled ? PARAMS.fogIntensity : 0;
          uFogColor.value.copy(srgbToLinear(PARAMS.fogColor));
          uFogEnabled.value = PARAMS.fogEnabled ? 1 : 0;

          camera.updateMatrixWorld(); // required by CSMShadowNode.updateBefore
          renderPipeline.render();
        });

        window.addEventListener("resize", () => {
          camera.aspect = innerWidth / innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(innerWidth, innerHeight);
          if (csm.frustums) csm.updateFrustums();
        });
      }

      init().catch((e) => {
        console.error("Init failed:", e);
        document.getElementById("backend").textContent = "Error: " + e.message;
      });
    </script>
  </body>
</html>
