<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Ghost Wind Shader</title>

    <style>
      html,
      body {
        margin: 0;

        padding: 0;

        overflow: hidden;

        background: #0a0d10;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <body>
    <canvas id="c"></canvas>

    <script>
      const canvas = document.getElementById("c");

      const gl = canvas.getContext("webgl");

      function resize() {
        canvas.width = window.innerWidth;

        canvas.height = window.innerHeight;

        gl.viewport(0, 0, canvas.width, canvas.height);
      }

      window.addEventListener("resize", resize);

      resize();

      const vertex = `

attribute vec2 position;

void main(){

gl_Position = vec4(position,0.0,1.0);

}

`;

      const fragment = `



precision highp float;



uniform vec2 resolution;

uniform float time;







// random

float rand(vec2 p){

return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);

}







// value noise

float noise(vec2 p){



vec2 i = floor(p);

vec2 f = fract(p);



float a = rand(i);

float b = rand(i + vec2(1.0,0.0));

float c = rand(i + vec2(0.0,1.0));

float d = rand(i + vec2(1.0,1.0));



vec2 u = f*f*(3.0-2.0*f);



return mix(a,b,u.x) +

(c-a)*u.y*(1.0-u.x) +

(d-b)*u.x*u.y;



}







// fractal noise

float fbm(vec2 p){



float v = 0.0;

float a = .5;



for(int i=0;i<6;i++){



v += a * noise(p);

p *= 2.0;

a *= .5;



}



return v;



}







void main(){



vec2 uv = gl_FragCoord.xy / resolution.xy;

uv -= .5;



uv.x *= resolution.x/resolution.y;





// wind direction

vec2 wind = normalize(vec2(1.0,0.3));







// flowing noise

vec2 flow = uv*2.0 + wind * time * 0.4;







float n = fbm(flow);





// stretch noise along wind direction

float streak = fbm(flow + wind*n*2.0);





// shape wind wisps

float haze = smoothstep(.45,.7,streak);





// add soft layer

float layer = fbm(flow*1.7 + wind*time*.6);

haze += smoothstep(.5,.75,layer)*0.5;





// subtle fade edges

haze *= exp(-length(uv)*1.2);





// color

vec3 color = vec3(0.9,0.95,1.0) * haze;





gl_FragColor = vec4(color,haze*0.6);



}



`;

      function compile(type, src) {
        let s = gl.createShader(type);

        gl.shaderSource(s, src);

        gl.compileShader(s);

        return s;
      }

      let program = gl.createProgram();

      gl.attachShader(program, compile(gl.VERTEX_SHADER, vertex));

      gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fragment));

      gl.linkProgram(program);

      gl.useProgram(program);

      const vertices = new Float32Array([
        -1, -1,

        1, -1,

        -1, 1,

        1, 1,
      ]);

      const buffer = gl.createBuffer();

      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);

      gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

      const position = gl.getAttribLocation(program, "position");

      gl.enableVertexAttribArray(position);

      gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

      const timeLoc = gl.getUniformLocation(program, "time");

      const resLoc = gl.getUniformLocation(program, "resolution");

      function render(t) {
        gl.uniform1f(timeLoc, t * 0.001);

        gl.uniform2f(resLoc, canvas.width, canvas.height);

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        requestAnimationFrame(render);
      }

      requestAnimationFrame(render);
    </script>
  </body>
</html>
